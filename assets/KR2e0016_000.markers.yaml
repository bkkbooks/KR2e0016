  - {type: variant, offset: 14725, length: 25651, content: 事一如来意一一當報候王汭㸔定文字了當同遣人附逹賞軍物亦在書中備細陳聞和好事重既荷周還切望終始成之白再上書別索犯夜者天㑹四年二月五日大金皇子都經略處置使斡离不謹上書于大宋皇帝闕下昨以太上皇誣神瀆明奉命致討正月七日大軍直抵都城方謀攻拔特承遣知樞宻院事李梲等具言上皇自省前非傳位播越以代上皇引過求誠遂依元奉宣命酌中計議復㝷舊好盟著誓書有如皎日始者不忍貴朝宗社顛覆生靈塗炭遂用解圍至於四面園舘屋宇都無所毁及放黄河更不爲界元許歲輸七百萬貫仍於見交金帛之数减免頗多本欲貴朝如此大議結以至誠矧誓墨未乾神聽甚邇理當祗畏豈可背違何期倐爾發兵竊犯營壘自取違禍前日之事起自上皇今日之爲所咎安往遂使師徒疑撓別欲施行差去人使王汭回状審皇帝召見面諭言輙流涕及承所賜書云初聞甚駭寝食俱廢謂以執政姦臣姚平仲等妄作生事貪功誤國反陳所不敢舉者三詞意懇切聞之惻然當司詳認實自向誤國者不度強弱之勢禍福之理徒以㺯兵殘民欲徼一日之幸重念皇帝即位日淺㫁不自衷而宗廟社稷㡬爲此軰所隕實可傷惜乃令諸軍特罷攻取仍依已立誓書一切爲定其造意執政姦臣及姚平仲等可日下執送軍前以塞衆怨従來雖以康王少宰爲質决是無所顧惜輙敢有此侵犯更以皇叔越王駙馬曹都尉同質軍前并於太宰李邦彦樞宻吴敏二人内科發遣一員交換少宰張邦昌亦候割定疆界同時彂遣外據歇下騾馬金帛疾速交送如或有所不從幸賜端的垂示今差福州管内觀察使隨駕教坊都點提點王汭安州團練使耶律寕充計議使副謹奉奏聞謹白宋主遣報謝使副回書大宋皇帝致書于大金皇子郎君蒙遣計議使副王汭耶律寕同宇文虚中至伏承書翰辭情懇屈深佩忱誠兹者大軍南来自抵京邑㪟講舊好許約盟書宗社載安生靈寕息是皆不貲之恩懷感何已使節往還既同絡繹和好之厚誓信彌堅豈意城外軍兵輙敢不遵號令妄舉甲兵夜犯軍寨以卵投石自取敗亡初聞驚駭不知所措惟恐貽怒皇子郎君来責敗盟之咎疑似難明煩辭何益今者乃蒙仁哲深諒此情自非曲示懽和之意何以能此愧謝之深言不能究且強弱之形多寡之勢三尺之童可料而知以弱敵强以寡犯衆雖甚愚者皆知不可况講脩睦今将一月彼此相照大事已成豈忍以目前小利乆逺之計而違其初心哉此理灼然不待辨析又且心膂之臣手足之愛爲質軍中寕不愛惜前書具白已蒙垂照且聞軍兵聚集約日攻城嚴令一宣㝷即退散既欽約束之盟仍荷恩德之厚所諭皇叔越王駙馬曹都尉同質軍中并於太宰李邦彦樞宻呉敏二人内科發遣一員交換少宰張邦昌亦候定疆界同時發遣事曹都尉今謹遣行昨者城中軍民數萬伏闕詆罵宰執殺戮官數人兩日之間輔臣罷免甚衆大宰李邦彦已屢乞致仕門下侍郎趙野亦在假不出中書侍郎王孝廸左丞蔡懋皆罷政事樞宻李綱除知大名王汭見止有樞宻呉敏新除左丞耿南仲新除樞宻宇文虗中及李梲四人在列事至於斯惟有誠實若皇子郎君不念孤危之迹不諒哀痛之誠雖罄竭語言無復可望儻䝉矜念許存趙氏社稷保全億萬生靈敢柝大恩存留見在執政官粗立朝廷稍安衆望即欲除張邦昌大率且令前去交割地界或更遣門下侍郎趙野爲質亦取髙裁惟越王以叔父之尊平日每所奉侍以姪遣叔情理不遑已遣弟肅王樞前去幸依元約只在黄河所有康王却望先次遣囘以副手足之念姚平仲逆天誤國誅殛是宜比令四逺根㝷巳聞隕於鋒鏑凡爲執政事涉可欵雖領行營之權實無結搆之迹雖自臣下違命要功亦由眇躬有失照察慙負飲涕無以自明尚兾廓山藪之容俾獲全君臣之義止従貶責庻免嚴誅况邯郸軍役失守尚蒙放還在於近臣終祈衿免所諭騾馬金帛事已納金五十一萬七千三百兩銀一千四百三十萬二千六百兩絹一十萬疋表四十七萬疋竭盡府庫舊積仍歛民間所藏盡數於斯無可再得只候軍囘之後道路稍通取之四方旋充元數騾巳納六百頭馬五百四十七疋之外餘皆尫瘁瘦疲素不飬在城中縦復有馬千餘亦乞留爲禁衛事至今日豈敢不従荷再造則天地同功䝉一譴則社稷立隕慎可投誠且實盟言有無幸今日之矜容觀他時之改悔後或有違誓約不顧大恩天實臨之禍敗不悔今遣簽書樞宻院事宇文虚中知東上閤門事王球充報謝計議使副緬惟英明必加孚照白上書兵囘差使副代辭天㑹四年二月八日大金皇子都經略䖏置使兩路都統斡离不等謹上書于大宋皇帝闕下昨者受命專征以太上皇渝變盟誓靈旗南向直抵京城伏承皇帝嗣位再請脩好遂依元奉詔㫖酌中計議著定盟約日復貴朝姦臣誤國妄起釁端于是當司實懐疑憤乃蒙宸翰諭以孤危哀痛之誠重遣同氣近姻之質深諒大信克保有終前日之盟非此爲比且自大軍之來資索頗多上瀆聰明下匱民庻事不在已固非樂爲竊惟兵火一縦收之實難自非皇帝仁明逺略屈已愛民安能使此禍危翻然爲福今兹大計已定而後無以舊事爲念惟祈永惇誠義共保生靈又承所賜書内該越王以叔父之尊平日奉事姚平仲死於鋒鏑李綱止從貶責其餘宰執近間求退罷免者甚衆既聞兹命敢不孚聽及蒙諭城中軍民不遵號令今實恐轉生變亂以貽聖憂當司本圗安定貴朝社稷永固和好遂令城下諸軍退保舊寨湏是即日班師伏念陛下即位之初必欲推恩布澤以悦衆志特於元定賞軍物内减金一萬鋌銀一十萬鋌表一十萬段以充振乏廣施之用外有歇下金帛頭疋更望止於今歳逐月接續交送今方言還非不欲詣闕展辭少叙悃愊以在軍中不克如願謹遣左金吾衛大将軍權宣徽北院韓鼎裔桂州管内觀察使耶律克㳟充代辭使副有少禮物具如别幅謹奉書奏辭以聞謹白别幅人参二十秤宋主囬謝書爲放還康王及减免金數大宋皇帝致書于大金皇子郎君使崇義軍節度副使髙安仁隴州防禦使耶律忠来承惠書翰豈勝愧感之情比者大軍南来獲脩盟約信義之重情愛爲深嘗遣皇弟康王少宰張邦昌詣軍帳前以示誠懇之實萬年之歡永以交孚不期姦臣誤國邀功生事輙出士卒夜犯軍營初聞駭愕實恐有害盟誓且以短書備叙誠懇伏承皇子郎君契同一家深照悃愊具知臣下之姦非出眇躬之意解疑息怒復固懽和既寛責問三軍之士亦罷攻圍感激之心言何可旣承諭本不欲貴朝有蹙迫之危故更不移前定稍有變渝新以限河爲定果能永惇大信将来別有裁酌味讀再三深仭美意康王留軍前㡬月極荷管顧今蒙還歸其慰顒顒更承减金萬鋌兹爲厚惠益諗眷存姑此叙謝言不究悉又書乞寛限送納賞物大宋皇帝致書于大金皇子郎君兹者危難之邦既蒙恩於衿貸纎悉之懇敢避瀆於再三昨者李梲續起金二十萬兩其金俱係拘刷到民間稜稻釵釧器物之類旋行折剥鉟銷遂有折耗實起發及十九萬四千四百兩係欠五千六百兩續起銀二百萬兩爲金有欠数却起過銀二百八十四萬二千六百餘兩係大起過八十四萬餘兩至於都数之中更减免外通計所欠之数甚多又有騾馬名件不一兹審大軍将還理當送納属以城中圍閉道路不通至於掌管之人亦多逃匿若㑹見備細實数又須数日遲留敢望矜憐許令於軍行之数逐旋筭計送納三府地圖本合通作一本又縁中有真定府路邊疆不齊曽令宇文虚中面懇英聽令只作三圖繪畫其分畫界至自有里堠分明踏行之時一一可見今者城中疑阻不保朝夕尚兾終恵俾早安寜至於纎悉曲折有應副未至之事凢百皆望矜貸此後比至交割疆封金帛騾馬未了之間應有往復文字當親加點閱逹于聞伏祈照察白謝宋主餞禮書天㑹四年二月十日大金皇子都經畧䖏置使兩路都統斡离不等謹致書於大宋皇帝闕下比者已復舊好佇議還師伏蒙聖慈特差開封府少尹就軍中賜斡离不等茶果龍腦酒藥并差去使人韓鼎裔等復囘承賜犀御帶一條以隆餞別之禮仍被㫖稠重昭宣大信仰仭聖意曲殚㡳衷欽領之餘尤增感劇當司遂促歸期今月十日已令大軍旋斾所祈陛下社稷載寕生靈休息今差靖江軍節度使髙僧奴隴州防禦使大迎充賀少有禮物具如别幅謹奉書奏謝以聞别幅人参一十秤宋主遣計議使副書乞免割三鎮更增歲幣等事大宋皇帝致書于大金王子郎君比者駐軍近境屢致尺書旋斾踰河嘗馳信使春和屇序福履増隆既舊好之復脩冝誠言之盡布太原中山高陽三鎮雖限大河大逺京邑其間有逺祖陵城太宗祠宫在於子孫忍不保守高陽一帶稅賦舊以收在納銀絹數中今復重割疆封非敢有愛惟河外人民不安生業其間親戚境土相隣一有往還動干盟誓所憂小事馴致大愆今欲更増歳輸銀絹以代三鎮租賦兼前未犒軍金銀表段騾馬等除已交過及将府庫珠玉等並已送納向来使人囘許盡充折雖行减損餘數尚多候事平取之外郡而累年以来用度窘乏兵革之後又益空虚若取於民必生變亂前日汗城之事憂悸至今况自頃時歳幣麄惡皆因燕山之後民力凋殘盗賊縱横公私勞費金若歳輸金帛雜物又復𥙷發犒軍餘数物力不逮恐失前言所有歳輸百萬折爲雜物名件瑣細道理阻脩毎歳困竭民力終不能足巳令使人一一囘逹若許折爲綿却帛令沿邉依舊設置榷塲許通商賈販賣庻得兩便其利乆長若必能補此難定之數則力所不能釁隙常在恐非和好之意望加照察兼昨蒙貽書訴以果能永㪟大信将来别有裁酌使人傳言亦諭此意今若復露情實隐忍不言雖從一時之宜恐有後来之悔况髙明英偉惟義是從想遂慨然寛其迫遽今差中大夫試工部尚書王雲定國軍承宣使曹曚充軍前計議使副專書爲懇尚勤保毓益介壽祺白又乞放肅王書大宋皇帝致書于大金皇子郎君春暄伏候福履具宜比遣肅王餞送還師期渡大河即令先返今聞行李巳過邢趙夙夜徯望未聞還音又聞肅王乍踐履䟦涉寝食失時冝近藥餌手足之愛實切于心今差使人躬詣和門懇㝷前約早使還歸諒守盟言必無留滯今遣王雲曹曚充奉迎肅王使副專書爲懇尚兾保綏白宋主與左副元帥書在髙平大宋皇帝致書于大金元帥移賫勃極列逖聞髙誼未覿英標兹再請於懽盟獲永依於鄰庇興言載戢未易叙陳今因分地界官簽書樞宻院事路允廸徃軍前親解玉帶一條真珠雙圈繋勒白一副逺将信意并令皇弟康王亦親解玉帶玉魚一副同致謝緘𬗟惟孚察白囘宋主書謝宋彦通報和同韋一牒天㑹四年三月日大金骨魯你移賫勃極列左副元帥致書于大宋皇帝闕下頃雖結釁即復㝷盟爰遣使以報成遂致書而為問更多賜遣已劇感藏所有事理别差官賫牒三省樞宻院去訖淑律正融佇􅈾多福今差利州管内觀察使銀青榮禄大夫檢校工部尚書兼侍御史上騎都尉蘭陵縣開伯男食邑七百户蕭仲㳟朝議大夫守太僕少卿驍騎尉天水郡縣開國男食邑三百户賜紫金魚袋趙倫充囘謝使副謹奉書陳逹以聞不宣元帥府與宋三省樞宻院事牒大金元帥府牒大宋三省樞宻院近日簽書樞宻院路允廸右文殿脩撰宋彦通等前次賫到大宋皇帝聖書方知河路軍已至京師割太原中山河間三府復講歡盟許以退師者㑹騐其所和㑹之事即與當府元奉宣意不恊然以盧河北軍前別有續奉宣命彂自太原前来攻畧至隆德府不伏招諭縱兵攻下暁示宣命别差官員撫定了當申奏朝廷未降㫖揮難便倒移歸還㝷具申奏仍留逐官依舊管勾才候奉到朝命即當移報次湏至公文牒具如前事湏牒大宋三省樞宻院到請照驗比至當府别有移報以来勿以隆德威勝軍府并属縣鎮不係割數一似夜犯河北軍營多方謀害前件軍府官貟引惹生事儻有如此難保忱盟外據路樞宻專来交割太原府至界候軍囘到彼從長商議亦請照驗天㑹四年三月日與南宋書爲太原府不服交割三月十七日大金骨魯你移賫勃極列左副元帥謹致書于大宋皇帝闕下近淮簽書樞宻院事路元廸賫書前来稱河北路軍前講和了當議定割太原中山河間三府允廸奉差交割太原府界至今月初四日重兵将囘以道路隘窄住滯計㑹允廸宋彦通滕茂實同當府差下官貟先赴太原交割施行今月十七日師次南關比有路允廸使臣談某何偉来到軍前稱太原府今来所降詔書與先奉指揮不同不肯出迎詔書不伏交割申議合交界至未見了絶難便退師見於太原府并左右州縣逐有草料屯駐幸無疑惑律正暄和願膺多福今因人使請奉書陳逹不宣謹白元帥府再與宋三省樞宻院牒大金元帥府牒大宋三省樞宻院當府㑹驗自重兵進攻招下太原府已南軍府縣鎮差下官員𬋩勾撫定之後准大宋皇帝遣簽書樞宻院事路允廸等賫書前次報與河北路軍前講和講定割太原中山河間三府已載誓書却爲前件州軍不在来書除申奏外一面回書大宋報逐處差下官貟依舊管勾其事説諭報和使郝刺史非不委細近日有隆安府路户曹田子正儀工曹何企常等来到告稱大宋人馬入府拏了知府姚璠通判郝伸子儀等透身前来又據威勝軍司録王孝悌稱探知大宋人馬待来本軍收拏以此走来才待移文理㑹次今年三月二十八日游騎來報廵到團栢鎮南不覺撞出南軍擐帶衣甲衝突先放弓箭不免迎戰退敗捉得軍人一名問稱隆德府官貟已經拏下前来到南関駐劄者須至公文牒勘㑹太原府雖承國書交割其府稱有所奉㫖揮不伏交割兼前件軍府又是官軍所到攻畧下處所並係申奏該在囘書未經了絶今来如何便縱軍兵強拏留下管勾官員及前来屯駐似属變渝誓約况當府重兵本爲分畫之事不肯了絶乆駐此地所銷草料湏因土民洎縱人民般取其中多有無知之人拒抗不服以至軍兵忿争又知諸處救軍前来不免遣軍體探致有累路居民相驚作過凢此等並関引惹生事及関分畫之事早不了絶致有如此若不移文理㑹實慮不見分白事湏牒文大宋三省樞宻院到請照騐前件洲軍並係已具申奏書報見今分畫未見如何輒縦軍兵收拏留下官員及前来屯駐早具端的公文回示故牒天㑹四年四月日宋主回書孫因使副蕭仲㳟趙倫回并附黄絹書四月七日大宋皇帝致書于大金國相元帥重㝷盟好當脩往問之儀申遣使華来示交懽之意允懐信義良用嘆嘉方此清和勉綏福祉白黄絹間諜結搆書大宋皇帝致書于左金吾衛上将軍元帥又都監耶律太師昔我烈祖章聖皇啼與大遼結好于澶淵㪟信脩睦百有餘年邊境宴然蒼生蒙福義同一家靡有兵革闘爭之事通和之乆振古所無金人不道稱兵朔方拘縻天祚翦㓕其國在于中國誓和之舊義當興師以拯顛危而姦臣童貫等違國擅命沮遏信使結納仇讐購以金繒分據燕土金匱之約蔵在廟祧委棄不遵人神恫怨致金人強暴敢肆陸梁俶優邊境逹於都畿則惟此之故道君太上皇帝深悼前非因成内禪肆朕初即大位惟懐永圗念烈祖之遺德思大遼舊好輟食興嘆無時暫忘凡前日大臣之誤國搆禍者皆已竄誅思欲興亡繼絶親仁善鄰以爲兩國無窮之福此志旣定未有能逹而使人蕭仲㳟趙倫之来能道遼國與燕雲之遺民不忘耶律氏之徳兾假中國詔令擁立耆哲衆望所属冝乎國人無如金吾都監太師者適諧至意良用忻懌嘗聞金吾都監太師前爲遼國将兵数有大㓛謀立晉王實爲大遼宗社之計不幸事不克就避禍去國向使前日之謀行晉王有國則天祚安享榮養耶律氏不亡然則於天祚不害其爲忠而於耶律氏之計則至忠矣宗室之英天人所相是冝繼有遼國克紹前脩以慰遺民之思方今總兵於外且有西南招討大師同姓之助雲中留守尚書碩忠之佐一徳同心足以共成大事以中國之勢竭力擁衛何有不成謀事貴㫁時不可失惟大師圗之書不盡言已令蕭仲㳟趙倫面道委曲天時蒸溽更兾保綏白靖康元年四月日宋主再乞免割三鎮書靖康元年六月九日大宋皇帝致書于大金國相元帥本朝講隣國之懽累年於此矣歳時之聘金繒之奉所以結好於無窮者禮未嘗有闕而日加於前謂冝共保懽盟萬世永頼比因邊方邀功生事遂致傳疑連兵搆禍深入郊甸深惟厲階生自叛将而首開邊隙者乃異時主兵之臣原其誤國之罪不可勝誅旣正典刑以謝天下奚皇子郎君㝷承通好以致退師固常遣使申諭三鎮及戒所過不淂邀遏囘兵而三鎮之民以死固拒且復懐戀堅守不下大朝雖欲令固不能使之必從再念邊隙之啓在於往年之姦臣而兹用兵之端不自本朝之今日兩國之人披堅執銳皆以忠孝各爲其主乃使暴露原野肝膽塗地恐非上天好生之徳亦非彼此愛民之意是以復遣使介請以三鎮稅租納充歳幣其燕雲舊地則不敢有愛用使南北之民各得其宜上合天徳下當人意永享長乆之安利固亦仁明之用心深惟忻代之師專從統帥想於議租之事或未詳知重使来師淹留吾地兹用聞命專從使詳告本末想惟聰亮亦所樂聞有少禮物具如別幅真珠蹙結束帶一條左副元帥囘書七月二十三日大金骨盧你移賫勃極烈左副元帥謹致書於大宋皇帝闕下適因專介祗受緘封旣䝉示其忱悰疊承遺以聘幣理宜復辯廼具幣章謹按今年正月十五日誓書分畫太原中山河間一帶比至立了疆界屯兵以来於内別有變亂當朝應管擒制交送者今雖未服向所言出於至誠則縱此不服亦冝自制副於前言以示篤和反云戒所過不淂邀遏囘兵當府故謂若不蒙戒嚴則想皇姪之師未克易退乎况竊三府以死力抗而云非自本朝之今日失信如此誠意安在燕雲之地係皇姪已言之事何由再舉又来書再念邊釁之啓在往年之姦臣今復不守約累遣兵衆㓂援太原目下又聞人馬前来徒使愚民遭罹孥戮此實可愍繫自于誰的非仁明之用心也若長懐此志果爲後悔當府已具細申奏取候㫖揮次伏惟照察律啟微凉佇膺多福今因閤門宣賛舎人張亢回謹奉書陳謝以聞謹白兩路元帥府差官問罪書先爲遣使人蕭仲㳟趙倫報復割三鎮囘授黄絹書及三省印御寳分印結搆間諜之事至是告發天㑹四年八月十四日大金骨盧你移賫勃極烈左副元帥皇子右副元帥同致書于大宋皇帝闕下頃因起釁以至連兵曲直所歸彼此自見思淂㝷盟之計用申割地之言厥後事固稽留約復渝變况上皇之鍳未逺抑亡遼之戒在前誠思再造之恩可忽輕忘之意旣乆保有成之信盍早畫元議之疆曽自爲辭管行制送今則反假土民之固圉更張軍勢以解圍兹事難圗昔言安在廼者差蕭仲㳟趙倫等賫書報復囬日輙受間諜之語隂傳結搆之文敢蹈前非又在今日爲此㝷申過朝廷奉到宣命該據兹釁惡更踰上皇仰就便差官問罪從長相度施行今差保静軍節度使楊天吉昭德軍節度使王汭充問罪使副前去若深悔前非請速令皇叔越王皇弟鄆王太少宰一貟同詣行府賫書陳謝過咎仍據元割三府即行戒諭並令開門以待撫定苟不能此的示所圗白書外聞逹事件一昨據當府領兵至髙郵縣有元差去人使王介儒撒離母與差来宋彦通郝拯等同報講和備領㫖意續允廸至脱言交割太原府請先去計㑹本府官貟開門仍遣郝抃復報依准施行去時㝷差附奏切以太上皇承先皇帝之恩言不盡意後因棄徳結絶信使事至于今盖邊臣與執政通連邀功所致具此奏聞去來一據前項報和使副此時備言上皇自省前非傳付今上應有誤國姦臣並已貶竄顯是至誠㸔詳和事未審能保願以永敦大信是爲長計亦委具此附奏去来一遣郝抃囘領兵至太原府見依舊堅守尋問路允廸如何不行交割却稱囘到本府文字言交割朝命在先所奉堅守朝命是後致難開門兼姦細人等處獲得其真定府劉鞈書云李綱宻奉聖㫖委令堅守隨冝措置當府爲数處議同及路允廸告乞申覆朝廷諭以允廸上皇自省前非巳經禪位今次决無再有渝盟定是姦臣依前邀功所致若欲申禀請就便施行由此路允廸曽經奏審日後更無求耗此上量摘軍馬屯駐圍守本軍還赴西京前次太原府都統所申宋兵数路屢来援府足仭先發釁端事不得已遣兵迎敵並皆掃㓕又於七月遣到張亢計議三府續發大兵節次前来亦戰殺殆盡㸔詳来意全是穏誤敵情潜畜毒惡欲解重圍非是誠實與當府預惻詐和先於郝抃䖏所言並同一當府切念昨以上皇禪位蓋撫邊帥臣誤國今即屢彂大兵来援太原府亦是姦臣所造深慮蔽䝉前後敗亡諸路軍兵巧誕奏聞不使上知一貴朝若遇復㝷舊好慮以止圗益已或不從本朝所欲决難休和因何舉此若許貴朝謀便終歳連兵又佀今日願不聽納姦臣乞以至誠脩睦勿虚示甘言包蔵異心非惟貴朝大金利便兩朝各有益國决千萬年一若𣣔准前休和乞依差去使副所賫書内事意施行除書事目外攻下太原續有聞逹事理一當府依准所奉聖㫖委差楊天吉王汭等充問罪使副元限行府比到太原却𬋩囘来洎到太原其人等猶未還界稱早已牒取接伴去訖當府㸔詳應是爲已宻令堅守猶有謀圗復故指人使不早過界緣太原已是割属本朝理當存惜却爲終不從順於九月三日恩怒縱軍攻取晝時便下闔城大小職官軍民並依軍法施行訖外張孝純并男浹二人爲是故違再結懽好爲首柄定府人不令依准交割殘損了太原府路生靈無数其罪並在前人父子合要張孝純在南骨肉以此留在軍前唯守候家属乞賜發遣更慮姦臣奏言張孝純是爲國盡節忠臣不可分付儻或聽納終難杜絶渝盟必難休和若是依准發遣今後姦無敢再犯須是事出至誠使鄰國可以信重宋遣和議國信使副書七月日姪大宋皇帝桓謹致書于伯大金皇帝闕下昨日告發知有絹書姦人作僞何所不至若兩國通和帖然無事則無隙可乗姦人不利縁此搆造意在離間頃者按治已正典刑諒惟聖朝特加洞照遣王雲去面道其詳王雲呈覆雲等奉本朝皇帝口宣自今春大兵至城下荷大金皇帝許再結懽盟皇子郎君成此恩惠社稷再安生民休息但本朝大臣有懐姦之人致信義有虧今盡行竄逐專遣使三畨陳謝有下項事令雲等告求皇子郎君三鎮有本朝太宗皇帝行宫祖先陵寝在内及諸州民情愚迷顧戀若行討伐百萬生靈性命可憫欲以稅租折爲銀絹三十萬代割三鎮通舊来歳幣銀絹五十萬每年共計八十萬又犒賞金銀初承示及大数當時大臣不契勘的實爲報㝷以庫蔵初有及宗廟器物又搜索民間只得已納之数已荷皇子郎君矜察量減金銀表段及許以珠玉寳器等充折大臣又不曽開具所折之数後来取於外郡亦以目前姦臣用事費耗略盡今罄府庫應副犒軍之用恐必不能如数實出窘匱若不披露又恐食言晚夕念慮惟皇子郎若仁明裁恕减免其歸朝官昨已指揮發遣亦縁姦臣奉行稽滯今令所在隨逺近津遣前去自大聖皇帝通好結盟中間本朝姦臣誤國致煩用兵来城下荷皇子郎君傳大金皇帝宣命許酌中講和今増歳幣銀絹代割三鎮减免犒軍物数則恩深厚珠玉幣帛不足以昭致謝之意兼此日皇子郎君曽舉言下項禮数今惟大金皇帝開境數萬里撫有諸國欲以皇帝車輅衮冕等物爲謝及令使人附宰臣等表奉册寳増上尊號仍令三鎮之人遇大金皇帝生辰齋僧十萬人祝延聖壽已上物儀候得皇子郎君允許増歳幣代割三鎮及减免犒軍物數書即專遣使賫詣大金皇帝闕下右謹具呈伏望皇子郎君體亮本朝皇帝遣使三畨告求和議免割三鎮等事特賜垂允大軍早囘恕貸真定等處生靈之命乞令雲等先囘奏伏候令㫖靖康元年九月日和議國信副使武翼大夫馬識逺呈覆和議國信使太中大夫試禮部尚書王雲宋再遣使乞免割三鎮増歳幣書靖康元年七月日大宋皇帝致書大金國相元帥比因專使嘗已布書具載悃誠想加通亮但以三鎮之民懐土顧戀以死堅守雖令不從遂致宿師引日已乆重惟兵民各爲其主困于暴露深可憫傷是用欲以三鎮歳租充歳幣既不失通和之議抑亦爲長乆之圗諒惟仁明必能矜察已遣使大金皇帝及皇子郎君今再命單車復陳本末願加聰亮有少禮物具諸别幅秋暑尚煩更希保䕶白左副元帥囘書天㑹四年九月十六日大金骨盧你移賫勃極烈左副元帥致書于大宋皇帝闕下謹按来書已别遣使大金皇帝者竊見大朝凡有事繫于聞上者臣子之分不得輙自施行但不知貴朝體例如何然其赴闕人使具申奏取候指揮盖不敢擅為接引外三鎮堅守事粗知子細今来却稱三鎮之民懐土顧戀以死固守雖令不從誠意安在若𣣔以稅充歳幣肯於從初議約交割以立嚴誓嚴誓才立今又别議想其用意徒然以僞計苟望歸復縦不克遂須幣土民觀其大原誤於前謀堅壁不降盡遭屠戮此之事節猶未理辨况先准已降聖㫖遣使問罪去訖所望諸事並依已去書意分白垂報仍自今後似此無信事理幸無遣使虚勞徃復律正極凉佇膺多福今因太常少卿陳之詳等回專奉陳謝以聞宋復遣使告免割三鎮書靖康元年七月日大宋皇帝致書大金國相元帥間常遣使咸得及疆往布斯誠諒惟深察情義旣接和好斯通初兩軍元帥許割地而盟聞大金皇帝有酌中之語因知令德信是寳鄰旣而太原生民嬰城固守雖遣大臣特詔戀土終深遂致攻圍之師不免暴露於野守臣求救既以忠孝爲言将士請行欲展急難之義雖非元約乃亦常情事湏改圗可令永乆願以賦租之入習以歳幣之常還守舊疆何違信誓盡除疑梗幸不置於胸中雖有短長兾亦忘於度外如其聞可将見平寕愽易交通不乏四方之貨耕耘自若遂安兩境之民可保千年定如一日上符天道下順人心竊計髙情實同至願有少禮物具如別幅今差秘書少監李若水別幅金箱玉透犀帶一條玉酒器五件瑠璃器一十五件瑪瑙器一十五件玳瑁器一十五件珊瑚七枝内二枝沉香五十両右謹專獻上國相元帥請檢留白回南宋書天㑹四年十月二十日大金骨魯你移賫勃極烈左副元帥致書于大宋皇帝闕下㑹驗今年正月十五日誓書三鎮比至立了疆界屯兵已前于内若有變亂處所當朝自管應當擒制交送者今承来書守臣求救既以忠孝爲言将士請行欲展急難之議則上所立嚴誓大宋皇帝自爲渝變而王雲等至皇子右副元帥軍前所承事目稱奉本朝皇帝口宣本朝大臣有懐姦之人致信義有虧由此而言則罪歸於臣下也豈共事之中異端若此之多因未知所言孰是可取又来書云願以税租之入増爲歳幣之常者且以三鎮之地土人民旣割爲我有其所出租稅必竟何歸此雖不敏亦望粗暁况聪明者乎又王雲事目今罄竭府庫應副犒軍之用恐不能如数實出窘匱以此詳味特謂弊府唯貪犒賚之用且官兵所以舉者蓋行弔伐之義也尚所見如彼是知貴朝之不知罪已而惑之深也此中事理早遣人使入國問罪日月淹乆猶不囘程幸望髙懷從其弊幅微寒屇候善保多福今因秘書少監李若水等回專奉書承謝宋宣撫判官書九月十五日朝議大夫充徽閣待制樞宻院都承㫖河東路宣撫判官折彦質謹遣修武郎呉革脩武郎李梲致書大金元帥國相閤下彦質聞和乆而不能信則必戰戰乆而不息則必復和自簡册所載多矣不特今也自頃兵連而不解三軍暴骨已歷三時此亦上穹悔禍兩國結好息民之時也㳟惟主上皇帝㳟儉愛人出於天性視民如傷無此疆彼界之異二邊搆兵非其本心凡近日将相大臣弗克欽承與夫謀國不臧爲天下生事者皆已黜之逺方永不復用彦質亦新命来典兵戎之寄陛辭之日仰承聖㫖深念生靈蹈兹塗炭至勞寤寐惻怛之訓丁寕切至皇天后土實鍳臨之比遣信使三軰王雲等躬詣大金皇帝闕下遣楊節度使及燕雲中軍前且道永結歡盟之好計其道理當巳有逹乎國都者又㑹闕下遣楊節度使至威勝軍前邊吏以聞此固以契主上皇帝聖心之所憫矣已聞臨遣官僚徃迓信使又飾邊吏日竢動息其誠意端慤亦可見矣彦質以不材謬當斯任切料天地鬼神已有休息生靈之意故兩國皇帝各形至誠惻怛之心棄捐細故永保大和斯民大㑹可勝言哉彦質與閣下俱在疆塲儻各能體國願戒守兵之官按兵不動勿相侵優以竢盟誓之必成和好永結則北方軍民必免鋒鏑之禍流離之苦其受閣下隂徳大賜豈有窮已伏想仁明必能垂聽洞然而不疑也秋氣已凉伏兾善護寝餗以介福履謹奉状布執事不宣宋謝過書靖康元年九月二十八日大宋皇帝致書大金國相元帥近者李若水去想巳伏謁麾下奉書以道其略遣使以陳其詳諒惟英明特加用察昔在潜邸講學惟勤其於政事一不與聞忽䝉内禪驟覧萬機適當多事之搶攘未嘗諳練不免大臣之獻納悉以聽從無何姦邪輙生詿誤逮言章之交撃方悔悞於前非隨加竄流使瀕於死然亦晚矣追之何及惟國相元帥器度宏逺智略沈雄他邦之人莫不欽重囘易荐至情義藹然感憮之私言不能旣或聞統衆入至真定嘗遣請和之使往詣闕庭當蒙從欲之仁各安疆埸幸收兵而静謐必俟命於斯須頃被初恩更祈終惠克符願望豈勝感銘别録本朝和議使鄧紹宻回日皇子郎君令舘伴蕭實導意欲得白花蛇除巳附一合送皇子郎君外恐國相元帥亦欲得之以一合附送酒五十瓶果子四合茶一合風藥一合白花蛇一合右請檢留白宋宣撫司牒大宋宣撫使司牒大金國軍前契勘日近准朝㫖已與大金國講和約束諸道不令進兵及於九月中旬大金國所遣和使赴闕去訖近又據河北路開報稱所有大金國人兵昨曽在真定府等處日近並各未聞抽囬詳此兩朝信約固以聖明兼不住承准朝旨惟務約束不得生事日近㨿汾州平陽府等處申報各有大金國人馬抄畧致人户驚優不安深恐縁此有害和議須至移牒者牒專差人賫牒前去請詳此速行約束彼處人馬務在戢歛各守信約無致抄略驚優致有害兩國請和大議謹牒靖康元年十月三日牒朝議大夫充徽猷閤待制樞宻院都承㫖河北河東宣撫判官拆資政殿學士銀青光禄大夫河北河東路安副使劉太尉鎮洮軍節度使同知樞宻院河北河東路宣撫使种都部署司囘牒大金山西兵馬都部署司牒宋宣撫司准来文云云須議囘文契勘㑹近奉元帥府露布左副元帥報今月十五日占鎮真定府先鋒軍都統申汾州不伏招誘今月八日攻下當司想其真定必不願歸蓋以大軍攻下一同汾州况近日元帥府已遣使徃貴國問罪雖知前去至今尚未囘来是致大軍未聞抽囘今承来牒既與議和應是貴國自以渝變前盟為罪添割地土請和交過本府遂致開門引納重兵撫馴了當則其餘應合本府占守州軍縣鎮寨関監亦宜逐旋交割接納王師益恊所請請議和得息生靈不然則止有傷朝廷合撫人民亦恐貴國不獲安便自兹愈深事須囘牒大宋國宣撫司到請照驗施行天㑹四年十月日牒宋宣撫判官書此書不荅以其僣越無禮不足與論故也十月十日朝議大夫充徽猷閣待制樞宻院都承㫖河北河東路宣撫司官折彦質謹遣脩武郎劉寳致書于大金元帥國相閤下彦質聞古者兵交使在其間此言小忿不廢大信也今兩國搆難逾三時矣而信使載馳禮聘交修則知王者舉事信義爲本非若㝷常貪土地矜殺伐之流可比方也故日者輙以尺牘具言本朝丁寕懇惻之㫖竊意上天悔禍欲令兩朝皇帝捐細故保大和其指甚明僕仁人也旣乏蘇秦犀首之辨口以反移從約又無燕卿齊庻之誠心以感動物蒙徒以區區之志闒瑣之論側聽逾旬無所發明懐不能已復進強瞽夫好生者帝王之大德也體國者人臣之至分也故上有不忍之仁則下行愛民之政上有不貪之惠則下盡無求之節况於居輔相弼諧之任當疆塲爪牙之寄不肆欲以窮取惟内恕而及物此固賢逹明智挺立古今之表者故閣下胸中素定而兩地之人所望于閣下者也僕於平昔竊欽高義幸得溝綏靖之職居顧盻之地望旌旗而係心聞金鼓而增氣今信使入朝話言方洽惟須逺圗以荅天意幕府所以日夜驚勵切戒吏帖焉自戢義不當以又使北向而關弓者也今游騎駸駸時獵於近郊細民無辜或困於劫執彷佯乎雞肋之獲而忽眇乎丘山之重竊仰閣下之謀猷義不出此意者偏禆未逹兩朝之大計也伏惟閣下以髙世之才居特尊之位舒慘歸其嚬笑安危係於静作號令所留草木􅋏然亦何惜隼使一箭之令使兩地生靈得以泰然歌詠閣下之功徳無窮之報施者僕雖不才願附羊陸之義惟閣下裁之不宣彦質再拜宋復遣使謝請和使書係楊天吉等問罪回書靖康元年十月日大宋皇帝致書于大金國相元帥皇子郎君累常遣使相繼奉書今已淹時必開鍳意雖難盡言亦頗周儻爲繹思必加孚察大抵誰人無過貴自知旣克改於前非當徐觀其後蹈昔在東宫之日但歷覧於群書逮登寶位之初乃乍臨於庻政姑聽徔於宰輔不億度其姦欺難掩臺評㝷加憲責静言既往雖悔何追今者恵書意皆切理但三府乃祖宗之地况本土有陵之廟當務安寕乃經驚優興言及此爲緒無聊雖殫累百之詞更致再三之懇是髙明之徳易知愛孝之情當愠而和式見色容之量旣取而與尤爲特逹之恩厚有被䝉終期報稱初冬尚寒更希保護大宋陳謝請和使朝請郎試尚書吏部侍郎武功縣開國子食邑五百户賜紫金魚袋王及之等别録青絲綾五十疋紅錦五十疋鹿胎五十疋合錦五十疋藥一合龍腦二百兩荔枝一千顆生薑五十斤乳塘獅子一百顆棖子五十對邠州蒲桃五十斤小龍團茶一十斤大龍團茶一十斤夸子正焙茶一十斤右謹專獻上國相元帥伏惟令慈俯賜容納謹具状申聞謹状囘荅書外事件一諭及上皇自省前非傳付今上應有誤國姦臣並令貶竄勘㑹議和文字别有貶竄此亦誠如来諭盖縁初膺傳國姦邪未見刑誅之事難以遽加然亦不乆漸逐不令在内今則或竄或誅旣已乆矣後以不明繼用呉敏李剛呉敏則爲少宰李剛則知樞宻皆居要地親執政柄不知元乃蔡京蔡攸之黨隂相交結欲報蔡氏之㤙希兾復用其所妄作一體蔡氏其所稱宻奉聖㫖皆其專輙所爲承信使面出帛書半印見之悚然豈不慚負此呉敏李綱相恊爲之初不加察爲所詿誤昨因言章交攻因先遣李綱在外爲宣撫使雖是總兵其實不令在朝然呉敏猶爲少宰中外相應爲姦不已自古将臣總兵不從中制故得自閫以外将軍制之所以李綱在外擅自發兵若諭誤國之罪可擢二人之髪今則呉敏李綱皆以竄逐遐裔一見諭願不聽納姦臣至誠脩睦此乃善言見誨徳意甚美豈勝感服大抵天道昭然咫尺可畏况爲人主臨御萬民一言一語何可不思旣許講和願觀其後一天下之情逺近皆一暌間則疑生和㑹則疑釋兩朝搆兵初因暌間雖有使人去来書辭徃返然言不盡意未免生疑惟在聰明深加孚察一承差信使人未至本朝聞先遣二人持牒威勝軍界威勝軍小處不敢便申朝廷先申宣撫司是時宣撫李綱身在懐州見牒有問罪之名知罪在已畏懼朝廷必治其罪於是巧説遷延不以聞逹其後威勝軍奏到即便時發遣接伴在河陽等候多日不聞来耗朝廷再三催促方知軍前信使入界古者兵交使在其間若非李綱挟情豈有稽留之理一彂遣張孝純家属垂情講好蓋亦憐無罪之民爲首就誅冝可緩也已孤之旅使悲號而載路冝慈惠之動懐彼微類何足以除况威名已著于逺聰明幸察㫖意無犯一亡遼人有未發遣契勘亡遼人在此逺近有之其有官人皆是額外添並不令管勾職事無補州縣徒費禄廪自欲發遣非所占吝向者發遣正在優攘之際㓂盗縦横塗路艱澁多遭攘奪亦被殘害致老㓜失所深切憐憫一等生靈更無彼此只候通和既定兩境帖然即資給逐人安穏發遣元帥府書以黄河爲界大金骨盧你移賫勃極烈左副元帥致書于大宋皇帝闕下近日㳟依宣㫖遣使問罪来意雖以委任不當爲辭然不肯服罪致領重兵河北河東兩路齊進所經州縣軍府服者撫之拒者攻之今月十六日已到澤州界不徃前進及所遣先鋒今月十四日已過黃河不施船栰不由渡口直涉洪水諒以洞悉載惟大宋屢變盟言若不以黄河爲界終不能乆故今議定河北河東兩路先行収撫其中或有来自河外者不選甚處人民並許放囘請差近上官貟前来並合一例存撫然念抛郷之人亦議定自河外見在兩路未下州府官貟兵人並許放囘請差近上官員前来交割引出俾見家小仍服罪訖一面先具凢所聽命不違國書囘示如或不見依從稍爲遷延将恐别招悔咎律正凝寒善祈多福今差保静軍節度使楊天吉昭德軍節度使王汭孛堇撒离母前去奉書陳逹不宣李若水状大宋河東大金軍前告和副使徽猷閣學士朝奉郎隴西縣開國男食邑三百户賜紫金魚袋李若水准勑再差充河東大金軍前告和副使與告和使知樞宻院事馮獬同行今月十五日起程賫奉本國皇帝交割三鎮國書暁諭三鎮勑榜及詔路允廸張邦昌依元約施行文字竊恐遲滯若水巳兼程先来差使臣王深尹宣蔡松及丘吉吕青前去軍前報信伏望令慈特賜照㑹施行靖康元年十一月日大宋河東大金軍前告和參議武翼大夫武功縣開國男食邑三百户王履状大宋河東大金軍前告和副使徽猷閣學士朝訓郎隴西院開國男食邑三百户李若水馮獬状大宋告和河東大金軍前國信使中大夫知樞宻院事安西縣開國子食邑四百户賜紫金魚袋馮獬右獬祗承朝命㳟造行臺輙犯威顔兾㝷信誓赦既往之不咎許惟新之是圗二境兵戈庻有息肩之漸兩朝懽好無握手之期冐昩而来匍匐以請獬年當衰邁位沗樞機得罪先朝㡬死凶邪之手受知今聖誤叨将相之權常懐欲報之心逐備告和之役趨瞻在邇喜懼交深謹具状申大金國相元帥伏候令㫖靖康元年十一月日大宋告和河東大金軍前國信使中大夫知樞宻院事安西縣開國子食邑四百户賜紫金魚袋馮獬状宋主書告和願割三鎮靖康元年十一月日大宋皇帝致書大金國相元帥專馳使介逺布悃誠今春大軍俯臨郊甸㝷以上皇傳位之意引過請和承大金皇帝子元帥奉伯大金皇帝酌中之命特脩舊好㝷報知大金國相元帥並令班師信義之重比堅金石於是宗廟再安生民頼慶乃割三鎮以謝徳惠旣而諸州民情愚執群臣議論二三往復告求致淹時月葢縁寡昧失不詳思誓約之盟豈敢輒易果煩大軍来詰兹事中外震動不遑寕居禮旣有虧追悔何及過而能改請踐斯言其三鎮之地今並依正月所立誓書交割施行惟兾兩路大軍早囘使趙氏二百年社稷永保億萬生靈全其性命仁恩之大山海難喻自此傾城萬世不易上天實臨百祚在列何敢背違自取殃禍今遣知樞宻院事馮獬徽猷閣學士李若水充告和使副緬惟英哲必惟矜從寒律方嚴倍加珎嗇白一今来交割三鎮並依今年正月誓書已詔路允廸依應施行其交地官就差滕茂實一交割三鎮慮人民堅守已出勑榜告諭開門其師臣守令以下官吏兵民及其家属財物并客旅道僧隨行物色凢係内地人依今奉貴朝暁諭彂囘更煩詳諭所委官貟如欵施行一交割三鎮諭令開門若甲兵稍近即人心疑懼莫敢便出須煩令㫖移兵近北稍逺止令貴朝官貟好語説諭即人方安心兼若擁併而出顛沛於路無不受斃幸不慛促令其收拾如約而歸将来發遣北地官民敢不如是一北地官民已委隨處提刑責知令佐隨逺近次第盡数發遣仍給盤纏差人防護至界交割一犒軍犒設兩軍金銀初大軍到城下庫藏所積旣以罄竭遂取宗廟祭器及宫中器物又搜索民間雖釵釧之類亦巳鉟銷至如宰相及百官所繋金帶並括取不遺然止得昨来已送之数後来取於逺方州軍亦是日前耗費盡今盡㡳搜索止有金二萬五千兩銀三十萬兩見續次發遣自知微細不足犒設諒惟特加矜察貸免所欠不勝慙怍靖康元年十一月二十二日大宋皇帝致書大金國相元帥昨自太上皇航海遣使請求幽燕特承大聖皇帝異恩委割燕雲兩路猶爲不足手詔平山張覺招納叛亡由此遂致興師今春河北路皇子郎君兵馬先至城下太上皇自省前非㝷行禪禮遣執政以下屢告爲有再造之恩割以三鎮酬謝又蒙國相元帥雖已撫定威勝隆徳汾澤髙平等處爲念大義已定秋毫不犯亦便班師止以太原爲界續承使人蕭仲㳟趙倫等至報諭恩義被姦臣邀功復便聽從依前附使間諜大金功臣及舉國動兵以援太原詔新割州府堅守不從及承問罪不勝惶恐今蒙恵書兼来使保静軍節度使楊天吉昭徳軍節度使王汭孛豈撒离母䟽問過惡皆有事實每進一語愧仄愈増今日之咎自知甚明今准割黄河爲界貴國兩朝安便所有蔡京身亡王黼童貫已誅馬擴不知所在呉敏涪州安置李綱䕫州安置張孝純先知太平府詹度湖南安置陳遘見知中山又係在逺及不知去處便當根逐一依来命今遣同知樞宻院事聶昌賫送詔命令黃河東北路州府軍縣人民悉歸大金仍依来示一一專聽従命不敢依前有違以立信書今乞早爲班師以安社稷至願至懇白今具下項蔡京責授節度副使昌化軍安置已死童貫責授節度副使吉陽軍安置已誅王黼責授節度副使衛州安置巳誅李綱責授節度副使䕫州安置呉敏責授節度副使涪州安置馬擴昨任真定州路亷訪使今不知存亡詹度河南安置陳遘見在中山張孝純家属聞在徐州或南京河北河東兩路州府軍縣人民河東聶昌前去交割河北耿南仲交割弔伐録上弔伐録下聶昌説諭河東士民昌啓守土之臣自合遵奉朝命令守則守令棄則棄今旣有敕書令割與大金何必區區堅守即今若堅守則必招大兵攻打殘破應河南官員軍人百姓商旅旣不得南還而土人又不免屠戮之禍何可遂復業耶况於京城危迫如此方藉交割以退師儻若稽緩豈不誤國大事今交割兩路河北則差耿門下河東則親賫詔書朝廷危迫之意可知矣昨者備坐聖㫖約和通以次出城靣議旣不略至城外審驗是非諭問端的輙下矢石引兵出戰殆非體認朝廷危迫之意昨晚又遣三軰賫勑書徃又復無報不知公等意欲何爲今交割大帥亦不以城中拒守爲怪但欲疾速交割以了國家大事開門之日秋毫一無所犯放官兵啇旅南歸皇天后土實鍳臨之幸早爲之所無疑慮若稍遲大兵一至悔無及矣昌舊名山六月間賜今名恐公等未知故以奉聞古者交兵使在其間盖欲通彼巳之情也昨晩親詣城下遣使臣賫劄子奉聞輙下矢石又再遣三介賫敕書去亦不見還豈非所傷乎他國遣人尚不可如此况本朝皇帝遣一樞宻親行而所差去皆朝廷之人不知輒固拒何也請深思之無貽禍宋主與河北河東勑敕官吏軍民等頃者有渝盟約致大金興師朕初嗣位許割三鎮以酬前恩偶縁姦臣違誤三府不割又閒大金功臣再致興師使河北河東之民父子兄弟暴骨原野夙夜以思罪在朕躬念欲息生靈鋒鏑之禍使斯民復見太平莫若割地以求和講兩國之好是用黄河見今流行以河北河東兩路郡邑之民属之大金朕爲民父母豈忍爲此盖不得已雖居大金苟樂其生猶吾民也其勿懐顧戀之意應黃河見今流行以北州府並仰開門歸于大金其州府官員兵人即依軍前来書許令放囘南地速依令敕勿復生疑故兹示諭想宜知悉冬寒汝等各比好否遣書指不及多勑付諸州軍下項一河東路岢嵐州隰州保德軍憲州火山府忻州遼州太原府汾州懐州寜化州平陽府石州平定州絳州威勝軍澤州隆德府代州一河北路濬州衛州相州磁州洺州邢州趙州真定府中山府永寕軍深州析州北平軍河間府莫州安肅軍順安軍廣信軍雄州保定軍信安軍保州覇州樞宻院告諭兩路指揮樞宻院勘㑹昨以大遼失政興師弔伐有大宋遣使航海請割幽燕元係五代䧟于契丹朝廷方務善鄰才獲幽燕即割全地歸復界至此乃朝廷有大造於宋也不料大啟貪心潜謀不軌結搆平山禍及宰輔招納民户接引叛亡然朝廷尚存大體敕戒邊臣惟索人口之外一無理辨亦可謂包容之深也而彼人猶不悔悟飾詞隱蔽譎語百端及云本朝幅貟萬里民居散漫無䖏根㝷又於疆場多方作過去冬宣委元帥府興兵討罪兩路並進有皇子右副元帥先到汴城舊主奔逃竊行襌位盖亦自咎也新人嗣立哀泣告和遂成所請惟割三鎮以贖其罪即時班師何期誓墨未乾盟言巳變宻勑居民嬰城堅守續遣大軍㓂援河東雖每遭覆敗尚不知改過再奉宣㫖重行弔伐先以黃河爲界除兩路前次攻絳州府軍縣州先遣先鋒軍今月十四日平涉洪波昔所未聞非夫獲罪自天豈有如此之異盖亦自作之孽故也仍遣人使説諭此意及帥府今月二十七日駐泊永安軍宋方致書云深悔前非聽命不違别差門下侍郎耿南仲同知樞宻院聶昌前去交割黄河以内州府人民並歸朝廷再念彼民以其易主寕無顧戀之心然乆在薄俗早不聊生爾亦共知况今並許各居舊郷一無遷徙朝廷亦俟元帥府措置了日厚與存恤應自前日煩苛科斂重役諸般巧細糴買折變香礬塩茶之類凡爾疾苦候隨處所申到於民有害並與蠲除或有饒利亦與興舉亦見太平之日后讐之異當使知之合先告諭須至㫖揮河北路濬州衛州相州磁州洛州邢州趙州真定州中山府永寕軍深州祈州北平軍河間府莫州安肅軍順安軍廣信軍雄州保定軍信安軍保州覇州永静軍兾州㤙州青州河東路岢嵐軍隰州保徳軍憲州火山府祈州遼州太原府汾州懐州寜化軍平陽府石州平定州絳州威勝軍澤州隆徳府代州嵐州慈州河陽府河中府右下逐處可照驗就便及指揮所轄去處粉壁暁示管内官僚僧道耆夀軍人百姓比至相次別行措置規畫以来並仰向化爲業勿謂早不歸降別生疑懼仍比至正官到任須得自相告諭各務安堵兼河内州府人民應自来驚移自河南者見於宋國追索遣囘復業若隨處有逃散户口亦仰逐旋招集着業今隨處旣歸本朝冝同風俗亦仰削去項髪短巾左衽敢有違犯即是猶懐舊國當正典刑不得錯失付逐䖏准此天㑹四年十一月二十九日元帥府與宋書兵近都城天㑹四年閏十一月三日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下近楊天吉等囘特沐華音准割黄河東北路州府軍縣人民悉歸大金仍依来示一一專聽従命者當府照㑹訖深仞美意見差官同知樞宻院事聶昌分路交割去訖今勘㑹有數州在河内而来書不入交割之數所索官貟及家属多有漏落係使人理㑹不盡来書亦不見分明又不言後約以故兩路重兵巳近都城期在定一今差保静軍節度使司農少卿楊貞幹孛堇撒离母專往計議所有事宜並巳丁寕口諭前去幸望依従以副従命之言初陽在律善履多祺專奉書陳逹不宣宋書乞免攻城靖康元年閏十一月日大宋皇帝致書于大金國相元帥比者旌斾逺来跋涉勞止嘗通音問未徹聽聞念和議之巳成且使華之先辱再馳微物用表私衷幸遂免於攻城仍早還於歸騎以示兩朝之信克成萬世之懽郊野沍寒倍希保愛白又靖康元年閏十一月日大宋皇帝致書大金國相元帥比者累因專使布問想皆呈徹逺来特承書示備悉勤誠伏自今春國相元帥由懐州收兵還北敦結和好其於眷厚極用感藏継因闇於聽任遂生嫌隙雖自咎悔巳無所追是以王汭方行即令馮獬李若水等如諭交割三鎮及楊天吉撒离母與汭再来承議畫河亦便遣同知樞宻院事聶昌即日就道依諭前去所以每從来意誠欲休息戰闘全保生靈不謂旌斾當此隆冬逺至城下重勤跋涉深所不皇載念仁人之心必能周全少加衿察以終前惠收還兵馬不使攻城宗社獲寕民庻安堵其爲恩念何以比諭感幸之深言不能叙初寒在律倍兾保調白與宋主書天㑹四年閏十一月十三日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下頃者專使人仰期親㑹今辱書音雖云備悉而使人却稱大宋皇帝有懐疑惑者其所云躬親出城豈有他意但以前後所言一無誠信遂有是議以驗禀從今旣疑惑肯忍必也果若聽命不違據見去人使所諭事冝並依從更有事冝仍遣親信堪議論官同何㮚等不過此月十五日出城貴慿約喻比至結絶以来别遣上皇越王皇子親弟爲質今再差保静軍節度使蕭慶司農少卿楊貞幹孛堇撒离母等專去計議式當寒律善保多祺白取干戾人劄子童貫有子師楊師禮等蔡京蔡攸王黼李綱李彌大劉韐王安中馬擴詹度陳遘呉敏徐䖏仁折彦實折可求吕仲張孝純王秉巳上干戾人數滕茂實范直方李嗣本蔡靖髙世由巳上本身或有兄弟在本朝取家属圓聚趙良嗣并衆房伯叔弟兄元係北人折可存係歸降逃走又右班殿直張觀東頭供奉官楊忠敏自身張謙張兾特領長行軍二十餘人八月内走係忠順軍宋主遣士説往議靖康元年閏十一月日大宋皇帝致書大金國相元帥比者再承来使備見勤誠特免㑹盟尤佩厚意國相元帥遂引重兵方此沍寒衝冐勤勩頓師之乆不急攻城出於寛仁良用感戢所諭欲令親信往議事宜遣皇伯士説大臣馮獬前去載念惠好之厚更望曲全終始冬序方深倍惟調衛白士説等充報謝使書靖康元年十一月二十一日大宋皇帝致書大金國相元帥近者專使之還已有謝懇逺勤旌騎乆駐郊坰方此凝寒匽薄匪易内深慙灼良所不皇至於臨城攻撃頗緩尤仭来意出於寛仁極於懷荷載惟通和之乆徳業已深更兾始終便爲解圍永固懽好今差皇伯士說樞宻馮獬充報謝使副祈寒在律倍兾保調白囘宋主書係差皇叔祖漢東郡王仲温同知樞宻院曹輔囘書天㑹四年閏十一月二十二日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下介使復来音書荐至詳味再三徒深披閲而来使云一面攻城遣使有懐疑惑又云報謝通和乞好解圍者且今之所舉盖縁渝約雖有聽命之言未有聽命之實况以議定畫河特謂信湏差官同去交割而彼人反謀捉拏此之無信甚於去春遂議出質割城發送官負聽命遷都表信方許通和人使旣囘一無依從以故曽議進撃然念宗社不忍立墜且陳器備聊示攻城之勢本俟貴朝必圗悛悔而自謝和其安在必欲保全宗社永固懽和曷若並從巳諭表信有實則所謂解圍肯延時刻一諾之言争忍反覆如或執迷决無聽從敢謂安危之理灼然驗於臨時隆寒犯律倍多祺白宋主差李仔充請命使文字係二十五日破差李仔充往大金軍前請命景王祀充使謝克家副使李仔副使係改差與宋主書要近上官貟議事天㑹四年閏十一月二十六日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下累遣使人備陳誠懇縁以執迷未盡定一且朝廷全付燕雲盖務善隣而貴朝不爲厭迀遂昭背徳結構逆賊招納叛亡此釁隙之所以生也去春王師到城哀鳴請和願畫三鎮計許和好又圗不軌宻令堅守遣兵救援此釁隙之所以深也洎再舉問罪猶執謀計不肯聽命遂致事勢及此尚慮京人驚駭昨日遣李若水以下使臣入城以示慰諭今承遣到景王一行洞悉悛悟然聽命事大專俟更遣執政何㮚并近上堪與議事共同請命無以猶迷禍及平人專奉書陳逹不宣白宋主求哀書靖康元年閏十一月二十六日大宋皇帝致書皇子元帥乆蒙恩惠深用感銘不過尤尚煩責数比者大兵屡至城下危然孤壘攻撃何難及巳登臨猶存全愛方圗請命更辱使音特俾安心仍無後慮感極垂涕夫復何言謹遣濟王栩中書侍郎陳過庭求哀懇告切兾収兵天雪沍寒敢祈保嗇不宣白宋求再造靖康元年閏十一月二十六日大宋皇致書于大國相元帥軍前李若水等到特惠書誨及傳面諭指意備悉寛仁感刻難弭巳依寵諭遣右僕射何㮚濟王栩中書侍郎陳過庭前去請命更望再造保安宗社愛全生靈不勝恐懼哀祝之至雪候沍寒倍祈珍嗇不宣白宋求哀請命書靖康元年閏十一月二十七日大宋皇帝致書大金國相元帥大金皇子元帥比者遣何㮚等奉書想已呈澈危廹之懇必蒙矜憫言念和好之重出於薄徳聽従弗明以致召釁逺煩旌騎深所不皇然念来師徒旣登城堞何㮚濟王相等又来囘歸城内人情惶優異常撫諭不定深憂自致生事却使不能奉承徳意敢望特加存全早賜指揮少駐兵馬以安人心所有欲約事目一一謹即聽從便當㰱血著盟傳之萬世其為大恩何以此謹再遣使御史中丞秦檜徽猷閣學士朝奉郎李若水武翼大夫王履求哀請命祈寒應候兾倍保調不宣白元帥與宋書要上皇出質天㑹四年閏十一月二十七日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下弊章旣報美問復臻雖承懇告之言未副質親之素再叙悃悰更煩聽覧且重兵才至屡望㑹盟因謂疑惑乃從髙意惟索上皇巳下爲質而巳亦不依應遂至兵怒以至攻撃而一無他辭但云收兵其理安在况事勢及此冝從初議早兾上皇與皇子出質别差近上官貟交割已畫定州府軍縣及北望開撫定以来更遣逐府州長官血属執質仍使前項逐官親戚每州各一名同交割官前去説諭俾知納土又一面速送所索官員并家属緬惟照亮曲仞懇誠專奉書陳逹不宣白宋主乞上皇不出書靖康元年閏十一月二十八日趙桓謹致書大金國相元帥皇子元帥適何㮚等還伏領書示及已䝉約軍兵未令下城再造之恩何以論報且蒙恩許免親誼然欲上皇皇子出郊今城已破生死之命属在貴朝又焉敢拒但父子之間心所不忍如何躬一作往軍前求哀請命如蒙曲賜矜念更爲望行允從豈勝至幸如其不然自惟非德一作薄難勝大寳若蒙更立本宗但一作俾全性命存留宗廟保護生靈區區一身受賜已厚豈勝哀祈急迫懇切之至冬序嚴倍加珎嗇不宣白宋主欲親詣軍前書靖康元年閏十一月二十九日趙桓謹致書于大金國相元帥孫傅等歸傳来㫖欲得上皇出郊切以父子之間有難言者今欲親詣軍前祈哀致謝一作請謹先遣秦檜馳報不知當於甚日甚處㑹見如䝉賜諭即當依從冬序凝寒倍兾珎嗇不宣謹白送蔡駙馬書靖康元年閏十一月三十日趙桓謹致書于大金國相元帥皇子元帥近蒙恵書具見美意不勝感激所需姦臣親属謹令如命但以前此誤國盡竄嶺外獨京之子鞗見以除名勒停縁係駙馬都尉當時不曽逺竄今令樞宻都承㫖王徤押送軍前餘人以方在圍城中追究未得更俟續次根尋發遣不敢少有失信凝寒在候倍兾珎嗇不宣謹白宋主降表臣桓言伏以今月二十五日大兵登城出郊謝罪者長駈萬里逺勤問罪之師全芘一宗仰載隆寛之徳感深念咎俯極危衷臣誠惶誠懼頓首頓首猥以眇躬奉承大統懵不更事濟以學非昧於知人動成過舉重煩元帥来攻陋邦三里之城巳失藩維之守九廟之祀當成煨燼之餘不圗深仁曲假殘息兹盖伏遇伯大金皇帝乾坤之德甚愽日月之照無私不怒之威旣追踪於湯武好生之徳且􅓻美於唐虞弗念一夫之辜特全萬人之命宇宙載肅宗社獲安文軌旣同永託保存之惠雲天在望徒深郷往之誠無任瞻天望聖激切屏營之至謹奉表稱謝以聞臣桓誠惶誠懼頓首頓首謹言天㑹四年十二月日宋告諭合交割州府官吏指揮中書侍郎近者大金元帥統軍親臨責以失信京師備禦曽不踰月遽爾失守廼蒙元帥仁恩保全更不縦兵下城止欲敦篤舊好復申前言交自河以北地界皇帝車駕出城面㑹上表稱臣宗社再造惟候逐䖏州郡撫定了當方欲斂軍仍要逐䖏官員血属質于軍前才候交割了當便即放還其不在此間者亦必根刷去訖更要自日用兵及誤國凢干戾官員或有死亡仍取家属支散除竄在逺地差人取去外駙馬都尉蔡鞗尚不能愛惜巳行交割訖今據合割州逐一差官各賫詔書委曲告諭惟本處官吏軍民𬒳命之日冝即開門迎受一一遵禀所有本土人民便得安業獲免兵革之患其河南官貟軍民寄居客旅者各許歸還則血属俱寕公私無害在於今日愛君愛國明見事變速令約束乃爲忠義且前此州郡所以未服盖欲區區堅守以効臣節今者京城既破即與前日事體不同且以京師地大人衆城池阻穏若金湯尚不能保在爾一郡豈可拒抗儻或不従此言一旦城壁失守則不免盡遭屠戮之禍雖悔何追至如走出定湏追索仰仞皇帝須是交割必不隱諱復招巳往之悔即與干戾誤國人等無異今謹宣布誠悃之意再三播告惟本處官吏軍民互相勸諭上以安國家宗社下以保父母妻子無或執迷自取殘戮故兹暁喻各宜體認又准勅若係河外有係別路所管州府軍縣不入今来交割之数者亦仰一就交割本所全徃河北交割所有河東路今差參議官徽猷閣待制張宇發遣前去交割亦須照驗遵依施行宋主告收城上軍文字先蒙恩許如親到軍前即収還城上軍兵今来既巳出郊更望特賜約束縁見今城内民驚疑慮出城後或生他變不免再露悃愊切兾矜從以副始終保全之意宋主降表係令改定臣桓言背恩致討逺煩汗馬之勞請命求哀敢廢牽羊之禮仰祈蠲貸俯切凌兢臣桓誠惶誠懼頓首頓首竊以契丹為隣爰搆百年之好大金闢國更圗萬世之懽航使旌絶海嶠之遥求故地割燕雲之境太祖大聖皇帝特垂大造許復舊疆未閱歳時巳渝信誓方獲板圖於折木遽連隂賊於平山結搆大臣邀囘户口雖違恩義尚貸罪愆但追索其人民猶夸大其土地致煩帥府逺抵都畿上皇引咎以播遷微臣因時而受禪懼孤城之失守割三府以請和屢致哀鳴亟蒙矜許官軍纔退信誓又渝宻諭土人堅守不下分遣兵将救援爲名復搆結於使人見包藏之異意遂勞再伐並興問罪之師又議畫河實作疑兵之計果難迯於英察卒自取於交攻尚復嬰城豈非拒命怒極将士齊登三里之城禍延祖宗将墮七廟之祀巳蠲銜璧之舉更叨授館之恩自知獲罪之深敢有求生之理伏惟皇帝陛下誕膺駿命紹履鴻圗不殺之神旣追蹤於湯武好生之徳終􅓻美於唐虞所望惠顧大聖肇造之恩庻以保全弊宋不絶之序雖死無幸受賜亦多道理且脩莫致籲天之請精誠所格徒深就日之恩謹與叔燕王俁越王偲弟鄆王楷景王杞祈王模莘王植徐王棣沂王㮙和王棫及宰相百僚舉國士民僧道耆夀軍人奉表出郊望闕待罪以聞臣桓誠惶誠懼頓首頓首謹言天㑹四年十二月日大宋皇帝臣趙桓上表行府告諭兩路撫慰㫖揮行府勘㑹朝廷昨以大遼失政害及生民興兵伐罪收併将還大宋遣使航海願復舊来漢地係五代所䧟朝廷方務善隣才克燕雲即畫全地此朝廷始有造於宋不料天方肇亂一作禍自爲戎首結搆逆賊謀害宰臣招納叛亡邀囘民户朝廷不以爲咎惟索户口猶不悛悟乃云本朝幅貟萬里民居散漫難加根究無計可得輒以鳩集兇黨剽刼邊民侵掠畜產使不獲安終然不悟朝廷雖欲惻隐莫由獲已乃命行府興師問罪去春兵抵汴京上皇方知深悔亟行禪位嗣主求哀願畫三鎮復脩舊好無何誓墨未乾盟言巳變宻令堅守遣兵救援隂搆使人濳圖禍亂遂奉宣㫖重伸弔伐雖許畫河亦不以實閏十一月初二日大兵㑹於汴都猶不伏罪准備攻具填堞壕道巳踰十餘日當月二十四日進撃攻日城拔三十日國主出降今月初二降服上表望闕稱臣以正正朔令依元議差官前去説諭交割河北河東州府軍縣尚慮所在以早不歸欵爲懼或飾僞辭有緩撫定再念自河之内天啓洪塹巨限疆場昨来大兵所至其有迎軍納土詢省撫定其拒命者或有按以軍法或有示以寛貸皆臨時從宜措置想必共知今河北河東兩路纔候交割官員致彼説諭即仰逐旋燒毁樓櫓具状納土開門以待行府别差官員就去存恤應有前日重難徭役科歛諸般巧細糴買變折香礬茶塩之類凢爾疾苦並爲蠲除或有利亦與興舉今除土人外元係河南客居官員兵人商旅僧道欲願去留並從自意敢有執迷稍勞官軍臨日必無容恕合行告諭須議指揮右下逐䖏可各照驗就便及轉行所轄去䖏粉壁暁示各𬋩士民耆老僧道軍人百姓知委不得有違付逐䖏准此天㑹四年十二月十一日宋主謝書十二月日大宋皇帝桓謹致書于大金國相元帥累日授舘禮意勤厚亦旣覯止問勞稠重再造之恩何以圗報經夕匽薄之餘台體優𥙿謹遣使人承問興寝不宣宋主賀行府元日書天㑹五年正月一日大宋皇帝桓謹致書于大金國相元帥一氣逮通三陽交泰惟五兵之旣戢與萬物以皆春茂對休辰具膺純蝦更蘄保毓母慰願言不宣謹白宋言許面議書天㑹五年正月日大宋皇帝桓謹致書于大金國相元帥大金皇子元帥專承使㫖持示書辭慰懌之情無以為喻金銀巳令嚴切根括接續供納所有上徽號禮数冠冕車輅圗籍印板類謹以来日躬徃面議先此布叙幸賜照亮不宣謹白廢國取降詔敕趙桓省所上降表汝與叔燕王俁越王偲巳下宗族及宰臣百僚舉國士民僧道耆夀軍人于十二月二日出郊望闕稱臣待罪事具悉背義則天地不容其孰與助敗盟則人神共怒非朕得私肇自先廟開圗乃父求好我以誠待彼以詐欺浮海之使甚勤請地之辭尤遜折木板圗第求入手平山僞詔曽不愧心罔天罰以自干忽載書而固犯肆予纂紹猶至涵容迄悛惡以無聞方謀師而致討猶聞汝承得位朕望改圗如何復循父佶之覆車靡戒彼遼之禍鍳雖去歳爲盟于城下兾今日墮我于畫中賂河外之三城旣而不與搆軍前之二使本以間爲惟假臣權不贖父罪自孽難逭我伐再張将臣激怒二之心戰士増敵愾之勇息軍犯五不韙之罪䘮亦冝乎晋帥有三無報之心倍猶未也以是濟河航葦汴如毛人競覆昏天莫悔過肯背城而借一果聞舉族以出降旣爲待罪之人自有易姓之事所有措置條件並巳宣諭元帥府施行故兹詔示想宜知悉行府下前宋宰執舉一人元帥府近以宋主降表申奏今囘降聖㫖劄子先皇帝有大造于宋而宋人悖德故去年有問罪之師乃因嗣子遣使軍前哀鳴祈請遂許自新旣而不改前跡變渝迷執是致再討猶敢抗師洎官兵力擊京城摧破方申待罪之禮况追㝷載書有違斯約子孫不紹社稷傾危父子敗盟其實如一今旣伏罪宜従誓約宋之舊封頗亦廣袤旣爲我有理宜混一然念所舉止在弔伐本非貪土冝别擇賢人爲蕃屏以王兹土其汴京人民願隨主遷居者聽右所降聖㫖在前今請到宋宰執文武百官泊公主之属出京仍勾集在京僧道耆壽軍人百姓遵依聖㫖共議薦舉堪爲人主者壹人不限名位高卑所貴道德隆懋有大勲業者舊素爲衆推服閑於治民者雖乏衆善有一於此亦合舉薦聖㫖備禮册命趙氏宗人不預此議應宋之百司並事新君其國候得姓名隨册建號所都之地臨日共議天㑹五年二月日孫傅以下告立趙氏状文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等右傅等准元帥府再遣翰林承㫖呉开前来指揮選立賢人傅竊以本國前日将相多是上皇時用事誤國之人自嗣君即位以来所任宰相亦繼以罪竄将相率皆叛亡之餘其他臣寮類皆碌碌無聞此元帥府備知豈敢蔽賢不以上聞若舉於草澤之間亦非聞望素著人心必不歸向孰肯推戴兼趙氏祖宗德澤在人至深至厚若别立他姓即城中立致變亂非所以稱皇帝及元帥府愛惜生靈之意若自元帥府特賜選立趙氏一人不唯恩徳有歸城中以及方外即便安帖或天命改卜曆数有歸即非本國臣民所敢預議乞自元帥府推擇賢人永爲藩屏傅等不勝痛切隕越惶懼之至謹具状申國相元帥皇子元帥伏候台㫖天㑹五年二月八日文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等状中大夫同知樞宻院事孫傅等右傅等准元帥府遣翰林承㫖呉开来問皇太子起發事縁自本國主往軍前議事止是皇太子監國鎮撫今来若便起發出門城中軍民必至變亂兼以具擇立事申禀元帥府候定議指揮到日起發次謹具申元帥府謹状天㑹五年二月八日中大夫同知樞宻院事孫傅等状帥府再下舉人據文武百寮軍民僧道耆老中大夫孫樞宻等状申事巳洞悉右元帥府竊謂朝廷所以必廢趙氏者豈徒然哉盖以不守盟誓不務聽命爲罪之極也非天命改卜豈有陸梁如此之甚也皇上猶以寛度釋其罪負別立賢人而已真所謂伐罪弔民之大義也聖諭丁寜而輙言及趙氏雖不忘舊其違命之罪亦巳深矣以後不宜更復如此又状申前日将相多是罷敗罪亡之餘其他臣寮類皆碌碌無聞若舉於草澤之中孰肯推戴者夫運数旣有其衰亦必有繼興者若言敗亡之世必無可旣則三王之後迄至于今安有君臣之道人倫之序何不詳道理之深也再請㳟依巳降聖㫖早舉堪爲人主者一人當依巳去劄子施行如或必欲元帥府推擇縁㑹驗在軍皆係河北漢兒若舉一人即與混一無異實違巳降聖㫖欲推擇南人其見在軍南官亦樞宻院之所共知也未審果有可舉者否若果有則請具姓名見示亦與依應惟不許何㮚李若水預於此議如或京内及外俱難自舉仍請諸官各叙名銜連速具𬋩依元帥所舉推戴状申天㑹五年二月日孫傅等状乞復立廢主文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等今月六日􅕀時准元帥府公文一道備到大金皇帝聖㫖指揮事傅等聞􅒛震越義當即死然念世被本朝恩德至深至厚嗣君親政纔及朞年㳟儉憂勤無所不至若遽蒙廢絶實非臣子所敢聞知輙復忍死須臾冐陳悲痛激切之辭仰干台聽伏望垂天地再造之恩兾終始保全之賜傅等誓當捐軀碎首圗報萬方謹具畫一下項一太上皇巳下不敢有違令㫖見巳起發赴軍前同伸懇告之誠乞垂衿憫一嗣君自即位以来脩德勤政並無虧失惟失信事上累譴訶蓋縁親政之初偶爲謀臣所誤繼以重竄兼檢㑹上皇昨違大遼信誓亦係童貫李良嗣王黼等妄起事端並行處斬了當以此顯見嗣君悔悞前失非有他心伏望台慈特賜矜察一嗣君自在東宫即有譽德著聞中外比旣即位臣民歸仰今感戴保全恩德已厚若䝉終惠未加廢絶尚可以歳脩臣事之儀如抛降金銀表叚之数雖目下未能敷足将来下外路取索分歳貢納實爲大金永乆無窮之利若一旦廢棄遂同匹夫縦有報恩之心何縁自效一伏詳来㫖令別選賢人以王兹土許汴京人民隨主遷居具見慈仁存䘏備至竊惟臣民愛戴罔有二心兼據今中外異姓實未有堪充選舉者倉卒册立四方必不服從縁此兵連禍結卒無休息之期恐非所以上嗣元帥愛惜生靈之本意一今日之事生之殺之予之奪之全在元帥雖大金皇帝詔書有廢立之意然将在軍君命有所不受則閫外之事元帥固可專行如前項所陳事理明白更望台慈特霽威怒終賜保全一汴京城内兩經根括取索公私各巳罄竭顯見将来難以立國乞候班師之後退守偏方以備藩屏如蒙大恩特許嗣君已廢復立所有稱呼位號一聽指揮右件如前謹具申國相元帥皇子元帥伏望特加矜憫早賜允從伏候台㫖天㑹五年二月七日文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等状孫傅等状乞立趙氏文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等右傅等伏覩皇帝詔書冝別擇賢人立爲藩屏許令士庻共議以此見皇帝恩被生靈之意聖徳甚厚然傅等竊見國主自䖏東宫㳟儉著聞若欲選擇賢人必無出其右者兼本朝自太祖皇帝以来累世並無失德惟太上皇聽信姦臣及國主年㓜國相元帥皇子元帥察傅等前状許其自新號稱藩屏復立社稷容其遷避以責後効再念趙氏祖宗德澤在民未冺或未允從前懇亦望特賜哀憫許於國主子弟中擇一賢者立之或不欲立上皇諸子則乞於神宗皇帝之子選擇建立使長得北面永爲藩屏非惟不㓕趙氏之祚亦使一國生靈蒙被恩德永有攸歸傅等不勝激切懇禱之至謹具状申國相元帥皇子元帥伏惟台㫖天㑹五年二月十日文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等状孫傅等乞立趙氏文武百寮軍民僧道耆老中大夫同知樞宻院事孫傅等今月十九日准元帥府劄子節文再請㳟依巳降聖㫖早舉堪爲人主者一人如或京内及外俱難自舉仍請諸官各叙名銜速具𬋩依元帥府所舉推戴状申右傅等竊詳本國趙氏祖宗德澤深厚在人日乆累於前状瀝懇哀告今来渝盟失信旣止是上皇與前主其子及支屬並不干預尚兾恩造更賜詳擇庻得中外帖服不至生事若不容傅等死請必欲選擇異姓自中及外委無其人兼實難於自舉伏乞元帥府選擇敢不一聽台命傅等無任哀痛惶懼殞越之至謹具状申國相元帥皇子元帥伏候台㫖天㑹五年二月十日文武百寮僧道耆老中大夫同知樞宻院事孫傅等状孫傅状乞立趙氏右傅等除巳與百寮具状申大金元帥府外尚有不盡之意不敢自隱今更忍死泣血上干台聽伏以前主皇帝違犯盟約旣巳屈服而舎之存亡繼絶唯在元帥不然則有監國皇太子自前主㳟命出郊以来鎮撫軍民上下帖然或許就立以從人望若不容傅伸臣子之情則望矜憫念趙氏祖宗並無失德内外親賢皆可擇立若必擇立異姓天下之人必不服從四方英雄必至雲優百姓塗炭卒未得安傅自知此言罪在不赦然念有宋自祖宗以来徳澤在人於今九世天下之人雖匹夫匹婦未忍忘之况傅世食君禄方主辱臣死之時上爲祖宗下爲生靈苟有可言不敢逃死伏望台慈更賜矜察傅無任哀懇痛切惶懼隕越之至謹具申元帥府謹状天㑹五年二月十日中大夫同知樞宻院事孫傅等状呉承㫖囘賫到文武百寮軍民僧道耆老孫樞宻等状二道備巳洞悉右勘㑹朝廷所以㓕宋者盖趙氏之罪深也况詔㫖叮嚀務在恤民今来堅執迷惑累百祈請復立趙氏甚不應理若謂廢舊立新果難服從縁趙氏太祖孰與推戴自立尚可何况遵依聖詔擇賢共立孰謂不可兼早有文字惟貴道徳不限名位高卑本欲利民今諸官軍民僧道耆老乞行府選擇行府于在京官寮未堪可否但想在京目下爲首𬋩勾者必是可舉所以行府欲立本官請在京文武百官軍民僧道耆老照騐此意若所指在京目下爲首𬋩勾官員可以共立早具本官名銜状申如亦未可即依巳去文字湏得共薦一人限不過今月十一日状申如亦未可趙氏支属不過今日發遣出城如或此度不見薦舉及不彂遣必當别有悔吝無得有違天㑹五年二月十一日軍民耆老等状乞立趙氏汴京軍僧民道耆老郭鐸等右鐸等伏聞二元帥公文備坐大金皇帝聖㫖指揮欲令選賢人以王兹土鐸等聞命震驚罔知所指竊惟元帥擁弔民伐罪之師行應天順人之道旣破京城斂兵不下全活在城生靈雖湯武仁義之兵未易過今上自䖏春宫至即帝位㳟儉脩徳中外恱懷止縁踐位之初未熟政事輔弼非人有失大信致獲罪於大金皇帝也然今上雖失大信其於天下萬姓略無過失士民歸嚮乆矣若遽見廢絶别立異姓不惟異姓中不見有徳之人誠恐庻民皇皇無所統一姦雄僣竊殺戮無辜如此則非所以上副大金皇帝及元帥愛惜生靈之意也伏望元帥垂天地再造之恩全始終生成之賜復立今上以王兹土脩享貢以報洪恩今上感戴之誠何時而忘也如元帥府必欲以失信廢之即今太子長立自當承嗣如更不欲立之乞於親王中選擇賢者以承嗣位庻使太祖太宗二百年基業不絶人心嚮慕實天下蒼生之幸也今若别立異姓設或倉卒之間選擇非人蹈前車巳覆之轍不免再軫大金皇帝聖慮而民傷墜於塗炭也鐸等情動于中義不得辭仰冐威嚴無任叩頭泣血俯伏望命之至謹賫状詣善利門投獻伏望元帥府俯垂鍳察謹状靖康二年二月日汴京軍民僧道耆老郭鐸等状復下汴舉人今月初十日右副元帥親赴左副元帥麾下共議京人告請復立趙氏事至晚到本營方有善利門下軍員送到汴京軍民僧道耆老郭鐸等告乞復立趙氏事文状并孫樞宻等今月初七日八日九日三次状五道録白縁爲此事巳經共議差官入京湏得別薦外善利門下人貟以輙受文状嚴加懲戒訖切慮京人猶以投状爲辭敢别推注滯住今請在京諸官孫樞宻等照㑹速依呉承㫖學士等賫去文字日限施行不得住滯天㑹五年二月日張叔夜状乞立趙氏簽書樞宻院事張叔夜契勘累具申乞存趙氏之後今奉令㫖如無可推戴令具申元帥府𬋩依元帥府推戴状今来欲乞檢㑹累申從元帥府於嗣子或軍前近属内擇立一人所貴恩歸元帥府永爲藩服而趙氏宗廟尚得血食右謹具申元帥府伏候台㫖天㑹五年二月日簽書樞宻院事張叔夜状乞命張邦昌治國状文武百寮僧道耆老軍民同知樞宻院事孫傅等准元帥府牒湏淂共薦一人限今月十一日状申者契勘自古受命之主必上膺圖籙下有勲徳在民或權强近臣或英豪特起有大材畧因而覇有天下方爲人所樂推今来本國臣寮如孫傅等召自外方被用日淺率皆駑下迷誤趙氏以至亡國人皆懷怨方且俯伏謹俟誅夷若或付之土地俾爲藩屏必爲百姓忿疾旋致變亂上負選擇之意然今奉元帥之念備到詔㫖嚴切舉國惶恐非敢違拒實以在内官寮委無其人伏望二元帥台慈體念乞於軍前選命張邦昌以治國事如軍前别有道徳隆懋爲天命之所歸者賜選本國臣民敢不推戴者右謹具申元帥府伏候台㫖天㑹五年二月十一日文武百寮軍民僧道耆老同知樞宻院事孫傅等状朝散郎試御史中丞致仕秦檜准元帥府旨揮如別有異見具状申者右檜竊以自古建國立王非為率衆庻以奉一夫盖欲代天致理使生靈有所依歸不墜塗炭也契勘張邦昌在上皇時執政日乆伐燕敗盟之計皆所預知今若册立恐元帥府大兵觧嚴之後姦雄竊彂禍及無辜将不稱元帥弔民伐罪之意若䝉元帥推天地之心以生靈爲念於趙氏中推擇其不預前日背盟之議者俾爲藩臣則姦雄無因而起元帥好生之徳通於天地檜雖草芥亦欲生成之数無任待罪隕越激切懇求之至謹具状聞伏候台㫖天㑹五年二月十四日朝㪚郎試御史中丞致仕秦檜状元帥府要秦檜懲斷據前宋文武百寮軍民僧道耆老状乞選命張邦昌以治國事行府己申奏朝廷乞立為皇帝仍賜册文不日降到册文見得事體輕重更索鐫造合先取紅羅一十叚紅絹一十疋玉簡一匣金箔貫索應用事数全并用册寶匣床舁應干合用物件並全請在京官寮疾早准備應副外入京月日續有文字次所有迎接儀仗亦請依例准備等接仍此至行禮以来應有所行事務依舊𬋩勾又勘㑹先去劄子如別有異見别具状申只不許引惹趙氏今據前中丞秦檜状尚言乞立趙氏特係違令合要本官懲㫁速請彂前来天㑹五年二月十四日議遷都状在京官寮吏部尚書王時雍等右時雍等今月二十日呉幵莫儔自軍前傳奉元帥令㫖集議遷都可往是何去處伏覩前来詔書汴京人民許隨主遷都事大未曽迎接新主非臣民所敢輕易, WYG: ''}
