  - {type: variant, offset: 0, length: 14436, content: 弔伐録上與宋主書天輔七年正月己卯其已前者軍上不留天輔元年十二月宋主遣登州防禦使馬政來曰日出之分寔生聖人竊聞征遼屡敗勍敵若克遼之後五代時所取燕雲兩京地土願卑下邑二年正月乙已宋使馬政囬遣撒覩報聘與宋約夾攻燕西二京隨得者取其地若出國所取即不在分割三年夏四月子朔使南宋撒覩回同宋使趙良嗣及其子宏來撒覩受宋國團練使官上命杖而削之南使囘遣孛堇厮勒曷魯等同往四年二月己亥使南宋厮勒等囬同宋使趙良嗣王暉復以祈請燕西二京地界書來六月庚午朔遣宋使趙良嗣等囘以所獲上京今臨黄府是也同知蘇守吉與宋且約夾攻取燕西二京地如約義十二月丁卯朔宋使馬政復來請燕地命如前約六年夏四月壬寅遣徒單烏賈高信哥使于宋七年正月己卯與宋書畧曰往歲越海計議興兵夾攻每有克獲所得者取後違此約獨乗遼勢上襄以行侵討而乃反被追襲聞軍帥劉延慶等已坐責罰又燕京僣號普賢女上表再三乞請稱有南兵入城力戰破之殺戮殆盡歸命上國願爲附庸猶存大信以先許宋命之請若彼能如元約夾攻克捷則事不在言旣出間得而分付理應有報是以宣諭趙良嗣等合取時貢銀絹共准一百萬貫良嗣等言奉㫖并請西京路地界若不從所請止得燕京二十萬匹兩設猶未允更加綾二萬匹外不敢擅加今相度燕京諸州土廣人衆今取與未决豈可輕易便行分付請抽退臨邊士卒荅宋主書天輔七年二月十九日二月癸卯遣孛堇銀木可鐸刺爲宋使副以烏林荅賛謀爲議事荅宋主書曰來書云所言代稅物貨并事目所載色數價直交割月日所與畫定界至遣使賀正旦生辰及置榷塲事並如來示所諭備悉美意外今年合交銀絹稱候到依契丹舊交月日交割特異元書理合一就重念春農般運不易曲從來意其銀絹請似前來與契丹物色一般者交送所有燕城侯各立盟誓然後交割今立草付國信使副到請依草著誓至日當議復盟春律在中兾膺多福今差孛堇銀木可鐸刺克國信副及賛謀充議事有少禮物具諸別幅專奉書陳逹不宣謹白白劄子與書同封昨者趙良嗣到於上京軍前計議五代以後䧟入契丹舊漢地州縣時止許燕京再差馬政更議西京回書只請就便計度收復尋爲彼不能取致本朝自行復定又差趙良嗣等來議稱燕西兩京巳曽計議縁爲西京不在許限只許燕京所轄六州來書云其西京別作一段今來又令良嗣等許議西京欲一就收復雖貴朝不經夾攻而念兩朝通和實同一家必務交歡篤於往日今特許與西京武應朔尉奉聖歸化儒嬀等州并土地民户其巳西并北一帶接連山後州縣土地人民不在許與之限㩀所許民户土地甚多自來攻伐撫将帥士卒艱苦不少今來別無再索經畧請差人交割其諸事理已宣諭趙良嗣去訖來書稱契丹出没今差人押領大軍往彼幸踏地里交割發行月日已諭使人省㑹所有盟誓候交割了日議定南宋回書三月戊午命馬同權管勾燕京事将以其地付宋故也丙寅宋使盧益趙良嗣馬擴以囘書來三月日大宋皇帝致書于大金大聖皇帝闕下華緘荐至契好増勤爰馳預政之臣共著約神之誓惟兩朝弔民伐罪之舉振古所無而萬丗講信脩睦之誠自今以始用堅盟載永洽鄰歡來書云燕城等候各立盟誓然後交割今立誓草付國信使副到請依車著誓至日當議復盟銀絹請似前來與契丹物色一般者交送並如來諭順履融和茂迎福祉今差中大夫試工部尚書盧益龍圗直學士大中大夫趙良嗣充國信使閤門宣賛舎人馬擴充國信副使有少禮物具諸別幅專奉書陳逹不宣白劄子同書封來所諭西京武應朔蔚奉聖歸化儒嬀等州并土民户本朝撫定備荷美意已令盧益等持銀絹往軍前賞設夏國素號狡獪唯務詐誕與昏主實甥舅唇齒之國日近上表乞本朝勾退北邉兵馬文字内指言貴朝仍自云與昏主累世姻親巳詢訪得知䖏所及稱奉昏主之命軍州及土地人民權令守護招集無使叛賊一向虜掠故夏國起集援兵屯於境上并據邊臣累奏夏國見勾集重兵廣備粮食借助昏主軍聲甚大用意非淺除已旨揮河東等路隄備禦逐外深恐貴朝欲知其詳所有真本文字今付去人西京管下州縣前書已言非務廣土實欲備禦昏主爲彼此之利今若将已西并北一帶州縣土地付與夏國則不特昏主見在天德雲内地分出没若使夏國㨿黄河以東州縣必與昏主合力爲害不細夏國自去歳已輙占據金肅河清兩軍如欲與此兩處請貴朝詳度外其寜邊天德雲内巳西并北一帶州縣土地合以黄河及漢地爲界漢地外以北土地如欲付與他國並從貴朝又持到誓書其間事理並依貴朝誓草又白劄子兩朝交往禮儀除合依見行禮儀外傳聞已上尊號今議特稱尊號以表交歡他日本朝如上尊號貴朝亦合相稱近累據河北河東帥司及沿邊州軍探報契丹昏主見在雲内地分出没已逼近應朔等州繳到昏主招諭軍民補受官職真本文字已令宣撫司移文貴朝照㑹及已指揮河東路遣發兵馬救助應州一帶極力備禦外請貴朝早發大軍往彼掩襲因以照應交割彂行月日貴朝所使傳聞四軍蕭亮已即位號神聖皇帝改年天嗣如所傳是寔所當置慮早議招捉使人銀木可等已得以厚禮用示誠意自此使聘往來禮數彼此並依契丹舊例亦如來諭但契丹往還舊禮有不繫事繁複者合行裁定庻彼此爲便置榷塲去䖏從貴朝所便交易並如契丹體例宋主誓書係依草再立維宣和五年嵗次癸卯三月甲寅朔四日丁巳大宋皇帝誓書于大金大聖皇帝闕下天之所助者順人之所助者信履信思乎順則自天祐之吉無不利昨以大金大聖皇帝創興併有遼國遣使計議五代以後䧟入契丹燕地幸感好意特與燕京涿易擅順景薊并属縣及所管民户縁爲遼國尚爲大金所有以自來交與契丹銀二十萬兩絹三十萬疋并燕京毎年所出税利五六分中只算一分計錢一百萬貫合直物色常年般送南京界首交割色數已載前後往復議定國書每年并交緑礬二千栲栳兩界側近人户不淂交侵盗賊逃人彼此無令停止亦不得宻切間諜誘優邊人若盗賊捉敗各依本朝法令科罪訖贓罰雖不獲蹤跡到䖏便勒留償若有暴盗或因別故合舉兵衆須得開報沿邉官司兩國強界各令防守兩朝界内地各如舊不得遮堵道路至如将來殊方異域人使往還無致禁阻所貴乆通懽好庻保萬世苟違此約天地鍳察神明速殃子孫不紹社稷傾危專具披述不宣謹白一下項物計錢九十八萬七千二百四十貫文内除綾羅錦圈線不見分兩外計重二十五萬九千五百斤准一萬七千三百秤囘南宋國書夏四月壬辰復宋書癸巳以宋所増銀絹令扵燕地交付壬辰係初九日累交禮聘敦講世和復紆使傳之華克示載書之信指以萬祀昭然一言兹見繼好息民之心而得親仁善鄰之美義欲存於堅乆事更具於宣陳據燕京疆界只依兩朝差去人負同行檢視交割爲定所云交付西京邊界并夾攻契丹皇帝事已遣近上官貟押領大軍勒於今月十一日於彼應㑹仍報宣撫司凡關夾攻事件須令與差去官貟計議從長施行其邊界亦依割定領受仍已諭使人却合有囘謝禮数并報復文字送付差去軍下官貟前次議取被掠并逃去人户雖令宣撫司交付却只推延不肯早行發遣至今一未結絶必若邊吏徼功違約展轉如上件不切禀從實関引惹紊亂有失将來乆結歡好若是再取如此人口亦仰所司疾速彂遣又以契丹皇帝在隂山囘离保在奚部山谷以此兩䖏勾當軍事令取嶺北鴛鴦濼坐夏相度所謀雖同如或不泯後患地里咫尺特關貴國自餘分遣别路兵馬須是當朝供給只據分收捕奚囘离保契丹皇帝兩路兵重粮食合銷米一十萬石冝早䖏分取月日於檀州歸化州兩䖏分路般送到佇竢囬報炎歊在候保嗇是期囘賜誓書唯信與義取天下之噐也以通神明之心以除天地之害昨以契丹國主失道民墜塗炭肆用興師事在除弔貴國遣使航海計議若将來併有遼國願還幽燕故地當時曽有依允廼者親領兵馬已至全燕一方城池不攻自下尚念始欲敦好特以燕京涿易檀順景薊并属縣所管民户與之如約今承來書縁以遼國尚為大金所有以自來交與契丹銀二十萬兩絹三十萬疋并燕京所出税利五六分中只算一分計錢一百萬貫文合直物色常年般送南京界首交割色數已載前後往復議定國書每年并交緑礬二千栲栳兩界側近人户不淂交侵盗賊逃人無令彼此停止亦不淂宻切間諜誘優邊人若盗賊并贓捉敗各依本朝法令科罪訖贓罰雖不獲蹤跡到䖏便勒留償若有暴盗或因別故合舉兵衆須得開報沿邊官司兩國疆界各令防守兩朝界内地各如舊不得遮堵道路至如将來殊方異域使人往來無得禁阻所貴乆通歡好庶保萬世苟違此約天地鍳察神明速殃子孫不紹社稷傾危本朝志欲恊和萬邦大示誠信故與燕地兼同誓約苟或違之天地鍳察神明速殃子孫不紹社稷傾危如變渝在彼一准誓約不以所與爲定南宋國書巳上並在燕國往復四月日大宋皇帝致書於大金大聖皇帝闕下使車係至聘問彌式馳約載之嚴共著誓盟之重誠参天地惠浃神人取亂侮亡遂㡳六師之績惇信明義共圗萬世之安仍睠雲中外虞昏主併沐親仁之好獲従恢復之心逺仞忱恂倍増感懌用傳于後永寘于懐兩朝著誓之後所務通懽繼好以保永世末節細故各不須較邀功生事搆造之人彼此所宜深察所云粮食燕雲兩䖏無可計辦今特於内地掇那米五萬石二萬石令河北路宣撫司於古北口外交割三萬石今河東路宣撫司於歸化州或應州以北道路快䖏交割並於七月一日以前節次輦致前去計㑹貴國軍下官員般取餘事悉如來諭順綏炎律茂履純休今孛堇楊璞等囘有少禮物具諸别幅專奉書陳謝不宣謹白與南宋書草係天㑹二年正月二十七日西南西北両路都統所單定申今具此理索西南西北兩路都統并奚王府路都統撻懶南路都統闍母等節次申前後各管處所亡去張覺李石裊思并招過及自南京囬去又張覺等邀截下郎君習姑及援送燕京趙發統軍司所管以上逐起職官百姓工匠及諸軍下亡去驅使人口軍人妻室并刼掠偷遞過孳畜財物自來累具文字移牒大宋河北河東路宣撫司河東雲中府經畧安撫使等司燕山府代應朔武等州取索度推注不爲分白慿驗伏乞朝廷詳酌勘㑹兩朝誓書盗賊逃亡無令停止亦不得宻切間諜誘優邉人及約定所許州縣所管民户其餘色人户並不在許與之限今㨿逐䖏奏前件因依縁由稱見獲慿驗由自推注不爲分付係違負自彼顯然若只以違約推延便望休止亦不誤矣所據隨州縣因官寄客居契丹人户并逃亡招過及上件邀囘刼掠偷遞職官百姓工匠驅使婦女孳畜財物等如敦守誓約請依在邊帥臣所牒數目交付仍指揮逐處禁止乞囘示報南宋獲契丹昏主書係裏面抄白降到六月日大金皇帝致書于大宋皇帝闕下大寳之尊允歸公授守不以道恕集人神故先皇啼舉問罪之師迨眇躬盡繼恡之略尤頼仁隣之睦生獲昏主之身人心旣以懽和天下得以治定爰馳使价庸示披陳逖惟聞知諒同慶慰今差復州管内都孛堇李用和朝散大夫守鴻臚卿知太常禮院騎都尉太原縣開國伯食邑七百户賜紫金魚袋王永福充告慶國信使副有少禮物具諸別幅專奉書陳謝不宣謹白與宋閹人河北河東陜西等䖏宣撫使廣陽郡王童貫書天㑹三年十一月三十日大金骨盧你移賚勃極烈左副元帥致書于大宋宣撫郡王闕下慿傳信復沐使音未孚結絶之誠難避重煩之議領兵前去之由已載别牒且兩朝之事若不互相容㑹湏至戰争夫如是則豈唯菑危轉甚更恐生靈枉罹塗炭是用遣人以俟雅報蓋以宣撫郡王所爲結約和㑹契義最舊况承來文若謂更有可議務在通融啇量伏念宣撫郡王有輔立之功位望所必謂議以讜言扶斯将墜與其交鋒争戦以傷生民寕若酌中兩便爲計果能如此其于貴朝非止社稷乆享安全更獲兩下益固懽和然後郡王忠孝克保終始長守富貴民頼其善爲天下之幸甚豈不美哉昔契丹請和之日朝廷限以遼爲界不見聽從乃及今日所望取爲前鍳審觀勢與差去官貟評議定一律正嚴凝佇膺多福今差昭文舘直學士王介儒孛堇撒离母專奉書披述不宣牒南宋宣撫司問罪係元帥府天會三年十一月三十日前書所謂領兵前去之由已載别牒大金元帥府牒大宋宣撫使司近差寕昌軍節度使蕭慶孛堇撒离母專往理㑹所索户口事所淮囘牒稱本朝幅貟萬里人居散漫若再行根究難指有無又據差馬擴辛興宗所説與上亦同往者大宋與遼爲隣因爭疆場歳輸金帛不獲厭足遜辭添納百餘年間勤於朝聘每事姑息不可殚言想其屈志實不獲已由此而言其苦於屈辱亦以深矣幸遇我先皇帝天縱英謨神資􅌖略方經營天下之初大宋遣使請雪前恥由朝廷以恩化爲務親幸幽薊才下全燕即時割賜此朝廷所以大造於大宋使大宋不勞而立其功以伸祖宗之屈自此始也大宋皇帝感斯大義遂立嚴誓卜於子孫乆敦信約何期立渝盟誓手書稱詔搆我邊臣使爲叛亂賊殺宰輔邀囘户口聖上以含容爲德取索户口之外一無理㑹尚自不知悔過反於沿邊多方作過暫無自戢爲此依准所降宣㫖移牒囘取的有無歸還却稱本朝幅貟萬里人居散漫豈期縱驕誇慢弃德負義如此之甚也酌其所意謂我土地之廣但得户口縱違誓約畢竟何爲有此横暴顯然而覺其姦囘容俟至今巳爲枉矣若依前索以道理實慮空逗歳月今議聊整問罪之師且報納土之由仍依囘誓收復元賜京鎮州縣今月二十九日起發前進須議公文牒具如前今差昭文舘直學士王介儒孛堇撒离母等前去事須牒大宋河東陕西等路宣撫使司到請照驗先行歸還朔武等州陳其罪戾具一切聽命無違公文囘示仍請貴司自就相近親見啇議容㑹結絶如或難以依應即請尅期甚地以决勝負幸不疑惑住滯以至別議施行謹牒元帥府左副元帥右監軍右都監下所事跡檄書往者遼國運衰是生昏德自爲戎首先啓釁端朝廷爰舉義師奉天伐罪繄爾宋人浮海計議候併遼國願割幽燕歳納金縑自依舊例先皇帝有容爲德嘉其來意置以不疑即時允應爾後全燕旣下割之如約其爲恩信不謂不少於是要之以天地質之以神明乃立誓文盗賊逃人無令停止亦不得間諜誘優邊民俾傳之子孫守而勿失洎宸輿北返宰輔東行不意宋人貪婪無厭稔其奸惡忽忘前施之義潜包幸亂之謀遽瀆誓約結搆罪人使圖不軌據京爲叛賊殺大臣邀囘户口啖以官秩反令納土仍示手詔竊行撫諭遂使京畿之地鞠爲㓂場才天兵臨境魁首奔亡而又接引輙相保蔽更易姓名授之官爵及至追索傳以僞首旣殺無辜又貸有罪不仁不恥於禮何如朝廷方務含容不彰其悪但誡邊臣户口之外一無理辨此所欲乆通懽好之故也彼尚飾以僞辭終爲隱諱仍招納逋逃反優居民更使盗賊出没爲過所有歲貢又多愆期背恩莫斯之甚朝廷亦不咎之依前催索猶不聽從牒稱本朝幅貟萬里人居散漫若再行根究難指有無况事皆已往請别計議據彼迷辭意渉誇慢至於本境行發文字輙敢指斥朝廷言多侮謗雖累曽移文俟其改過終然不悟罔有悛心矧又夏臺寔爲藩輔忱誠旣獻土民是賜而彼宋人忽起無名之衆輙行侵優之事因其告援遂降朝㫖移牒解和俾復疆土仍以狂辭不爲依應反云夏人納欵曲有陳請大金方務恩撫初附之國且料不無曲意姑行順從既出一時私恩盡與夏人則大金順從夏人已爲周至自今不煩干預自當以道理所在且朝廷方隆恩造下浃群邦彼之兩國各蒙其賜所與之地裁之在我肯以私曲以爲周至豈期詭詐昧於道理不爲禀從如此之甚者哉斯則非止侵凌夏國實開不懼朝廷此朝廷所以罪也盖聞古所重慎者兵也兵而無名非三代仁義之謂也其或仗順臨逆以直加曲斯萬世之王道焉反是則甚無謂也今奉宣諭興師問罪東自南京以來西接夏軍一帶諸路並進固不獲已况趙佶越自藩邸包藏禍心隂假黄門之力賊其冢嗣盗爲元首因而熾其惡心日甚一日昏迷不㳟侮慢自賢謂已有天命作虐無傷當其伐遼之日官軍所至有逆拒者或至傷殘皆非我所欲爲是其自速禍敗也或有舉城舉邑以部以伍効順歸欵者前官如舊厚恩撫立其勞績不次録用居民則省徭役輕刑罰各安其業諒已知悉今亦如前冝相爲鍳昔彼納平山是圖我疆今伐汴宋是圖彼地兹所謂出乎爾反乎爾者也若趙佶深悔前非聽命不違則雖云無外且未深圗止以黄河爲界聊報納叛之由是知自黄河以來皆係我民夫人已有之物安肯自爲殘毁再念其民居無道之國煩徭重役從来乆矣况遭閹竪要功生事近歳以来苦於飛輓流離道路曽不聊生今来若不預先曉告切慮其間別有牽迷枉䧟討罰須議指揮右下宋國諸路官僚僧道耆軍人百姓等指揮到日就便遞相暁諭善爲去就擇其曲直審其強弱度其逆順各以所部京州縣鎮村野邑社部伍寺觀蘭若山場迎軍納欵必加恩賞所有各手下軍人百姓僧尼道士女冠等類一切如舊更不遷徙仍具頭領見帶名銜状申以慿依上施行如或權不在乎􅑏獨鰥寡以身歸誠厚爲存恤所據隨處関市之征山澤之禁前來須爲急務内有於民不便無名之歛仍仰所在官司開立状申當議從便削去仍委本䖏就便開具文解申報所在路分軍前照騐據巳上䖏分條件出自至誠必不昧其神理亦仰子細省㑹兼巳㫖揮南京路都統所依上施行去訖付逐䖏准此天㑹三年十一月日次事目劄子係差孛厪呉孝民等持去肇我大聖皇帝起義弔伐亡遼燕薊一方最爲強大天兵一日忽至城下不血一刄順命爰念有宋航海遣使起初結好請復幽燕舊地即時割與惟少摘官吏強族工巧併不滿萬數徙之東行良不得已乃常勝軍相易之故著定誓書盗賊逃人彼此無令容納苟有違者社稷傾覆子孫不紹不踰月棄徳背惠手詔逆賊張覺隂相結搆殺我四執政大臣邀迫我官民以歸歳交金幣罔不踰時及正旦使賀允中御前奏逹傳語二字深涉輕易其於本國窮奢極侈上下相蒙恣行無道不忍多言殘虐海内人怨神怒此天奪之鍳假手於我大金前月二十九日師次邯鄲才有使人李鄴等将到三省樞宻院所奉聖旨文牒歸罪邊臣全非當理洎審求的意方云前主自省愆尤不敢枝負大變前月二十三日當已傳禪兩項歸過特有不同難爲准信又柰使人悃幅辭酸懇言本國君臣深自責恨前日之非但念人誰無過過而能改善莫大焉兼所奉宣㫖如趙主深自悔過再乞懽和仰就便酌中施行冝加恕道用存大義若不能誠心悔罪重乞懽盟可囚縛首先謀取平山童貫譚稹詹度并逆賊張覺李石衛甫趙仁彦等来詣軍前謝天下罪應自北界亂離来及南京叛亡諸職官工匠教坊百姓續次發遣前来仍以黄河爲界先請皇弟鄆王與太少宰科一貟權且爲質亦候交割了絶審觀情状别無猜忌即便遣還外歳輸金幣并犒賞軍物然後計議施行如或不遇依從可預爲備捍指日相見却兾端的囬示宋三省樞宻院劄子天㑹四年正月七日汴京城下受得下項三省樞宻院據探報到大金人馬漸次前来侵近京城欲行禦逐縁大金已差人使見到國門講和末委上件人馬前来有何因依者右差魏康劉鎬前去直至大金人馬見今盤泊去處取囬文連申靖康元年正月七日囘劄子肇我大聖皇帝爲契丹主容納叛人阿合産大王不行交送又多無道應天順人起兵弔伐是後不忍覆㓕欲與通好終不聽從直至亡國方始投降尚猶釋罪持加王爵又燕京留守秦晉國王耶律淳遼陽渤海髙永昌奚蕭良等各賜本部地界仍以世爵例皆執迷竟取滅亡夏國王李乾順逹靼靺鞈舌並助亡遼犯我行陣未鼓而破爲能改過各復舊居分裂契丹邊土以濟其地趙宋前帝航海遣使請復幽燕舊疆當此之時分白約示同力收取爾来竟無接應形跡一旦天兵倐至不血一刄舉土向風盖自契丹二百餘年逺近無敢囘顧爰念從初結好姑務懽和即時割與恩義非輕著定誓書若納逃人社稷傾危子孫不紹曽未踰月棄德背恩手詔逆賊張覺害我四執政大臣邀我百官更易姓名公然任使歳交金幣並不如期及正旦使賀允中御前奏逹傳語二字特越舊例深涉輕易其於本國窮奢極侈上下相蒙閹竪擅權竒巧尅聚民間財玩至有室家懸罄人曷聊生往往弊源萬莫言一我今皇帝審是數端亡盟失道上符天心爰赫斯怒大舉天師數路並進理當問罪面奉聖㫖如趙主能悔已過再乞懽盟仰就便酌中施行當司引領大軍取幽燕一路自入貴境必謂遣使来賫御筆改責前非縦横待命不至深入豈期直至邯郸才有人使李鄴等却只将到省院所奉聖㫖文牒又言歸罪邊臣全非當理泊詰求的意方言前主自省愆尤不敢枝負大變已至傳禪兩項歸責全是不同難爲准信縁差来人使不能騎馬事致淹留兼恐塗次别有錯失乃摘留從軍先令孛堇呉孝民等持白劄子專去奏聞路次及城門首遮堵早不放入今及城下猶未遣還今上年少因亂登基詳度軍國社稷子孫禍福未能裁决新任大臣例不賢明若能英㫁其前朝作孽既爲人子未曽切諌至令據捨崇髙逃竄無地為子之罪莫大於此今可追悔往咎卑辭改責手筆誓書乞申舊好於義爲然今執政臣属不念前日清平姦賊同惡相濟棄之於市快天下心止以放逐便爲太罰又使宸顔憂辱不暇亦冝同力輔奏親詣軍前重求通好爲臣之罪復何可言當計在乆逺依應當司所請事目不但拔出生靈塗炭抑宗廟血食園陵安寝豈非幸甚苟或不然反令海内百姓肝膽塗地鬼神乏主後嗣零落盖臣主俱新虚負英氣不畫逺略謀取艱難乃前朝作閗亂之始今日成㓕亡之禍其爲大過更踰前日歷觀自古不道君臣於此爲甚兼貴朝兵将與亡遼士馬優劣可見亡遼士馬勝負明知即日簽㨂到舊遼契丹奚漢渤海軍衆不少其本國大軍未足稱数且當司一路除所經州郡并余路軍兵亦約定於汴京㑹集安置外見節次前来未㫁頭尾雖不欲一一分白貴朝亦必詳悉又自來邊方守傋兵衆不能禦捍侵及國門能免其難未曽或有貴國太平積有歳年止以奢華適意人民柔脆不習騎射創初設教以不知兵之衆而拒我熟練征伐强勇之士望可求濟往昔無聞更恐淺近官民聞言當司應以堅城不下求請和好勿冝輕信縁是與大宋皇帝結好脩盟痛可哀憫宗社傾覆子孫謝絶今皇帝正統天下髙視諸邦其惟有宋不可無主然摧㓕大權已入握内又爲元奉㫖諭丁寕屢遣人使遂與安和惟求轉禍成福勿有疑惑請准前去文字別遣使大臣将呈御筆早圗萬世之利若大禍已成須至自取㓕亡今後㫁絶往来縁大軍逺至難以停滯却請執定疾速見示宋主書契勘自太上皇與大聖皇帝浮海結約歳月已深逺割燕雲恩義至厚質諸天地共著誓書使聘交馳懽盟無間止縁姦臣誤國容納叛亡歳幣愆期物貨麄惡遂令信誓殆成空文隣國興師職由於此重念大聖皇帝從初講好欲卜萬年事至于今雖悔何及太上皇深自剋責乃付神器纉服之始不遑康寜夙夜以思冝伸舊好果蒙使价逺逹信誠結約之辭悉以面諭自今以始傳之無窮共庇生靈永同金石緬惟英鍳必諒兹懐今差樞宻院事李梲尚書工部侍郎鄭望之充計議使副事目具如别幅想必炤察事目投拜職官人口盡行發遣大金國人馬抽囘議定更不以黄河爲界地土税賦所出改添歳幣七百萬貫今来河北河東人馬抽囘賞軍銀五百萬兩絹五百萬疋金五十萬兩回宋書天㑹四年正月九日與前文手一就發先来李鄴同去承計議使副知樞宻院李梲尚書工部侍郎鄭望之賫到御寶文字深悔前非再求盟好傳之無窮永同金石仰仞至誠實爲大利雖有報復之心載惟元從大聖皇帝結好曁我今皇帝㫖諭丁寕德義寛大拯救生靈塗炭冝舒舊憤以示新恩當開誠心與脩和睦今差元部旋節度使寳利復州𬋩内觀察使髙永義諸軍都部署判官司農少卿張原㳟與前次差人使同去計議其諸事條具如别幅若可依從請皇弟鄆王并太少宰科一貟不踰是日来赴軍前權且爲質更或不欲施行無煩理㑹伏候端的鄆王權質候過黄河便議歸還太少宰科一貟祗交撥定疆界亦候便放還事目並入御筆誓書自新結好已後凡圖書往復並依伯姪禮體施行今放黄河更不爲界可太原府中山府河間等一帶所有地分畫立疆至将来撥属本朝於内城池別有變亂貴朝應𬋩擒制交送来示改添歳幣七百萬貫除自来巳合交送銀絹兩色外擬只歳輸二百萬貫物貨合要賞軍兵物并書籍下項書五監金五百萬兩銀五千萬兩雜色表一百萬段疋裏絹一百萬段疋馬牛騾各一萬頭疋駞一千頭囘書誓文及差康王少宰出質係正月十三日契勘太上皇與大聖皇帝浮海結約欲卜萬年偶因手詔平山張覺招納叛亡至使懽盟變爲兵革遂至大金數路興師今大聖皇帝次子郎君先及京城事至子今雖悔何及專差知樞宻院事李梲尚書工部侍郎鄭望之等趋詣軍前引過乞和正月十日承計議使髙永議等賫到文字大開容允備諒純誠拯救生靈敦結盟好載惟高誼深劇忱悰已戒攸司悉從定約太上皇帝與大金大聖皇帝今皇帝義同兄弟今来國書當依契丹舊例禮從伯姪施行已許放黄河更不爲界可大原中山河間府一帶所轄縣鎮分畫疆至係自大金後比至立了疆界屯兵已前於内别有變亂䖏所當朝自當應𬋩擒制交送至於尺土一民不令侵犯招納若是與三府以南州軍犬牙出入不齊去䖏臨時兩平兊易應自亡遼播越之時北界流離向南并係大金叛亡諸職官工匠教坊百姓除元不曽到并巳死亡外應見在盡数遣還在京今隨逐前去在外接續逐處發遣一無停匿殘害錯失除自来合交銀二十萬兩絹三十萬疋外更歳輸二百萬貫以金銀疋帛并雜物折納决無麄弱愆期斯言之信金石不渝有違此誓神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行逺冀英懷永同重誓今差通直郎試給事中李鄴右武大夫康州防禦使西山閤門事髙世則充計議使副伏惟炤察謹白事目皇弟康王少宰科一貟前去相見以示信好便請遣囘賞散河北河東路軍兵物并書籍下項書五監金五百萬兩銀五千萬兩雜色表一百萬段疋裏絹一百萬段疋馬牛騾各一萬頭疋駞一千頭右即今盡據城中所有内自宫禁係官司與士民宫觀寺院等處已行根刷慮或不足須至稱寛期限更於河北州縣及外路州軍起發送去囘奏宋主大金都經略處置使兩路都統所正月十二日大宋皇帝遣来使副李鄴高世則等降到誓文大開詳審推見聖意勇於改悔求踐舊好叙定兄弟之義卜於萬世更不渝變斯乃社稷生靈之福也當司深爲感切遽解重圍収聚兵馬鈐束将校更不令駈虜殺戮所承誓㫖具載太上皇手詔平山張覺招納叛亡遂及大金皇帝及今皇帝義同兄弟今来國書當依契丹舊例禮従伯姪施行已許放黄河更不爲界可太原中山河間府一帶所轄縣鎮分畫疆至係自大金後比至立了疆界屯兵已前於内别有變亂䖏所當朝自當應管擒制交送至於尺土一民不令侵犯招納若是與三府以南州軍犬牙出入不齊去䖏臨時兩平兊易應自亡遼播越之時北界流離南來併係大金叛亡諸職官工巧教坊百姓除元不曽到并巳死亡外應見在並盡数遣還在京今隨逐前去在外接續逐處發遣一無停匿殘害錯失除自来合交銀二十萬兩絹三十萬疋外更歳輸二百萬貫以金銀疋帛并雜物折納决無麄弱愆期斯言之信金石不移有違此盟神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行既復舊約欲成長乆慮歳輸物多難以經逺施行兼奉宣命若能悔責委酌中理㑹今又特减放一百萬貫常年只許納一百萬貫折納并銀二十萬兩絹三十萬疋仍爲今歳分撥疆至事忙直候次年正月依舊例交納所有誓書乞早賜差遣國信使副就赴闕下告囘誓書當司亦准備具此申奏次如交割結絶之後苟有違變神明殛之俾墜其師今差都𬋩契丹兵馬輔國上将軍耶律度福州𬋩内觀察使隨駕教坊都提點王汭充計議使副伏乞照騐別上書正月日皇子都經略䖏置使斡离不上書于大宋皇帝闕下今月十三日差李鄴等賜到誓文皇弟康王并少宰一貟至仰體聖慈深増信喜事苟不然其如社稷生靈何今旣轉禍爲福重踐舊好貴朝不失農事早令當司兵馬無稽駐泊益彰至德當司已鈐束逐處軍兵不令驅虜殺戮所有國書再立誓約乞賜盡言差遣信使将擎来赴當司待慿彂遣赴闕即日一見康王便如兄弟相次事過即時遣還願勿憂疑更有但係亡遼契丹奚漢渤海雜類人等無令劫掠傷殘早爲交割今月十一日夜南方天見赤氣直至天暁詳其分野正臨都邑能盡至誠務敦大信反身修徳必㡳銷禳縁念義同一家别白奏逹謹上報進誓書及乞約束書靖康元年正月十五日大宋皇帝致書于大金皇子都經略處使軍前特承書示備諒勤誠以康王少宰至彼灼知美意㴱増信喜兼本朝不失農事早爲罷兵鈐束旣明更不殺戮凡慈来諭益重懽盟所言國書再立誓約見今差遣信使賫詣大金皇帝闕下煩爲差人同往歳輸特承放减一百萬貫深荷恩意已於國書具載若非惇示大信欲保萬年何以及此亡遼契丹奚漢渤海雜類人等自當發遣豈敢傷殘天象示戒所宜反身修徳以銷去之重蒙来示尤仞不忘近聞大兵已到太原攻圍未下和好之後義同一家願速約欄人兵以全一城生靈之命兼恐河西兵馬乗隙深入亦望早與約囘諒惟英悟必加深察謹白宋主致謝書及報因便附問大宋皇帝致問大金皇子都經略處置使軍前自承大軍逺臨獲惇舊契永懐恩義寤寐不忘叙好之初無以将意輒有薄禮具如别幅言念懽盟既定盡出周旋此恩何窮眷想深甚自此每遇生辰聖節及正旦遣使專附問許之儀想當照察雪塗寒凛更加珍重白别幅真珠碾縷金鷄竿百戯人物腰帶一條黒漆匣全真珠蹙圏夹袋子一副上有北珠三十三顆麻調珠全真珠玉夾口笓靶子全細色并雜物緊絲五十疋金錦五十疋素絲綾五十疋紅錦五十疋鹿胎一百疋興國茶塲㨂牙小龍團一大角建州壑源夸茶三千夸共二百角毎角一夸龍腦一百兩薫香二十貼劄毬二十副每副五事論棒二十條右請檢留白囘謝宋主書大金皇子都經略處置使斡离不謹奏謝大宋皇帝今承復降御寳文字爲問報每遇生辰聖節及正旦遣使專附問許之儀并賜到珠玉疋段等物稠重恩徳何可勝言又言懽盟既定盡出周旋循省以來頗多惶懼此盖皇帝英明獨㫁歡好再成社稷永安生靈頼慶斡离不依准本朝皇帝宣命施行恩従聖造事靡已爲永念于兹難當㫖意惟願兩朝乆惇信義世固和成下順人情上恊天意今既事同一家仍慮百姓有妨農務所索牛一萬頭乞行罷去伏乞照察向融春律加祫震襟謹謝宋少主新立誓書靖康元年正月十五日姪大宋皇帝桓致書于伯大金皇帝闕下昨自太上皇帝遣使越海結約請復幽燕舊地交割之後著定誓書不踰月手詔平山張覺招納叛亡歳輸之物愆期正旦使賀允中致傳語二字由此伯大金皇帝逺遣数路重兵入境問罪太上皇帝自省前非傳付神器適有大聖皇帝次子郎君一路兵馬先到京城之下遂專差樞宻院事李梲工部侍郎鄭望之趋詣軍前代上皇引罪自悔告和乞盟乃承二郎君遣使賫到文字開諭恩㫖如到日深悔前非再乞懽和即委就便酌中施行今已計議定可中山太原河間府南一帶所轄縣鎮以北州軍分畫疆至別有地圖仍比至定了疆界屯兵巳前于内别有變亂䖏所當朝自𬋩應當擒制交送已後至于尺土一民不令侵犯招納若是三府以南犬牙出入不齊去䖏臨時兩平兊易外㩀往復國書伯姪施行并應係亡遼官吏僧道教坊工匠百姓等除元不曽到并已後死亡外並行遣還在京今隨逐前去在外接續逐䖏起彂一無停匿爲放河北河東土地毎歳輸送銀三十萬兩絹三十萬疋錢一百萬貫以金銀疋帛并雜貨折納無依前麄弱愆期以報重恩再結懽好斯言之信金石不渝有違此盟天地鍳察神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行伏惟聖明永同重誓倘蒙允許佇候囘音今差通直郎試給事中文安縣開國男食邑三百户賜紫金魚袋沈晦右武大夫康州防禦使武功縣開國男食邑三百户王仲通充賫誓書國信使副有少禮物具如别幅專奉書陳逹不宣白宋少主敕太原守臣詔勑太原府守臣應中山河間太原府并属縣鎮及以北州軍已於誓書中議定合交割與大金事昨者大金以朝廷招納叛亡有渝信誓因舉大軍直至京畿社稷爲念所繋甚大遂割三府以㝷懽盟庻銷兵革之憂以固兩朝之好其犬牙不齊去䖏并兩平兊易合照誓書施行如有州軍未便聽從仰将此詔書遍行告諭各務遵禀毋或拒違自取塗炭兩朝封疆接畛義同一家各寕爾居用保睦其中山河間太原府并属縣鎮及以北州軍見任寄居職官不係本土及從内地差去者不在交割之限今差朝奉大夫充資政殿學士簽書樞宻院事充神霄玉清萬壽宫副使文安縣開國伯食邑七百户實封一百户賜紫金魚袋路元廸賫詔宣諭咨爾守臣體予至意故兹詔示想冝知悉春暄卿等各此平安遣書指不及多七日宋少主與左副元帥府報知靖康元年正月十五日大宋皇帝致問大金元帥移賫勃極列軍前頃者太上皇與大聖皇帝浮海結約情義至重偶縁手詔平山張覺招納叛亡遂致懽盟變爲兵革属太上皇傳位眇躬方閲旬浃皇子郎君大軍已至京畿即遣知樞宻院事李梲工部尚書鄭望之備攄情懇復請懽盟皇子郎君惇兩朝和好之重特爲開允許以退師本朝㝷以遣宰相親王詣軍前相見土疆歲幣並已議定兩路賞軍金帛数萬至多尚慮元帥在逺未知的實今遣使人同皇子郎君所差親信㝷詣軍前諮白惟冀早為抽囘軍馬免致殘害生靈諒惟英懐必能洞照春首尚寒更加保愛微物将誠具如别幅今差朝奉大夫充右文殿脩撰廣平縣開國男食邑三百户賜紫金魚袋宋彦通武翼大夫成州刺史汝陽縣開國男食邑三百户郝抃充河東軍前報和使副白別幅細物五百疋錦一百疋鹿胎一百疋金錦一百疋緊絲一百疋青絲綾一百疋茶五十斤上等㨂芽小龍一十斤小團一十斤大團三十斤龍腦一百兩㭬燭三百條薰香三百貼右請檢留白囬謝書天㑹四年正月日大金皇子都經略處置使斡离不謹書上于大宋皇帝闕下復沐聖私以御書見賜諭言委曲存問稠重揣分尋涯何以勝此云大軍已到太原抑恐河西兵馬乗隙深入願速攔約㳟奉勑㫖非敢怠慢當司已准備彂遣先来計議王介儒撒离母及在此親信人與御前差到宋彦通等同去融㑹河西軍兵請元帥府就便指約次再立到誓約國書言出至誠可傳萬世本朝興復焉敢異斯所保歡和必深曩昔據安置定圍城兵馬今月日並勾抽還營應在城側近者十八日亦令退去于後輜重巳差約頓更不許過河信德真定等路駐下兵嚴行鈐束不淂虜掠燕京知院侍中統押漢軍續次待来近以差人指約去訖伏惟聖鍳照察謹上宋主囬書正月十九日大宋皇帝致問大聖皇帝皇子郎君荐示書詞備照情懇春雪寒沍匽薄近埛寝興之間諒惟勞止所諭已准備發遣王介儒撒离母及親信人與宋彦通等同去融㑹大原軍前并請元帥府就便約囘河西軍兵勾抽處所圍城兵馬還營應在城側近亦巳退去于後輜重約囬不許過河鈐束諸路劄下軍兵不得虜掠及約去燕京知院侍中所統漢軍載詳恩意備極周旋非誠貫金石義均一家安能復通信好軫念生靈委曲如是感悰所集毛楮奚殫誓約國書實盡誠意願保懽好傳之萬年更荷英仁曲垂惠諭誓心脩睦永愜至懐白别録信使王汭至承惠及人参一十秤至於多感有少微物囘荅下項沉香山子五百兩作一匣花犀酒盃二十隻作一合玳瑁酒瓶二隻托裏并盖全作一合撥花犀注椀一副二件托裏全作一合右請檢留白遣計議使副及囘謝書大金皇子都經略處置使斡离不謹上書于大宋皇帝闕下差去人使李士遷等囘伏承御書特加温諭㝷繹研味言悉由衷敦和懽盟益光聖德陛下既全終始質諸天神况斡离不等永念同盟敢不祗畏近知樞宻院李梲等至懇以金銀闕數欲将寶貨折充理當循從柰士卒軰有失元望可否之間實難于心復蒙示諭謂膚髪可捐猶且不吝言極意切感惻倍深静而思之兢惶交至竊縁大議巳定豈可因兹細故不終恩意乃於金内特减一萬鋌准五十萬兩兼爲講和已後大軍根取粮草雖經嚴切鈐束不得非分其間不無侵耗亦合約量更减銀一十萬鋌准五萬表裏十萬段疋上件所减物色并係合節次交送四停之数仍於見交六停金一色内更許准一萬鋌外者乞依所指五日賫送所在騾馬幸在京取刷肥壮交送如或决難迭数當依駞畜例抵折起運前来外中山河間兩府亦望差遣近上親信之臣嚴賜敕㫖令従隨少宰專行管勾交撥疆界及就便於河北至真定府其間州軍應有係官金帛取索充填歇下之数更或難可應迭擬准見奉御寶文字續次交送近者猥被聖恩賜到内樂百餘人不欲使去父母之邦㝷用放還辱從所請感藏之至無任下情外據所轄三府見在職官内不係本土之人恐有知識欲要者樁定姓名垂示即當發遣如不見公據請不收留内太原一路官貟乞便於交割宣内分明開指亦慿依應施行今差韶陽軍節康使耶律忠少府監充乾文閣待制太平府充計議使副奉書奉謝遣李梲持寳貨折兊金銀書係二十八日大宋皇帝致問大金皇子郎君輙有誠意幸加聰察兹者大軍南来再約盟好恩義之厚筆舌難言賞軍之物又蒙减定深見委曲懽和之意叙佩不已累日下令於民間根刷金銀告諭之法不問奴婢親戚隐藏之罪至於籍没家貲專命大臣明諭禍福分遣庻僚廣行歛取再得金二十餘萬兩銀二百餘萬兩通前巳報之数金共五十一萬餘兩銀共一千四百三十萬二千餘兩雖未足六停之数而實巳竭盡公私之藏金銀地寳生發有時鑛淘沙漬必以銖兩自非中都寳貨所聚太平積累之乆亦何能有萬数之多也自此朝廷宴設止有丹漆之器而市肆飲酌皆埴之資諒惟皇子郎君通明必知此詳盡而不在多辭今者通和大事既荷成賞軍物色豈敢計較多寡但以力屈財殫無可求索其肯吝惜以取疑貳若蒙仁哲深照此情伏惟大軍旋斾且無留滯又使本朝誓言永無虧失全此二美不亦善乎窃惟皇子郎君之意必謂既以施此惠好亦要寛假圎融以盡終始表叚皆新好之物可及四十餘萬馬騾駞数不惟多少類皆病瘦恐或不堪併兾寛明許以續發准折今有府庫累世所藏珠玉犀象寳器等并金銀絲合等物悉令知樞宻院事李梲持去倘蒙容留許以准折尤所願幸一聽裁决也其餘細瑣令李梲等面布并少微意亦令就逹左右伏幸照察春律尚寒惟兾慎白又書大宋皇帝致問于大金皇子郎君比者盟書旣定和議方深用孚千載之期永保兩朝之好輙因使介以物将誠今有寳物数件元係樁出送皇子郎君軍前令差李梲就便持送左右詳具別𥿄惟兾檢留白別幅珍珠束帶一條上有北珠二十五顆正透飛鳳犀腰帶一條花藤匣絲盒全金稜真玉注椀一副彚全玉酒盃一隻金托裏玳瑁盒全細鞍轡一副烏銀間金鍍柞子架坐全琥珀假竹鞭一條絲箱匣全宋主爲分畫疆界大宋皇帝致書於大金皇子郎君比嘗具書審逹清視復承翰墨深佩勤情詞意稠重味不已心腹相照了無疑間永同信約歡好益㴱所示大議已定豈可因兹細故不終恩惠减定金銀表段數目及許折騾馬之数比擬曲盡周逹事理尤見仁哲之用心也金銀再取於民間根刷詳盡委無隱漏所得之數敷足不充遂以歷世寳藏珠玉犀象珍噐等悉數持送本朝所貴不敢愛重因物顯意可諒此誠專有一書布叙令李梲等持逹更不再述惟幸孚察見諭中山河間府差官分畫疆界今差官兩貟付張邦昌下可令分遣勾當三府詔書圗本更不侯分盡先持去今邦昌允廸一依所議定犬牙不齊處兩平兊易施行其真定府以南至黄河州軍應係官金帛巳降劄子付邦昌并逐䖏照㑹令盡取交送先遣去女樂百餘人本示通和一家之意今来放還自非皇子郎君行英豪邁其誰能欽嘆欽嘆李梲回珠玉等物已承留納聊充贐路之儀豈勝感愧賞闕數議誠以公私竭盡無可取刷候軍囘路通四方計置逐旋持送尚兾髙明有以裁䖏其詳累具前幅不復多叙春寒氣候未常惟兾加衛饔寝白上宋主書爲二月一日夜犯軍營事大金皇子都經畧處置使兩路都統斡离不等謹上書于大宋皇帝闕下今月一日夜四更時有歩騎軍㳂孟陽河東西三處北向奪橋詰朝又大軍營西南刼陣前来當司量差兵馬隨路禦逐曽未逾時殺傷兵卒洎所獲器甲鞍馬其數甚多縁當司不識是甚兵馬又從何来願示其詳李梲王汭所計議事亦望端的垂諭日近所送元定賞軍物貨其闕甚多幸無依前稽滯今差檀州刺史張㳟禮充計議使謹奉書宋主囘書大宋皇帝致書於大金皇子郎君比者大軍遽至京城方懐憂恐乃承寛仁盡洗宿愆許脩新好獲安宗社貽慶子孫恩義之重實同天地前日觀察王汭来審所持犀玉等盡蒙留納并金銀等数亦從寛假尤荷恩意自非敦懽好之重何以及此所諭前書所陳未盡明白謹依来㫖悉從改易并交割三鎮詔書初二日早方欲坐朝遣来使還一併持去忽報初一日夜有兵馬在城外作閙本朝不知事因繼聞輙至大金軍前不勝哀駭㝷遣人根問指約至暮乃知姚平仲率亂城外諸路軍馬作過㝷令勾捉稱本人未囘軍寨亦見令人擒捕候見即正典刑以戒貪功誤國之士又執政間有素與姚平仲相善者形迹可疑恐相恊助巳先行出責了當且本朝自度事理其不, WYG: ''}
