  - {type: variant, offset: 14434, length: 290, content: 舉妄動者有三論彼此強弱之勢則本朝兵力寡薄難以迎敵一也前此敗盟煩大軍逺来逼近京城惴恐失措荷恩徳再造豈敢復有負約之理二也宰相親王特遣詣軍中爲質又遣執政大臣奉使事體至重豈忍置而不恤有傷君臣之義骨肉之愛三也皇子郎君仗義而来聰明果㫁必能察此方城外有亂兵故當日未敢遣使人便還深愧遲滯尚兾深照其他一如誓書所載天實臨之永永萬年罔復有渝今差資政殿大學士宇文虚中持書布叙并賫所換國書及三府詔書地圖等前去諒惟洞照白又書大宋皇帝致書問大金皇子郎君特承書翰銘感甚㴱所示初一日四更有軍兵輙爾犯營寨初聞甚駭寝食俱廢更蒙垂問但切悚惶已令根究盖是兩兵初來貪利要功統制姚平仲妄作生事見收身不到候捉至明正典刑李梲王汭所, WYG: ''}
