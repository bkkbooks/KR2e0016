front:
  text: 弔伐録上
  hash: sha256:0a9d05489a361dd2cfd47d87e81dfda3d90926a1a3dced811ff3b7c82f2b4c42
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0016_SBCK_000-1a}
body:
  text: 與宋主書天輔七年正月己卯其已前者軍上不留天輔元年十二月宋主遣登州防禦使馬政來曰日出之分寔生聖人􅀼聞征遼屡敗勍敵若克遼之後五代時所取燕雲兩京地土願􅂌下邑二年正月乙已宋使馬政囬遣撒覩報聘與宋約夾攻燕西二京隨得者取其地若出國所取即不在分割三年夏四月子朔使南宋撒覩回同宋使趙良嗣及其子宏來撒覩受宋國團練使官上命杖而削之南使囘遣孛堇厮勒􅂚魯等同往四年二月己亥使南宋厮勒等囬同宋使趙良嗣王暉復以祈請燕西二京地界書來六月庚午朔遣宋使趙良嗣等囘以所􅀗上京今臨黄府是也同知蘇守吉與宋且約夾攻取燕西二京地如約義十二月丁卯朔宋使馬政復來請燕地命如前約六年夏四月壬寅遣徒單烏賈高信哥使于宋七年正月己卯與宋書畧曰往􅀊越海計議興兵夾攻每有克􅀗所得者取後違此約獨乗遼􅀔上襄以行侵討而乃反被追襲聞軍帥劉延慶等已坐責罰又燕京僣號普賢女上表􅂯三乞請􅁛有南兵入城力戰破之殺戮殆盡歸命上國願爲附庸猶存大信以先許宋命之請若彼能如元約夾攻克捷則事不在言旣出間得而分付理應有報是以宣諭趙良嗣等合取時貢銀絹共准一百萬貫良嗣等言奉㫖并請西京路地界若不從所請止得燕京二十萬匹兩設猶未􅁢更加綾二萬匹外不敢擅加今相度燕京諸州土廣人衆今取與未决豈可輕易便行分付請抽退臨邊士卒荅宋主書天輔七年二月十九日二月癸卯遣孛堇銀木可鐸刺爲宋使副以烏林荅賛謀爲議事荅宋主書曰來書云所言代稅物貨并事目所載色數價直交割月日所與畫定界至遣使賀正旦生辰及置􅅦塲事並如來示所諭備悉美意外今年合交銀絹􅁛候到依契丹舊交月日交割特異元書理合一就重念春農般運不易曲從來意其銀絹請似前來與契丹物色一般者交送所有燕城侯各立盟誓然後交割今立草付國信使副到請依草著誓至日當議復盟春律在中兾膺多福今差孛堇銀木可鐸刺克國信副及賛謀充議事有少禮物具諸別幅專奉書陳逹不宣謹白白劄子與書同封昨者趙良嗣到於上京軍前計議五代以後䧟入契丹舊漢地州縣時止許燕京再差馬政更議西京回書只請就便計度􅀵復尋爲彼不能取致本朝自行復定又差趙良嗣等來議􅁛燕西兩京巳曽計議縁爲西京不在許限只許燕京所轄六州來書云其西京別作一段今來又令良嗣等許議西京欲一就􅀵復雖貴朝不經夾攻而念兩朝通和實同一家必務交歡篤於往日今特許與西京武應朔尉奉聖歸化儒嬀等州并土地民户其巳西并北一􅅁接連山後州縣土地人民不在許與之限㩀所許民户土地甚多自來攻伐撫􅀅帥士卒艱苦不少今來別無再索經畧請差人交割其諸事理已宣諭趙良嗣去訖來書􅁛契丹出没今差人押領大軍往彼幸􅂿地里交割􅀤行月日已諭使人省㑹所有盟誓候交割了日議定南宋回書三月戊午命馬同權管勾燕京事􅀅以其地付宋故也丙寅宋使盧益趙良嗣馬擴以囘書來三月日大宋皇帝致書于大金大聖皇帝闕下華緘荐至契好増勤爰馳預政之臣共著約神之誓惟兩朝弔民伐罪之舉振古所無而萬丗講信脩睦之誠自今以始用堅盟載永洽鄰歡來書云燕城等􅀱各立盟誓然後交割今立誓草付國信使副到請依車著誓至日當議復盟銀絹請似前來與契丹物色一般者交送並如來諭順履融和茂迎福祉今差中大夫試工部尚書盧益龍圗直學士大中大夫趙良嗣充國信使閤門宣賛舎人馬擴充國信副使有少禮物具諸別幅專奉書陳逹不宣白劄子同書封來所諭西京武應朔蔚奉聖歸化儒嬀等州并土民户本朝撫定備荷美意已令盧益等持銀絹往軍前賞設夏國素號狡獪唯務詐誕與昏主實甥舅唇齒之國日近上表乞本朝勾退北邉兵馬文字内指言貴朝仍自云與昏主累世姻親巳詢訪得知䖏所及􅁛奉昏主之命軍州及土地人民權令守護招集無使叛賊一向虜掠故夏國起集援兵屯於境上并據􅁁臣累奏夏國見勾集重兵廣備粮食借助昏主軍聲甚大用意非淺除已􅈲揮河東等路隄備禦逐外深恐貴朝欲知其詳所有真本文字今付去人西京管下州縣前書已言非務廣土實欲備禦昏主爲彼此之利今若􅀅已西并北一帶州縣土地付與夏􅀦則不特昏主見在天德雲内地分出没若使夏國㨿黄河以東州縣必與昏主合力爲害不細夏國自去歳已輙占據金肅河清兩軍如欲與此兩處請貴朝詳度外其寜邊天德雲内巳西并北一帶州縣土地合以黄河及漢地爲界漢地外以北土地如欲付與他國並從貴朝又持到誓書其間事理並依貴朝誓草又白劄子兩朝交往禮儀除合依見行禮儀外傳聞已上尊號今議特􅁛尊號以表交歡他日本朝如上尊號貴朝亦合相􅁛近累據河北河東帥司及沿􅁁州軍探報契丹昏主見在雲内地分出没已逼近應朔等州繳到昏主招諭軍民補受官職真本文字已令宣撫司移文貴朝照㑹及已指揮河東路遣發兵馬救助應州一帶極力備禦外請貴朝早發大軍往彼掩襲因以照應交割彂行月日貴朝所使傳聞四軍蕭亮已即位號神聖皇帝改年天嗣如所傳是寔所當置慮早議招捉使人銀木可等已得以厚禮用示誠意自此使聘往來禮數彼此並依契丹舊例亦如來諭但契丹往還舊禮有不繫事繁複者合行裁定庻彼此爲便置􅅦塲去䖏從貴朝所便交易並如契丹體例宋主誓書係依草􅂯立維宣和五年嵗次癸卯三月甲寅朔四日丁巳大宋皇帝誓書于大金大聖皇帝闕下天之所助者順人之所助者信履信思乎順則自天祐之吉無不利昨以大金大聖皇帝創興併有遼國遣使計議五代以後䧟入契丹燕地幸感好意特與燕京􅃰易擅順景薊并属縣及所管民户縁爲遼國尚爲大金所有以自來交與契丹銀二十萬兩絹三十萬疋并燕京毎年所出税利五六分中只算一分計錢一百萬貫合直物色常年般送南京界首交割色數已載前後往復議定國書每年并交緑礬二千栲栳兩界側近人户不淂交侵盗賊逃人彼此無令停止亦不得宻切間諜誘􅅰􅁁人若盗賊捉敗各依本朝法令科罪訖贓罰雖不􅀗蹤跡到䖏便勒留償若有暴盗或因別故合舉兵衆須得開報沿邉官司兩國強界各令防守兩朝界内地各如舊不得􅃒堵道路至如􅀅來殊方異域人使往還無致禁阻所貴乆通懽好庻保萬世苟違此約天地鍳察神明速殃子孫不紹社稷傾危專具披述不宣謹白一下項物計錢九十八萬七千二百四十貫文内除綾羅錦圈線不見分兩外計重二十五萬九千五百斤准一萬七千三百秤囘南宋國書夏四月壬辰復宋書癸巳以宋所増銀絹令扵燕地交付壬辰係初九日累交禮聘敦講世和復紆使傳之華克示載書之信指以萬祀昭然一言兹見􅁇好息民之心而得親仁善鄰之美義欲存於堅乆事更具於宣陳據燕京疆界只依兩朝差去人負同行檢視交割爲定所云交付西京􅁁界并夾攻契丹皇帝事已遣近上官貟押領大軍勒於今月十一日於彼應㑹仍報宣撫司凡􅀜夾攻事件須令與差去官貟計議從長施行其􅁁界亦依割定領受仍已諭使人􅁍合有囘謝禮数并報復文字送付差去軍下官貟前次議取被掠并逃去人户雖令宣撫司交付却只推延不肯早行發遣至今一未結絶必若􅁁吏徼功違約展轉如上件不切禀從實関引惹紊亂有失􅀅來乆結歡好若是􅂯取如此人口亦仰所司疾速彂遣又以契丹皇帝在隂山囘离保在奚部山谷以此兩䖏勾當軍事令取嶺北鴛鴦濼坐夏相度所謀雖同如或不泯後患地里咫尺特􅀜貴國自餘分遣别路兵馬須是當朝供給只據分􅀵捕奚囘离保契丹皇帝兩路兵重粮食合銷米一十萬石冝早䖏分取月日於檀州歸化州兩䖏分路般送到佇竢囬報炎歊在候保嗇是期囘賜誓書唯信與義取天下之噐也以通神明之心以除天地之害昨以契丹國主失道民墜􅂗炭肆用興師事在除弔貴國遣使航海計議若􅀅來併有遼國願還幽燕故地當時曽有依􅁢廼者親領兵馬已至全燕一方城池不攻自下尚念始欲敦好特以燕京􅃰易檀順景薊并属縣所管民户與之如約今承來書縁以遼國尚為大金所有以自來交與契丹銀二十萬兩絹三十萬疋并燕京所出税利五六分中只􅄸一分計錢一百萬貫文合直物色常年般送南京界首交割色數已載前後往復議定國書每年并交緑礬二千栲栳兩界側近人户不淂交侵盗賊逃人無令彼此停止亦不淂宻切間諜誘􅅰􅁁人若盗賊并贓捉敗各依本朝法令科罪訖贓罰雖不􅀗蹤跡到䖏便勒留償若有暴盗或因別故合舉兵衆須得開報沿􅁁官司兩國疆界各令防守兩朝界内地各如舊不得􅃒堵道路至如􅀅來殊方異域使人往來無得禁阻所貴乆通歡好庶保萬世苟違此約天地鍳察神明速殃子孫不紹社稷傾危本朝志欲恊和萬􅀖大示誠信故與燕地兼同誓約苟或違之天地鍳察神明速殃子孫不紹社稷傾危如變渝在彼一准誓約不以所與爲定南宋國書巳上並在燕國往復四月日大宋皇帝致書於大金大聖皇帝闕下使車係至聘問彌式馳約載之嚴共著誓盟之重誠参天地惠浃神人取亂侮亡遂㡳六師之績惇信明義共圗萬世之安仍睠雲中外虞昏主併沐親仁之好􅀗従恢復之心逺仞忱恂倍増感懌用傳于後永寘于懐兩朝著誓之後所務通懽􅁇好以保永世末節細故各不須較邀功生事搆造之人彼此所宜深察所云粮食燕雲兩䖏無可計辦今特於内地掇那米五萬石二萬石令河北路宣撫司於古北口外交割三萬石今河東路宣撫司於歸化州或應州以北道路快䖏交割並於七月一日以前節次輦致前去計㑹貴國軍下官員般取餘事悉如來諭順綏炎律茂􅂂純休今孛堇楊璞等囘有少禮物具諸别幅專奉書陳謝不宣謹白與南宋書草係天㑹二年正月二十七日西南西北両路都統所單定申今具此理索西南西北兩路都統并奚王府路都統撻􅂴南路都統闍母等節次申前後各管處所亡去張覺李石裊思并招過及自南京囬去又張覺等邀截下郎君習姑及援送燕京趙發統軍司所管以上逐起職官百姓工匠及諸軍下亡去驅使人口軍人妻室并刼掠偷遞過孳畜財物自來累具文字移牒大宋河北河東路宣撫司河東雲中府經畧安撫使等司燕山府代應朔武等州取索度推注不爲分白慿驗伏乞朝廷詳酌勘㑹兩朝誓書盗賊逃亡無令停止亦不得宻切間諜誘􅅰邉人及約定所許州縣所管民户其餘色人户並不在許與之限今㨿逐䖏奏前件因依縁由稱見􅀗慿驗由自推注不爲分付係違􅀒自彼顯然若只以違約推延便望休止亦不誤矣所據隨州縣因官􅀉客居契丹人户并逃亡招過及上件邀囘刼掠偷遞職官百姓工匠驅使婦女孳畜財物等如敦守誓約請依在邊帥臣所牒數目交付仍指揮逐處禁止乞囘示報南宋􅀗契丹昏主書係裏面抄白降到六月日大金皇帝致書于大宋皇帝闕下大寳之尊􅁢歸公授守不以道恕集人神故先皇啼舉問罪之師迨􅆌躬盡􅁇恡之略尤頼仁隣之睦生􅀗昏主之身人心旣以懽和天下得以治定爰馳使价庸示披陳逖惟聞知諒同􅂟慰今差復州管内都孛堇李用和朝散大夫守鴻臚卿知太常禮院􅀐都尉太原縣開國伯食邑七百户賜紫金魚袋王永福充告慶國信使副有少禮物具諸別幅專奉書陳謝不宣謹白與宋閹人河北河東陜西等䖏宣撫使廣陽郡王童貫書天㑹三年十一月三十日大金骨盧你移賚勃極烈左副元帥致書于大宋宣撫郡王闕下慿傳信復沐使音未孚結絶之誠難避重煩之議領兵前去之由已載别牒且兩朝之事若不互相容㑹湏至戰争夫如是則豈唯菑危轉甚更恐生靈枉罹塗炭是用遣人以俟雅報蓋以宣撫郡王所爲結約和㑹契義最舊况承來文若謂更有可議務在通融啇量伏念宣撫郡王有輔立之功位望所必謂議以讜言扶斯􅀅墜與其交􅄡争􅀾以傷生民寕若酌中兩便爲計果能如此其于貴朝非止社稷乆享安全更􅀗兩下益固懽和然後郡王忠孝克保終始長守富貴民頼其善爲天下之幸甚豈不美哉昔契丹請和之日朝廷限以遼爲界不見聽􅀙乃及今日所望取爲前鍳審觀􅀔與差去官貟評議定一律正嚴凝佇膺多福今差昭文舘直學士王介儒孛堇撒离母專奉書披述不宣牒南宋宣撫司問罪係元帥府天會三年十一月三十日前書所謂領兵前去之由已載别牒大金元帥府牒大宋宣撫使司近差寕昌軍節度使蕭慶孛堇撒离母專往理㑹所索户口事所淮囘牒􅁛本朝幅貟萬里人居散漫若再行根究難指有無又據差馬擴辛興宗所説與上亦同往者大宋與遼爲隣因爭疆場歳輸金帛不􅀗厭足遜辭􅄈納百餘年間勤於朝聘每事姑息不可殚言想其屈志實不􅀗已由此而言其苦於屈辱亦以深矣幸遇我先皇帝天縱英謨神資􅌖略方經營天下之初大宋遣使請雪前恥由朝廷以恩化爲務親幸幽薊才下全燕即時割賜此朝廷所以大造於大宋使大宋不勞而立其功以伸祖宗之屈自此始也大宋皇帝感斯大義遂立嚴誓卜於子孫乆敦信約何期立渝盟誓手書􅁛詔搆我􅁁臣使爲叛亂賊殺宰輔邀囘户口聖上以含容爲德取索户口之外一無理㑹尚自不知悔過反於沿􅁁多方作過暫無自戢爲此依准所降宣㫖移牒囘取的有無歸還􅁍􅁛本朝幅貟萬里人居散漫豈期縱驕誇慢弃德􅀒義如此之甚也酌其所意謂我土地之廣但得户口縱違誓約畢竟何爲有此横暴顯然而覺其姦囘容俟至今巳爲枉矣􅀂依前索以道理實慮空逗歳月今議􅂓整問罪之師且報納土之由仍依囘誓􅀵復元賜京鎮州縣今月二十九日起發前進須議公文牒具如前今差昭文舘直學士王介儒孛堇撒离母等前去事須牒大宋河東陕西等路宣撫使司到請照驗先行歸還朔武等州陳其罪戾具一切聽命無違公文囘示仍請貴司自就相近親見啇議容㑹結絶如或難以依應即請尅期甚地以决勝􅀒幸不疑惑住滯以至別議施行謹牒元帥府左副元帥右􅁥軍右都􅁥下所事跡檄書往者遼國運衰是生昏德自爲戎首先啓釁端朝廷爰舉義師奉天伐罪繄爾宋人浮海計議􅀱併遼國願割幽燕歳納金縑自依舊例先皇帝有容爲德嘉其來意置以不疑即時􅁢應爾後全燕旣下割之如約其爲恩信不謂不少於是要之以天地質之以神明乃立誓文盗賊逃人無令停止亦不得間諜誘􅅰􅁁民俾傳之子孫守而勿失洎宸輿北返宰輔東行不意宋人貪婪無厭稔其奸惡忽忘前施之義潜包幸亂之謀􅃍瀆誓約結搆罪人使圖不􅁤據京爲叛賊殺大臣邀囘户口啖以官秩反令納土仍示手詔􅀼行撫諭遂使京畿之地鞠爲㓂場才天兵臨境魁首奔亡而又接引輙相保蔽更易姓名授之官爵及至追索傳以僞首旣殺無辜又貸有罪不仁不恥於禮何如朝廷方務含容不彰其􅁖但誡􅁁臣户口之外一無理辨此所欲乆通懽好之故也彼尚飾以僞辭終爲隱諱仍招納逋逃反􅅰居民更使盗賊出没爲過所有􅀊貢又多愆期背恩莫斯之甚朝廷亦不咎之依前催索猶不聽從牒稱本朝幅貟萬里人居散漫若再行根究難指有無况事皆已往請别計議據彼迷辭意渉誇慢至於本境行􅀤文字輙敢指斥朝廷言多侮謗雖累曽移文俟其改過終然不悟罔有悛心矧又夏臺寔爲藩輔忱誠旣獻土民是賜而彼宋人忽起無名之衆輙行侵􅅰之事因其告援遂降朝㫖移牒解和俾復疆土仍以狂辭不爲依應反云夏人納欵曲有陳請大金方務恩撫初附之國且料不無曲意姑行順從既出一時私恩盡與夏人則大金順從夏人已爲周至自今不煩干預自當以道理所在且朝廷方隆恩造下浃群􅀖彼之兩國各􅀩其賜所與之地裁之在我肯以私曲以爲周至豈期詭詐昧於道理不爲禀從如此之甚者哉斯則非止侵凌夏國實開不懼朝廷此朝廷所以罪也盖聞古所重慎者兵也兵而無名非三代仁義之謂也其或仗順臨逆以直加曲斯萬世之王道焉反是則甚無謂也今奉宣諭興師問罪東自南京以來西接夏軍一帶諸路並進固不􅀗已况趙佶越自藩邸包藏禍心隂假黄門之力賊其冢嗣盗爲元首因而熾其惡心日甚一日昏迷不㳟侮慢自賢謂已有天命作虐無傷當其伐遼之日官軍所至有逆拒者或至傷殘皆非我所欲爲是其自速禍敗也或有舉城舉邑以部以伍効順歸欵者前官如舊厚恩撫立其勞績不次録用居民則省徭役輕刑罰各安其業諒已知悉今亦如前冝相爲鍳昔彼納平山是圖我疆今伐汴宋是圖彼地兹所謂出乎爾反乎爾者也若趙佶深悔前非聽命不違則雖云無外且未深圗止以黄河爲界􅂓報納叛之由是知自黄河以來皆係我民夫人已有之物安肯自爲殘毁再念其民居無道之國煩徭重役從来乆矣况遭閹竪要功生事近歳以来苦於飛輓流離道路曽不􅂓生今来若不預先曉告切慮其間別有牽迷枉䧟討罰須議􅃌揮右下宋國諸路官僚僧道耆軍人百姓等􅃌揮到日就便遞相暁諭善爲去就擇其曲直審其強弱度其逆順各以所部京州縣鎮村野邑社部伍寺觀蘭若山場迎軍納欵必加恩賞所有各手下軍人百姓僧尼道士女冠等􅀋一切如舊更不遷徙仍具頭領見帶名銜状申以慿依上施行如或權不在乎􅑏獨鰥寡以身歸誠厚爲存恤所據隨處関市之征山澤之禁前來須爲急務内有於民不便無名之歛仍仰所在官司開立状申當議􅀙便削去仍委本䖏就便開具文解申報所在路分軍前照騐據巳上䖏分條件出自至誠必不昧其神理亦仰子細省㑹兼巳㫖揮南京路都統所依上施行去訖付逐䖏准此天㑹三年十一月日次事目劄子係差孛厪呉孝民等持去肇我大聖皇帝起義弔伐亡遼燕薊一方最爲強大天兵一日忽至城下不血一刄順命爰念有宋航海遣使起初結好請復幽燕舊地即時割與惟少摘官吏強族工巧併不滿萬數徙之東行良不得已乃常勝軍相易之故著定誓書盗賊逃人彼此無令容納苟有違者社稷傾覆子孫不紹不踰月棄徳背惠手詔逆賊張覺隂相結搆殺我四執政大臣邀迫我官民以歸歳交金幣罔不踰時及正旦使賀􅁢中御前奏逹傳語二字深涉輕易其於本國窮奢極侈上下相􅂪恣行無道不忍多言殘虐海内人怨神怒此天奪之鍳假手於我大金前月二十九日師次邯鄲才有使人李鄴等􅀅到三省樞宻院所奉聖􅈲文牒歸罪􅁁臣全非當理洎審求的意方云前主自省愆尤不敢枝􅀒大變前月二十三日當已傳禪兩項歸過特有不同難爲准信又柰使人悃幅辭酸懇言本國君臣深自責恨前日之非但念人誰無過過而能改善莫大焉兼所奉宣㫖如趙主深自悔過再乞懽和仰就便酌中施行冝加恕道用存大義若不能誠心悔罪重乞懽盟可囚􅅞首先謀取平山童貫譚稹詹度并逆賊張覺李石衛甫趙仁彦等来詣軍前謝天下罪應自北界亂離来及南京叛亡諸職官工匠教坊百姓續次發遣前来仍以黄河爲界先請皇弟鄆王與太少宰科一貟權且爲質亦􅀱交割了絶審觀情状别無猜忌即便遣還外歳輸金幣并犒賞軍物然後計議施行如或不遇依從可預爲備捍指日相見􅁍兾端的囬示宋三省樞宻院劄子天㑹四年正月七日汴京城下受得下項三省樞宻院據探報到大金人馬漸次前来侵近京城欲行禦逐縁大金已差人使見到國門講和末委上件人馬前来有何因依者右差魏康劉鎬前去直至大金人馬見今盤泊去處取囬文連申靖康元年正月七日囘劄子肇我大聖皇帝爲契丹主容納叛人阿合産大王不行交送又多無道應天順人起兵弔伐是後不忍覆㓕欲與通好終不聽從直至亡國方始投降尚猶釋罪持加王爵又燕京留守秦􅀳國王􅁘律淳遼陽渤海髙永昌奚蕭良等各賜本部地界仍以世爵例皆執迷竟取滅亡夏國王李乾順逹靼靺鞈舌並助亡遼犯我行陣未鼓而破爲能改過各復舊居分裂契丹􅁁土以濟其地趙宋前帝航海遣使請復幽燕舊疆當此之時分白約示同力􅀵取爾来竟無接應形跡一旦天兵倐至不血一刄舉土向風盖自契丹二百餘年逺近無敢囘顧爰念從初結好姑務懽和即時割與恩義非輕著定誓書若納逃人社稷傾危子孫不紹曽未踰月棄德背恩手詔逆賊張覺害我四執政大臣邀我百官更易姓名公然任使歳交金幣並不如期及正旦使賀􅁢中御前奏逹傳語二字特越舊例深涉輕易其於本國窮奢極侈上下相蒙閹竪擅􅁠竒巧尅聚民間財玩至有室家懸罄人􅂚􅂓生往往弊源萬莫言一我今皇帝審是數端亡盟失道上符天心爰赫斯怒大舉天師數路並進理當問罪面奉聖㫖如趙主能悔已􅂈再乞懽盟仰就便酌中施行當司引領大軍取幽燕一路自入貴境必謂遣使来賫御筆改責前非縦横待命不至深入豈期直至邯郸才有人使李鄴等却只􅀅到省院所奉聖㫖文牒又言歸罪􅁁臣全非當理泊詰求的意方言前主自省愆尤不敢枝􅀒大變已至傳禪兩項歸責全是不同難爲准信縁差来人使不能􅀐馬事致淹留兼恐􅂗次别有錯失乃摘留􅀙軍先令孛堇呉孝民等持白劄子專去奏聞路次及城門首􅃒堵早不放入今及城下猶未遣還今上年少因亂登基詳度軍國社稷子孫禍福未能裁决新任大臣例不賢明若能英㫁其前朝作孽既爲人子未曽切諌至令據捨崇髙逃竄無地為子之罪莫大於此今可追悔往咎卑辭改責手筆誓書乞申舊好於義爲然今執政臣属不念前日清平姦賊同惡相濟棄之於市快天下心止以放逐便爲太罰又使宸顔􅁨辱不暇亦冝同力輔奏親詣軍前重求通好爲臣之罪復何可言當計在乆逺依應當司所請事目不但拔出生靈塗炭抑宗廟血食園陵安寝豈非幸甚苟或不然反令海内百姓肝膽􅂗地􅀑神乏主後嗣零落盖臣主俱新虚􅀒英􅂔不畫逺略謀取艱難乃前朝作閗亂之始今日成㓕亡之禍其爲大過更踰前日歷觀自古不道君臣於此爲甚兼貴朝兵􅀅與亡遼士馬優劣可見亡遼士馬勝􅀒明知即日簽㨂到舊遼契丹奚漢渤海軍衆不少其本國大軍未足􅁛数且當司一路除所經州郡并余路軍兵亦約定於汴京㑹集安置外見節次前来未㫁頭尾雖不欲一一分白貴朝亦必詳悉又自來邊方守傋兵衆不能禦捍侵及國門能免其難未曽或有貴國太平積有歳年止以奢華適意人民柔脆不習􅀐射創初設教以不知兵之衆而拒我熟練征伐强勇之士望可求濟往昔無聞更恐淺近官民聞言當司應以堅城不下求請和好勿冝輕信縁是與大宋皇帝結好脩盟痛可哀憫宗社傾覆子孫謝絶今皇帝正統天下髙視諸􅀖其惟有宋不可無主然摧㓕大權已入握内又爲元奉㫖諭丁寕屢遣人使遂與安和惟求轉禍成福勿有疑惑請准前去文字別遣使大臣􅀅呈御筆早圗萬世之利􅀂大禍已成須至自取㓕亡今後㫁絶往来縁大軍逺至難以停滯却請執定疾速見示宋主書契勘自太上皇與大聖皇帝浮海結約歳月已深逺割燕雲恩義至厚質諸天地共著誓書使聘交馳懽盟無間止縁姦臣誤國容納叛亡歳幣愆期物貨麄惡遂令信誓殆成空文隣國興師職由於此重念大聖皇帝從初講好欲卜萬年事至于今雖悔何及太上皇深自剋責乃付神器纉服之始不遑康寜夙夜以思冝伸舊好果􅂪使价逺逹信誠結約之辭悉以面諭自今以始傳之無窮共庇生靈永同金石緬惟英鍳必諒兹懐今差樞宻院事李梲尚書工部侍郎鄭望之充計議使副事目具如别幅想必炤察事目投拜職官人口盡行發遣大金國人馬抽囘議定更不以黄河爲界地土税賦所出改􅄈歳幣七百萬貫今来河北河東人馬抽囘賞軍銀五百萬兩絹五百萬疋金五十萬兩回宋書天㑹四年正月九日與前文手一就􅀤先来李鄴同去承計議使副知樞宻院李梲尚書工部侍郎鄭望之賫到御寶文字深悔前非􅂯求盟好傳之無窮永同金石仰仞至誠實爲大利雖有報復之心載惟元􅀙大聖皇帝結好曁我今皇帝㫖諭丁寕德義寛大拯救生靈􅂗炭冝舒舊憤以示新恩當開誠心與脩和睦今差元部旋節度使寳利復州􅃹内觀察使髙永義諸軍都部署判官司農少卿張原㳟與前次差人使同去計議其諸事條具如别幅若可依從請皇弟鄆王并太少宰科一貟不踰是日来赴軍前􅁠且爲質更或不欲施行無煩理㑹伏􅀱端的鄆王􅁠質候過黄河便議歸還太少宰科一貟祗交撥定疆界亦􅀱便放還事目並入御筆誓書自新結好已後凡圖書往復並依伯姪禮體施行今放黄河更不爲界可太原府中山府河間等一帶所有地分畫立疆至􅀅来撥属本朝於内城池別有變亂貴朝應􅃹擒制交送来示改􅄈歳幣七百萬貫除自来巳合交送銀絹兩色外擬只歳輸二百萬貫物貨合要賞軍兵物并書籍下項書五􅁥金五百萬兩銀五千萬兩雜色表一百萬段疋裏絹一百萬段疋馬牛騾各一萬頭疋駞一千頭囘書誓文及差康王少宰出質係正月十三日契勘太上皇與大聖皇帝浮海結約欲卜萬年偶因手詔平山張覺招納叛亡至使懽盟變爲兵革遂至大金數路興師今大聖皇帝次子郎君先及京城事至子今雖悔何及專差知樞宻院事李梲尚書工部侍郎鄭望之等趋詣軍前引過乞和正月十日承計議使髙永議等賫到文字大開容􅁢備諒純誠拯救生靈敦結盟好載惟高􅁩深劇忱悰已戒攸司悉從定約太上皇帝與大金大聖皇帝今皇帝義同兄弟今来國書當依契丹舊例禮從伯姪施行已許放黄河更不爲界可大原中山河間府一帶所轄縣鎮分畫疆至係自大金後比至立了疆界屯兵已前於内别有變亂䖏所當朝自當應􅃹擒制交送至於尺土一民不令侵犯招納若是與三府以南州軍犬牙出入不齊去䖏臨時兩平兊易應自亡遼播越之時北界流離向南并係大金叛亡諸職官工匠教坊百姓除元不曽到并巳死亡外應見在盡数遣還在京今隨逐前去在外接續逐處發遣一無停匿殘害錯失除自来合交銀二十萬兩絹三十萬疋外更歳輸二百萬貫以金銀疋帛并雜物折納决無麄弱愆期斯言之信金石不渝有違此誓神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行逺冀英懷永同重誓今差通直郎試給事中李鄴右武大夫康州防禦使西山閤門事髙世則充計議使副伏惟炤察謹白事目皇弟康王少宰科一貟前去相見以示信好便請遣囘賞散河北河東路軍兵物并書籍下項書五􅁥金五百萬兩銀五千萬兩雜色表一百萬段疋裏絹一百萬段疋馬牛騾各一萬頭疋駞一千頭右即今盡據城中所有内自宫禁係官司與士民宫觀寺院等處已行根刷慮或不足須至􅁛寛期限更於河北州縣及外路州軍起發送去囘奏宋主大金都經略處置使兩路都統所正月十二日大宋皇帝遣来使副李鄴高世則等降到誓文大開詳審推見聖意勇於改悔求踐舊好叙定兄弟之義卜於萬世更不渝變斯乃社稷生靈之福也當司深爲感切􅃍解重圍収聚兵馬鈐束􅀅校更不令駈虜殺戮所承誓㫖具載太上皇手詔平山張覺招納叛亡遂及大金皇帝及今皇帝義同兄弟今来國書當依契丹舊例禮従伯姪施行已許放黄河更不爲界可太原中山河間府一􅅁所轄縣鎮分畫疆至係自大金後比至立了疆界屯兵已前於内别有變亂䖏所當朝自當應管擒制交送至於尺土一民不令侵犯招納若是與三府以南州軍犬牙出入不齊去䖏臨時兩平兊易應自亡遼播越之時北界流離南來併係大金叛亡諸職官工巧教坊百姓除元不曽到并巳死亡外應見在並盡数遣還在京今隨逐前去在外接續逐處發遣一無停匿殘害錯失除自来合交銀二十萬兩絹三十萬疋外更歳輸二百萬貫以金銀疋帛并雜物折納决無麄弱愆期斯言之信金石不移有違此盟神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行既復舊約欲成長乆慮歳輸物多難以經逺施行兼奉宣命若能悔責委酌中理㑹今又特减放一百萬貫常年只許納一百萬貫折納并銀二十萬兩絹三十萬疋仍爲今歳分撥疆至事忙直候次年正月依舊例交納所有誓書乞早賜差遣國信使副就赴闕下告囘誓書當司亦准備具此申奏次如交割結絶之後苟有違變神明殛之俾墜其師今差都􅃹契丹兵馬輔國上􅀅軍耶律度福州􅃹内􅀚察使隨駕教坊都提􅀧王汭充計議使副伏乞照騐別上書正月日皇子都經略䖏置使斡离不上書于大宋皇帝闕下今月十三日差李鄴等賜到誓文皇弟康王并少宰一貟至仰體聖慈深増信喜事苟不然其如社稷生靈何今旣轉禍爲福重踐舊好貴朝不失農事早令當司兵馬無稽駐泊益彰至德當司已鈐束逐處軍兵不令驅虜殺戮所有國書􅂯立誓約乞賜盡言差遣信使􅀅擎来赴當司待慿彂遣赴闕即日一見康王便如兄弟相次事過即時遣還願勿􅁨疑更有但係亡遼契丹奚漢渤海雜􅀋人等無令劫掠傷殘早爲交割今月十一日夜南方天見赤􅂔直至天暁詳其分野正臨都邑能盡至誠務敦大信反身修徳必㡳銷禳縁念義同一家别白奏逹謹上報進誓書及乞約束書靖康元年正月十五日大宋皇帝致書于大金皇子都經略處使軍前特承書示備諒勤誠以康王少宰至彼灼知美意􅅧増信喜兼本朝不失農事早爲罷兵鈐束旣明更不殺戮凡慈来諭益重懽盟所言國書􅂯立誓約見今差遣信使賫詣大金皇帝闕下煩爲差人同往歳輸特承放减一百萬貫深荷恩意已於國書具載若非惇示大信欲保萬年何以及此亡遼契丹奚漢渤海雜􅀋人等自當發遣豈敢傷殘天􅁚示戒所宜反身修徳以銷去之重􅂪来示尤仞不忘近聞大兵已到太原攻圍未下和好之後義同一家願速約欄人兵以全一城生靈之命兼恐河西兵馬乗􅂩深入亦望早與約囘諒惟英悟必加深察謹白宋主致謝書及報因便附問大宋皇帝致問大金皇子都經略處置使軍前自承大軍逺臨􅀗惇舊契永懐恩義寤寐不忘叙好之初無以􅀅意輒有薄禮具如别幅言念懽盟既定盡出周旋此恩何窮眷想深甚自此每遇生辰聖節及正旦遣使專附問許之儀想當照察雪􅂗寒凛更加珍重白别幅真珠碾縷金鷄竿百戯人物腰帶一條黒漆匣全真珠蹙圏夹袋子一副上有北珠三十三顆麻調珠全真珠玉夾口笓靶子全細色并雜物􅂃絲五十疋金錦五十疋素絲綾五十疋紅錦五十疋鹿胎一百疋興國茶塲㨂牙小龍團一大角建州壑源夸茶三千夸共二百角毎角一夸龍腦一百兩薫香二十貼劄毬二十副每副五事論棒二十條右請檢留白囘謝宋主書大金皇子都經略處置使斡离不謹奏謝大宋皇帝今承復降御寳文字爲問報每遇生辰聖節及正旦遣使專附問許之儀并賜到珠玉疋段等物稠重恩徳何可勝言又言懽盟既定盡出周旋循省以來頗多惶懼此盖皇帝英明獨㫁歡好再成社稷永安生靈頼慶斡离不依准本朝皇帝宣命施行恩従聖造事靡已爲永念于兹難當㫖意惟願兩朝乆惇信義世固和成下順人情上恊天意今既事同一家仍慮百姓有妨農務所索牛一萬頭乞行罷去伏乞照察向融春律加祫震􅁭謹謝宋少主新立誓書靖康元年正月十五日姪大宋皇帝桓致書于伯大金皇帝闕下昨自太上皇帝遣使越海結約請復幽燕舊地交割之後著定誓書不踰月手詔平山張覺招納叛亡歳輸之物愆期正旦使賀􅁢中致傳語二字由此伯大金皇帝逺遣数路重兵入境問罪太上皇帝自省前非傳付神器適有大聖皇帝次子郎君一路兵馬先到京城之下遂專差樞宻院事李梲工部侍郎鄭望之趋詣軍前代上皇引罪自悔告和乞盟乃承二郎君遣使賫到文字開諭恩㫖如到日深悔前非􅂯乞懽和即委就便酌中施行今已計議定可中山太原河間府南一帶所轄縣鎮以北州軍分畫疆至別有地圖仍比至定了疆界屯兵巳前于内别有變亂䖏所當朝自􅃹應當擒制交送已後至于尺土一民不令侵犯招納若是三府以南犬牙出入不齊去䖏臨時兩平兊易外㩀往復國書伯姪施行并應係亡遼官吏僧道教坊工匠百姓等除元不曽到并已後死亡外並行遣還在京今隨逐前去在外接續逐䖏起彂一無停匿爲放河北河東土地毎歳輸送銀三十萬兩絹三十萬疋錢一百萬貫以金銀疋帛并雜貨折納無依前麄弱愆期以報重恩再結懽好斯言之信金石不渝有違此盟天地鍳察神殛無赦宗社傾覆子孫不享所有其餘該載不盡合約事件並依前立誓書施行伏惟聖明永同重誓倘蒙􅁢許佇候囘音今差通直郎試給事中文安縣開國男食邑三百户賜紫金魚袋沈晦右武大夫康州防禦使武功縣開國男食邑三百户王仲通充賫誓書國信使副有少禮物具如别幅專奉書陳逹不宣白宋少主􅃙太原守臣詔勑太原府守臣應中山河間太原府并属縣鎮及以北州軍已於誓書中議定合交割與大金事昨者大金以朝廷招納叛亡有渝信誓因舉大軍直至京畿社稷爲念所繋甚大遂割三府以㝷懽盟庻銷兵革之􅁨以固兩朝之好其犬牙不齊去䖏并兩平兊易合照誓書施行如有州軍未便聽從仰􅀅此詔書遍行告諭各務遵禀毋或拒違自取塗炭兩朝封疆接畛義同一家各寕爾居用保睦其中山河間太原府并属縣鎮及以北州軍見任􅀉居職官不係本土及從内地差去者不在交割之限今差朝奉大夫充資政殿學士簽書樞宻院事充神霄玉清萬壽宫副使文安縣開國伯食邑七百户實封一百户賜紫金魚袋路元廸賫詔宣諭咨爾守臣體予至意故兹詔示想冝知悉春暄卿等各此平安遣書指不及多七日宋少主與左副元帥府報知靖康元年正月十五日大宋皇帝致問大金元帥移賫勃極列軍前頃者太上皇與大聖皇帝浮海結約情義至重偶縁手詔平山張覺招納叛亡遂致懽盟變爲兵革属太上皇傳位􅆌躬方閲旬浃皇子郎君大軍已至京畿即遣知樞宻院事李梲工部尚書鄭望之備攄情懇復請懽盟皇子郎君惇兩朝和好之重特爲開允許以退師本朝㝷以遣宰相親王詣軍前相見土疆􅀊幣並已議定兩路賞軍金帛数萬至多尚慮元帥在逺未知的實今遣使人同皇子郎君所差親信㝷詣軍前諮白惟冀早為抽囘軍馬免致殘害生靈諒惟英懐必能洞照春首尚寒更加保愛微物􅀅誠具如别幅今差朝奉大夫充右文殿脩撰廣平縣開國男食邑三百户賜紫金魚袋宋彦通武翼大夫成州刺史汝陽縣開國男食邑三百户郝抃充河東軍前報和使副白別幅細物五百疋錦一百疋鹿胎一百疋金錦一百疋􅂃絲一百疋青絲綾一百疋茶五十斤上等㨂芽小龍一十斤小團一十斤大團三十斤龍腦一百兩㭬燭三百條薰香三百貼右請檢留白囬謝書天㑹四年正月日大金皇子都經略處置使斡离不謹書上于大宋皇帝闕下復沐聖私以御書見賜諭言委曲存問稠重揣分尋涯何以勝此云大軍已到太原抑恐河西兵馬乗􅂩深入願速攔約㳟奉勑㫖非敢怠慢當司已准備彂遣先来計議王介儒撒离母及在此親信人與御前差到宋彦通等同去融㑹河西軍兵請元帥府就便指約次再立到誓約國書言出至誠可傳萬世本朝興復焉敢異斯所保歡和必深曩昔據安置定圍城兵馬今月日並勾抽還營應在城側近者十八日亦令退去于後輜重巳差約頓更不許過河信德真定等路駐下兵嚴行鈐束不淂虜掠燕京知院侍中統押漢軍續次待来近以差人指約去訖伏惟聖鍳照察謹上宋主囬書正月十九日大宋皇帝致問大聖皇帝皇子郎君荐示書詞備照情懇春雪寒沍匽薄近埛寝興之間諒惟勞止所諭已准備􅀤遣王介儒撒离母及親信人與宋彦通等同去融㑹大原軍前并請元帥府就便約囘河西軍兵勾抽處所圍城兵馬還營應在城側近亦巳退去于後輜重約囬不許過河鈐束諸路劄下軍兵不得虜掠及約去燕京知院侍中所統漢軍載詳恩意備極周旋非誠貫金石義均一家安能復通信好軫念生靈委曲如是感悰所集毛楮奚殫誓約國書實盡誠意願保懽好傳之萬年更荷英仁曲垂惠諭誓心脩睦永愜至懐白别録信使王汭至承惠及人参一十秤至於多感有少微物囘荅下項沉香山子五百兩作一匣花犀酒盃二十隻作一合玳瑁酒瓶二隻托裏并盖全作一合撥花犀注椀一副二件托裏全作一合右請檢留白遣計議使副及囘謝書大金皇子都經略處置使斡离不謹上書于大宋皇帝闕下差去人使李士􅁶等囘伏承御書特加温諭㝷繹研味言悉由􅂨敦和懽盟益光聖德陛下既全終始質諸天神况斡离不等永念同盟敢不祗畏近知樞宻院李梲等至懇以金銀闕數欲􅀅寶貨折充理當循從柰士卒軰有失元望可否之間實難于心復􅂪示諭謂膚髪可捐猶且不吝言極意切感惻倍深静而思之兢惶交至竊縁大議巳定豈可因兹細故不終恩意乃於金内特减一萬鋌准五十萬兩兼爲講和已後大軍根取粮草雖經嚴切鈐束不得非分其間不無侵耗亦合約量更减銀一十萬鋌准五萬表裏十萬段疋上件所减物色并係合節次交送四停之数仍於見交六停金一色内更許准一萬鋌外者乞依所指五日賫送所在騾馬幸在京取刷肥壮交送如或决難迭数當依駞畜例抵折起運前来外中山河間兩府亦望差遣近上親信之臣嚴賜􅃙㫖令従隨少宰專行管勾交撥疆界及就便於河北至真定府其間州軍應有係官金帛取索充填歇下之数更或難可應迭擬准見奉御寶文字續次交送近者猥被聖恩賜到内樂百餘人不欲使去父母之􅀖㝷用放還辱􅀙所請感藏之至無任下情外據所轄三府見在職官内不係本土之人恐有知識欲要者樁定姓名垂示即當􅀤遣如不見公據請不􅀵留内太原一路官貟乞便於交割宣内分明開指亦慿依應施行今差韶陽軍節康使耶律忠少府􅁥充乾文閣待制太平府充計議使副奉書奉謝遣李梲持寳貨折兊金銀書係二十八日大宋皇帝致問大金皇子郎君輙有誠意幸加聰察兹者大軍南来再約盟好恩義之厚筆舌難言賞軍之物又􅂪减定深見委曲懽和之意叙佩不已累日下令於民間根刷金銀告諭之法不問奴婢親戚隐藏之罪至於籍没家貲專命大臣明諭禍福分遣庻僚廣行歛取􅂯得金二十餘萬兩銀二百餘萬兩通前巳報之数金共五十一萬餘兩銀共一千四百三十萬二千餘兩雖未足六停之数而實巳竭盡公私之藏金銀地寳生發有時鑛淘沙漬必以銖兩自非中都寳貨所聚太平積累之乆亦何能有萬数之多也自此朝廷宴設止有丹漆之器而市肆飲酌皆埴之資諒惟皇子郎君通明必知此詳盡而不在多辭今者通和大事既荷成賞軍物色豈敢計較多寡但以力屈財殫無可求索其肯吝惜以取疑貳若􅂪仁哲深照此情伏惟大軍旋斾且無留滯又使本朝誓言永無虧失全此二美不亦善乎窃惟皇子郎君之意必謂既以施此惠好亦要寛假圎融以盡終始表叚皆新好之物可及四十餘萬馬騾駞数不惟多少􅀋皆病瘦恐或不堪併兾寛明許以續發准折今有府庫累世所藏珠玉犀象寳器等并金銀絲合等物悉令知樞宻院事李梲持去倘􅂪容留許以准折尤所願幸一聽裁决也其餘細􅃈令李梲等面布并少微意亦令就逹左右伏幸照察春律尚寒惟兾慎白又書大宋皇帝致問于大金皇子郎君比者盟書旣定和議方深用孚千載之期永保兩朝之好輙因使介以物􅀅誠今有寳物数件元係樁出送皇子郎君軍前令差李梲就便持送左右詳具別􅁓惟兾檢留白別幅珍珠束帶一條上有北珠二十五顆正透飛鳳犀腰帶一條花藤匣絲盒全金稜真玉注椀一副彚全玉酒盃一隻金托裏玳􅈘盒全細鞍轡一副烏銀間金鍍柞子架坐全琥珀假竹鞭一條絲箱匣全宋主爲分畫疆界大宋皇帝致書於大金皇子郎君比嘗具書審逹清視復承翰墨深佩勤情詞意稠重味不已心腹相照了無疑間永同信約歡好益􅅧所示大議已定豈可因兹細故不終恩惠减定金銀表段數目及許折騾馬之数比擬曲盡周逹事理尤見仁哲之用心也金銀再取於民間根刷詳盡委無隱漏所得之數敷足不充遂以歷世寳藏珠玉犀􅁚珍噐等悉數持送本朝所貴不敢愛重因物顯意可諒此誠專有一書布叙令李梲等持逹更不再述惟幸孚察見諭中山河間府差官分畫疆界今差官兩貟付張􅀖昌下可令分遣勾當三府詔書圗本更不侯分盡先持去今􅀖昌􅁢廸一依所議定犬牙不齊處兩平兊易施行其真定府以南至黄河州軍應係官金帛巳降劄子付􅀖昌并逐䖏照㑹令盡取交送先遣去女樂百餘人本示通和一家之意今来放還自非皇子郎君行英豪邁其誰能欽嘆欽嘆李梲回珠玉等物已承留納􅂓充贐路之儀豈勝感愧賞闕數議誠以公私竭盡無可取刷候軍囘路通四方計置逐旋持送尚兾髙明有以裁䖏其詳累具前幅不復多叙春寒􅂔􅀱未常惟兾加衛饔寝白上宋主書爲二月一日夜犯軍營事大金皇子都經畧處置使兩路都統斡离不等謹上書于大宋皇帝闕下今月一日夜四更時有歩􅀐軍㳂孟陽河東西三處北向奪橋詰朝又大軍營西南刼陣前来當司量差兵馬隨路禦逐曽未逾時殺傷兵卒洎所􅀗器甲鞍馬其數甚多縁當司不識是甚兵馬又從何来願示其詳李梲王汭所計議事亦望端的垂諭日近所送元定賞軍物貨其闕甚多幸無依前稽滯今差檀州刺史張㳟禮充計議使謹奉書宋主囘書大宋皇帝致書於大金皇子郎君比者大軍遽至京城方懐􅁨恐乃承寛仁盡洗宿愆許脩新好􅀗安宗社貽慶子孫恩義之重實同天地前日觀察王汭来審所持犀玉等盡􅀩留納并金銀等数亦從寛假尤荷恩意自非敦懽好之重何以及此所諭前書所陳未盡明白謹依来㫖悉􅀙改易并交割三鎮詔書初二日早方欲坐朝遣来使還一併持去忽報初一日夜有兵馬在城外作閙本朝不知事因􅁇聞輙至大金軍前不勝哀駭㝷遣人根問指約至暮乃知姚平仲率亂城外諸路軍馬作過㝷令勾捉􅁛本人未囘軍寨亦見令人擒捕候見即正典刑以戒貪功誤國之士又執政間有素與姚平仲相善者形迹可疑恐相恊助巳先行出責了當且本朝自度事理其不敢輕舉妄動者有三論彼此強弱之􅀔則本朝兵力寡薄難以迎敵一也前此敗盟煩大軍逺来逼近京城惴恐失措荷恩徳再造豈敢復有􅀒約之理二也宰相親王特遣詣軍中爲質又遣執政大臣奉使事體至重豈忍置而不恤有傷君臣之義骨􅁏之愛三也皇子郎君仗義而来聰明果㫁必能察此方城外有亂兵故當日未敢遣使人便還深愧遲滯尚兾深照其他一如誓書所載天實臨之永永萬年罔復有渝今差資政殿大學士宇文虚中持書布叙并賫所換國書及三府詔書地圖等前去諒惟洞照白又書大宋皇帝致書問大金皇子郎君特承書翰銘感甚􅅧所示初一日四更有軍兵輙爾犯營寨初聞甚駭寝食俱廢更􅂪垂問但切悚惶已令根究盖是兩兵初來貪利要功統制姚平仲妄作生事見􅀵身不到候捉至明正典刑李梲王汭所議事一如来意一一當報􅀱王汭㸔定文字了當同遣人附逹賞軍物亦在書中備細陳聞和好事重既荷周還切望終始成之白􅄪上書別索犯夜者天㑹四年二月五日大金皇子都經略處置使斡离不謹上書于大宋皇帝闕下昨以太上皇誣神瀆明奉命致討正月七日大軍直抵都城方謀攻拔特承遣知樞宻院事李梲等具言上皇自省前非傳位播越以代上皇引過求誠遂依元奉宣命酌中計議復㝷舊好盟著誓書有如皎日始者不忍貴朝宗社顛覆生靈􅂗炭遂用解圍至於四面園舘屋宇都無所毁及放黄河更不爲界元許􅀊輸七百萬貫仍於見交金帛之数减免頗多本欲貴朝如此大議結以至誠矧誓墨未乾神聽甚邇理當祗畏豈可背違何期倐爾發兵􅀼犯營壘自取違禍前日之事起自上皇今日之爲所咎安往遂使師徒疑撓別欲施行差去人使王汭回状審皇帝召見面諭言輙流涕及承所賜書云初聞甚駭寝食俱􅆸謂以執政姦臣姚平仲等妄作生事貪功誤國反陳所不敢舉者三詞意懇切聞之惻然當司詳認實自向誤國者不度強弱之􅀔禍福之理徒以㺯兵殘民欲徼一日之幸重念皇帝即位日淺㫁不自􅇆而宗廟社稷㡬爲此軰所隕實可傷惜乃令諸軍特罷攻取仍依已立誓書一切爲定其造意執政姦臣及姚平仲等可日下執送軍前以塞衆怨従來雖以康王少宰爲質决是無所顧惜輙敢有此侵犯更以皇叔越王駙馬曹都尉同質軍前并於太宰李􅀖彦樞宻吴敏二人内科發遣一員交換少宰張􅀖昌亦􅀱割定疆界同時彂遣外據歇下騾馬金帛疾速交送如或有所不從幸賜端的垂示今差福州管内觀察使隨駕教坊都􅀧提􅀧王汭安州團練使耶律寕充計議使副謹奉奏聞謹白宋主遣報謝使副回書大宋皇帝致書于大金皇子郎君􅀩遣計議使副王汭耶律寕同宇文虚中至伏承書翰辭情懇屈深佩忱誠兹者大軍南来自抵京邑㪟講舊好許約盟書宗社載安生靈寕息是皆不貲之恩懷感何已使節往還既同絡繹和好之厚誓信彌堅豈意城外軍兵輙敢不遵號令妄舉甲兵夜犯軍寨以卵投石自取敗亡初聞驚駭不知所措惟恐貽怒皇子郎君来責敗盟之咎疑似難明煩辭何益今者乃􅂪仁哲深諒此情自非曲示懽和之意何以能此愧謝之深言不能究且強弱之形多寡之􅀔三尺之童可料而知以弱敵强以寡犯衆雖甚愚者皆知不可况講脩睦今􅀅一月彼此相照大事已成豈忍以目前小利乆逺之計而違其初心哉此理灼然不待辨析又且心膂之臣手足之愛爲質軍中寕不愛惜前書具白已􅂪垂照且聞軍兵聚集約日攻城嚴令一宣㝷即退散既欽約束之盟仍荷恩德之厚所諭皇叔越王駙馬曹都尉同質軍中并於太宰李􅀖彦樞宻呉敏二人内科發遣一員交換少宰張􅀖昌亦􅀱定疆界同時發遣事曹都尉今謹遣行昨者城中軍民數萬伏闕詆罵宰執殺戮官數人兩日之間輔臣罷免甚衆大宰李􅀖彦已屢乞致仕門下侍郎趙野亦在假不出中書侍郎王孝廸左丞蔡懋皆罷政事樞宻李綱除知大名王汭見止有樞宻呉敏新除左丞耿南仲新除樞宻宇文虗中及李梲四人在列事至於斯惟有誠實若皇子郎君不念􅀌危之迹不諒哀痛之誠雖罄竭語言無復可望儻䝉矜念許存趙氏社稷保全億萬生靈敢柝大恩存留見在執政官粗立朝廷稍安衆望即欲除張􅀖昌大率且令前去交割地界或更遣門下侍郎趙野爲質亦取髙裁惟越王以叔父之尊平日每所奉侍以姪遣叔情理不遑已遣弟肅王樞前去幸依元約只在黄河所有康王􅁍望先次遣囘以副手足之念姚平仲逆天誤國誅殛是宜比令四逺根㝷巳聞隕於􅄡鏑凡爲執政事涉可欵雖領行營之權實無結搆之迹雖自臣下違命要功亦由􅆌躬有失照察慙􅀒飲涕無以自明尚兾廓山藪之容俾􅀗全君臣之義止従貶責庻免嚴誅况邯郸軍役失守尚􅀩放還在於近臣終祈衿免所諭騾馬金帛事已納金五十一萬七千三百兩銀一千四百三十萬二千六百兩絹一十萬疋表四十七萬疋竭盡府庫舊積仍歛民間所藏盡數於斯無可􅂯得只􅀱軍囘之後道路稍通取之四方旋充元數騾巳納六百頭馬五百四十七疋之外餘皆尫瘁瘦疲素不飬在城中縦復有馬千餘亦乞留爲禁衛事至今日豈敢不従荷再造則天地同功䝉一譴則社稷立隕慎可投誠且實盟言有無幸今日之矜容觀他時之改悔後或有違誓約不顧大恩天實臨之禍敗不悔今遣簽書樞宻院事宇文虚中知東上閤門事王球充報謝計議使副緬惟英明必加孚照白上書兵囘差使副代辭天㑹四年二月八日大金皇子都經略䖏置使兩路都統斡离不等謹上書于大宋皇帝闕下昨者受命專征以太上皇渝變盟誓靈旗南向直抵京城伏承皇帝嗣位再請脩好遂依元奉詔㫖酌中計議著定盟約日復貴朝姦臣誤國妄起釁端于是當司實懐疑憤乃􅀩宸翰諭以􅀌危哀痛之誠重遣同􅂔近姻之質深諒大信克保有終前日之盟非此爲比且自大軍之來資索頗多上瀆聰明下匱民庻事不在已固非樂爲􅀼惟兵火一縦􅀵之實難自非皇帝仁明逺略屈已愛民安能使此禍危翻然爲福今兹大計已定而後無以舊事爲念惟祈永惇誠義共保生靈又承所賜書内該越王以叔父之尊平日奉事姚平仲死於鋒鏑李綱止從貶責其餘宰執近間求退罷免者甚衆既聞兹命敢不孚聽及􅀩諭城中軍民不遵號令今實恐轉生變亂以貽聖􅁨當司本圗安定貴朝社稷永固和好遂令城下諸軍退保舊寨湏是即日班師伏念陛下即位之初必欲推恩布澤以悦衆志特於元定賞軍物内减金一萬鋌銀一十萬鋌表一十萬段以充振乏廣施之用外有歇下金帛頭疋更望止於今歳逐月接續交送今方言還非不欲詣闕展辭少叙悃愊以在軍中不克如願謹遣左金吾衛大􅀅軍􅁠宣徽北院韓􅂦裔桂州管内觀察使耶律克㳟充代辭使副有少禮物具如别幅謹奉書奏辭以聞謹白别幅人参二十秤宋主囬謝書爲放還康王及减免金數大宋皇帝致書于大金皇子郎君使崇義軍節度副使髙安仁隴州防禦使耶律忠来承惠書翰豈勝愧感之情比者大軍南来􅀗脩盟約信義之重情愛爲深嘗遣皇弟康王少宰張􅀖昌詣軍帳前以示誠懇之實萬年之歡永以交孚不期姦臣誤國邀功生事輙出士卒夜犯軍營初聞駭􅕎實恐有害盟誓且以短書備叙誠懇伏承皇子郎君契同一家深照悃愊具知臣下之姦非出􅆌躬之意解疑息怒復固懽和既寛責問三軍之士亦罷攻圍感激之心言何可旣承諭本不欲貴朝有蹙迫之危故更不移前定稍有變渝新以限河爲定果能永惇大信􅀅来別有裁酌味讀再三深仭美意康王留軍前㡬月極荷管顧今􅀩還歸其慰顒顒更承减金萬鋌兹爲厚惠益諗眷存姑此叙謝言不究悉又書乞寛限送納賞物大宋皇帝致書于大金皇子郎君兹者危難之􅀖既􅂪恩於衿貸纎悉之懇敢避瀆於再三昨者李梲續起金二十萬兩其金俱係拘刷到民間稜稻􅁫釧器物之􅀋旋行折剥鉟銷遂有折耗實起􅀤及十九萬四千四百兩係欠五千六百兩續起銀二百萬兩爲金有欠数却起過銀二百八十四萬二千六百餘兩係大起過八十四萬餘兩至於都数之中更减免外通計所欠之数甚多又有騾馬名件不一兹審大軍􅀅還理當送納属以城中圍閉道路不通至於掌管之人亦多逃匿若㑹見備細實数又須数日遲留敢望矜憐許令於軍行之数逐旋筭計送納三府地圖本合通作一本又縁中有真定府路邊疆不齊曽令宇文虚中面懇英聽令只作三圖繪畫其分畫界至自有里堠分明􅂿行之時一一可見今者城中疑阻不保朝夕尚兾終恵俾早安寜至於纎悉曲折有應副未至之事凢百皆望矜貸此後比至交割疆封金帛騾馬未了之間應有往復文字當親加􅀧閱逹于聞伏祈照察白謝宋主餞禮書天㑹四年二月十日大金皇子都經畧䖏置使兩路都統斡离不等謹致書於大宋皇帝闕下比者已復舊好佇議還師伏􅂪聖慈特差開封府少尹就軍中賜斡离不等茶果龍腦酒藥并差去使人韓􅂦裔等復囘承賜犀御帶一條以隆餞別之禮仍被㫖稠重昭宣大信仰仭聖意曲殚㡳􅂨欽領之餘尤增感劇當司遂促歸期今月十日已令大軍旋斾所祈陛下社稷載寕生靈休息今差靖江軍節度使髙僧奴隴州防禦使大迎充賀少有禮物具如别幅謹奉書奏謝以聞别幅人参一十秤宋主遣計議使副書乞免割三鎮更增􅀊幣等事大宋皇帝致書于大金王子郎君比者駐軍近境屢􅃱尺書旋斾踰河嘗馳信使春和屇序福􅂂増隆既舊好之復脩冝誠言之盡布太原中山高陽三鎮雖限大河大逺京邑其間有逺祖陵城太宗祠宫在於子孫忍不保守高陽一帶稅賦舊以􅀵在納銀絹數中今復重割疆封非敢有愛惟河外人民不安生業其間親戚境土相隣一有往還動干盟誓所􅁨小事馴致大愆今欲更増歳輸銀絹以代三鎮租賦兼前未犒軍金銀表段騾馬等除已交過及􅀅府庫珠玉等並已送納向来使人囘許盡充折雖行减損餘數尚多候事平取之外郡而累年以来用度窘乏兵革之後又益空虚若取於民必生變亂前日汗城之事􅁨悸至今况自頃時歳幣麄惡皆因燕山之後民力凋殘盗賊縱横公私勞費金若歳輸金帛雜物又復􅀘發犒軍餘数物力不逮恐失前言所有歳輸百萬折爲雜物名件􅃈細道理阻脩毎歳困竭民力終不能足巳令使人一一囘逹􅀂許折爲綿􅁍帛令沿邉依舊設置􅅦塲許通商賈販賣庻得兩便其利乆長若必能補此難定之數則力所不能釁􅂩常在恐非和好之意望加照察兼昨􅂪貽書訴以果能永㪟大信􅀅来别有裁酌使人傳言亦諭此意今若復露情實隐忍不言雖從一時之宜恐有後来之悔况髙明英偉惟義是從想遂慨然寛其迫遽今差中大夫試工部尚書王雲定國軍承宣使曹曚充軍前計議使副專書爲懇尚勤保毓益介壽祺白又乞放肅王書大宋皇帝致書于大金皇子郎君春暄伏􅀱福􅂂具宜比遣肅王餞送還師期渡大河即令先返今聞行李巳過邢趙夙夜徯望未聞還音又聞肅王乍踐履䟦涉寝食失時冝近藥餌手足之愛實切于心今差使人躬詣和門懇㝷前約早使還歸諒守盟言必無留滯今遣王雲曹曚充奉迎肅王使副專書爲懇尚兾保綏白宋主與左副元帥書在髙平大宋皇帝致書于大金元帥移賫勃極列逖聞髙􅁩未覿英標兹􅄪請於懽盟􅀗永依於鄰庇興言載戢未易叙陳今因分地界官簽書樞宻院事路􅁢廸徃軍前親解玉帶一條真珠􅀟圈繋勒白一副逺􅀅信意并令皇弟康王亦親解玉帶玉魚一副同致謝緘􅃡惟孚察白囘宋主書謝宋彦通報和同韋一牒天㑹四年三月日大金骨魯你移賫勃極列左副元帥致書于大宋皇帝闕下頃雖結釁即復㝷盟爰遣使以報成遂致書而為問更多賜遣已劇感藏所有事理别差官賫牒三省樞宻院去訖淑律正融佇􅈾多福今差利州管内觀察使銀青榮禄大夫檢校工部尚書兼侍御史上􅀐都尉蘭陵縣開伯男食邑七百户蕭仲㳟朝議大夫守太僕少卿驍􅀐尉天水郡縣開國男食邑三百户賜紫金魚袋趙倫充囘謝使副謹奉書陳逹以聞不宣元帥府與宋三省樞宻院事牒大金元帥府牒大宋三省樞宻院近日簽書樞宻院路􅁢廸右文殿脩撰宋彦通等前次賫到大宋皇帝聖書方知河路軍已至京師割太原中山河間三府復講歡盟許以退師者㑹騐其所和㑹之事即與當府元奉宣意不恊然以盧河北軍前別有續奉宣命彂自太原前来攻畧至􅂭德府不伏招諭縱兵攻下暁示宣命别差官員撫定了當申奏朝廷未降㫖揮難便倒移歸還㝷具申奏仍留逐官依舊管勾才􅀱奉到朝命即當移報次湏至公文牒具如前事湏牒大宋三省樞宻院到請照驗比至當府别有移報以来勿以􅂭德威勝軍府并属縣鎮不係割數一似夜犯河北軍營多方謀害前件軍府官貟引惹生事儻有如此難保忱盟外據路樞宻專来交割太原府至界候軍囘到彼從長商議亦請照驗天㑹四年三月日與南宋書爲太原府不服交割三月十七日大金骨魯你移賫勃極列左副元帥謹致書于大宋皇帝闕下近淮簽書樞宻院事路元廸賫書前来􅁛河北路軍前講和了當議定割太原中山河間三府􅁢廸奉差交割太原府界至今月初四日重兵􅀅囘以道路隘窄住滯計㑹􅁢廸宋彦通滕茂實同當府差下官貟先赴太原交割施行今月十七日師次南􅀜比有路􅁢廸使臣談某何偉来到軍前􅁛太原府今来所降詔書與先奉指揮不同不肯出迎詔書不伏交割申議合交界至未見了絶難便退師見於太原府并左右州縣逐有草料屯駐幸無疑惑律正暄和願膺多福今因人使請奉書陳逹不宣謹白元帥府􅂯與宋三省樞宻院牒大金元帥府牒大宋三省樞宻院當府㑹驗自重兵進攻招下太原府已南軍府縣鎮差下官員􅃹勾撫定之後准大宋皇帝遣簽書樞宻院事路􅁢廸等賫書前次報與河北路軍前講和講定割太原中山河間三府已載誓書􅁍爲前件州軍不在来書除申奏外一面回書大宋報逐處差下官貟依舊管勾其事説諭報和使郝刺史非不委細近日有􅂭安府路户曹田子正儀工曹何企常等来到告稱大宋人馬入府拏了知府姚璠通判郝伸子儀等透身前来又據威勝軍司録王孝悌􅁛探知大宋人馬待来本軍􅀵拏以此走来才待移文理㑹次今年三月二十八日游􅀐來報廵到團栢鎮南不覺撞出南軍擐帶衣甲衝突先放弓箭不免迎戰退敗捉得軍人一名問􅁛􅂭德府官貟已經拏下前来到南関駐劄者須至公文牒勘㑹太原府雖承國書交割其府􅁛有所奉㫖揮不伏交割兼前件軍府又是官軍所到攻畧下處所並係申奏該在囘書未經了絶今来如何便縱軍兵強拏留下管勾官員及前来屯駐似属變渝誓約况當府重兵本爲分畫之事不肯了絶乆駐此地所銷草料湏因土民洎縱人民般取其中多有無知之人拒抗不服以至軍兵忿争又知諸處救軍前来不免遣軍體探致有累路居民相驚作過凢此等並関引惹生事及関分畫之事早不了絶致有如此若不移文理㑹實慮不見分白事湏牒文大宋三省樞宻院到請照騐前件洲軍並係已具申奏書報見今分畫未見如何輒縦軍兵􅀵拏留下官員及前来屯駐早具端的公文回示故牒天㑹四年四月日宋主回書孫因使副蕭仲㳟趙倫回并附黄絹書四月七日大宋皇帝致書于大金國相元帥重㝷盟好當脩往問之儀申遣使華来示交懽之意􅁢懐信義良用嘆嘉方此清和勉綏福祉白黄絹間諜結搆書大宋皇帝致書于左金吾衛上􅀅軍元帥又都監􅁘律太師昔我烈祖章聖皇啼與大遼結好于澶淵㪟信脩睦百有餘年􅁁境宴然蒼生􅀩福義同一家靡有兵革闘爭之事通和之乆振古所無金人不道稱兵朔方拘縻天祚翦㓕其國在于中國誓和之舊義當興師以拯顛危而姦臣童貫等違國擅命沮遏信使結納仇讐購以金繒分據燕土金匱之約蔵在廟祧委棄不遵人神恫怨致金人強暴敢肆陸梁俶􅅰􅁁境逹於都畿則惟此之故道君太上皇帝深悼前非因成内禪肆朕初即大位惟懐永圗念烈祖之遺德思大遼舊好輟食興嘆無時暫忘凡前日大臣之誤國搆禍者皆已竄誅思欲興亡􅁇絶親仁善鄰以爲兩國無窮之福此志旣定未有能逹而使人蕭仲㳟趙倫之来能道遼國與燕雲之遺民不忘耶律氏之徳兾假中國詔令擁立􅂄哲衆望所属冝乎國人無如金吾都􅁥太師者適諧至意良用忻懌嘗聞金吾都􅁥太師前爲遼國􅀅兵数有大㓛謀立晉王實爲大遼宗社之計不幸事不克就避禍去國向使前日之謀行晉王有國則天祚安享榮養􅁘律氏不亡然則於天祚不害其爲忠而於􅁘律氏之計則至忠矣宗室之英天人所相是冝􅁇有遼國克紹前脩以慰遺民之思方今總兵於外且有西南招討大師同姓之助雲中留守尚書􅂅忠之佐一徳同心足以共成大事以中國之􅀔竭力擁衛何有不成謀事貴㫁時不可失惟大師圗之書不盡言已令蕭仲㳟趙倫面道委曲天時蒸溽更兾保綏白靖康元年四月日宋主􅂯乞免割三鎮書靖康元年六月九日大宋皇帝致書于大金國相元帥本朝講隣國之懽累年於此矣歳時之聘金繒之奉所以結好於無窮者禮未嘗有闕而日加於前謂冝共保懽盟萬世永頼比因􅁁方邀功生事遂致傳疑連兵搆禍深入郊甸深惟厲階生自叛􅀅而首開􅁁􅂩者乃異時主兵之臣原其誤國之罪不可勝誅旣正典刑以謝天下奚皇子郎君㝷承通好以致退師固常遣使申諭三鎮及戒所過不淂邀遏囘兵而三鎮之民以死固拒且復懐戀堅守不下大朝雖欲令固不能使之必􅀙􅂯念􅁁􅂩之啓在於往年之姦臣而兹用兵之端不自本朝之今日兩國之人披堅執銳皆以忠孝各爲其主乃使暴露原野肝膽塗地恐非上天好生之徳亦非彼此愛民之意是以復遣使介請以三鎮稅租納充歳幣其燕雲舊地則不敢有愛用使南北之民各得其宜上合天徳下當人意永享長乆之安利固亦仁明之用心深惟忻代之師專從統帥想於議租之事或未詳知重使来師淹留吾地兹用聞命專從使詳告本末想惟聰亮亦所樂聞有少禮物具如別幅真珠蹙結束帶一條左副元帥囘書七月二十三日大金骨盧你移賫勃極烈左副元帥謹致書於大宋皇帝闕下適因專介祗受緘封旣䝉示其忱悰疊承遺以聘幣理宜復辯廼具幣章謹按今年正月十五日誓書分畫太原中山河間一帶比至立了疆界屯兵以来於内別有變亂當朝應管擒制交送者今雖未服向所言出於至誠則縱此不服亦冝自制副於前言以示篤和反云戒所過不淂邀遏囘兵當府故謂若不􅂪戒嚴則想皇姪之師未克易退乎况􅀼三府以死力抗而云非自本朝之今日失信如此誠意安在燕雲之地係皇姪已言之事何由再舉又来書􅂯念邊釁之啓在往年之姦臣今復不守約累遣兵衆㓂援太原目下又聞人馬前来徒使愚民遭罹孥戮此實可愍繫自于誰的非仁明之用心也若長懐此志果爲後悔當府已具細申奏取􅀱㫖揮次伏惟照察律啟微凉佇膺多福今因閤門宣賛舎人張亢回謹奉書陳謝以聞謹白兩路元帥府差官問罪書先爲遣使人蕭仲㳟趙倫報復割三鎮囘授黄絹書及三省印御寳分印結搆間諜之事至是告發天㑹四年八月十四日大金骨盧你移賫勃極烈左副元帥皇子右副元帥同致書于大宋皇帝闕下頃因起釁以至連兵曲直所歸彼此自見思淂㝷盟之計用申割地之言厥後事固稽留約復渝變况上皇之鍳未逺抑亡遼之戒在前誠思再造之恩可忽輕忘之意旣乆保有成之信盍早畫元議之疆曽自爲辭管行制送今則反假土民之固圉更張軍􅀔以解圍兹事難圗昔言安在廼者差蕭仲㳟趙倫等賫書報復囬日輙受間諜之語隂傳結搆之文敢蹈前非又在今日爲此㝷申過朝廷奉到宣命該據兹釁惡更踰上皇仰就便差官問罪從長相度施行今差保静軍節度使楊天吉昭德軍節度使王汭充問罪使副前去若深悔前非請速令皇叔越王皇弟鄆王太少宰一貟同詣行府賫書陳謝過咎仍據元割三府即行戒諭並令開門以待撫定苟不能此的示所圗白書外聞逹事件一昨據當府領兵至髙郵縣有元差去人使王介儒撒離母與差来宋彦通郝拯等同報講和備領㫖意續允廸至脱言交割太原府請先去計㑹本府官貟開門仍遣郝抃復報依准施行去時㝷差附奏切以太上皇承先皇帝之恩言不盡意後因棄徳結絶信使事至于今盖􅁁臣與執政通連邀功所致具此奏聞去來一據前項報和使副此時備言上皇自省前非傳付今上應有誤國姦臣並已貶竄顯是至誠㸔詳和事未審能保願以永敦大信是爲長計亦委具此附奏去来一遣郝抃囘領兵至太原府見依舊堅守尋問路􅁢廸如何不行交割􅁍􅁛囘到本府文字言交割朝命在先所奉堅守朝命是後致難開門兼姦細人等處􅀗得其真定府劉鞈書云李綱宻奉聖㫖委令堅守隨冝措置當府爲数處議同及路􅁢廸告乞申覆朝廷諭以􅁢廸上皇自省前非巳經禪位今次决無􅂯有渝盟定是姦臣依前邀功所致若欲申禀請就便施行由此路􅁢廸曽經奏審日後更無求耗此上量摘軍馬屯駐圍守本軍還赴西京前次太原府都統所申宋兵数路屢来援府足仭先􅀤釁端事不得已遣兵迎敵並皆掃㓕又於七月遣到張亢計議三府續發大兵節次前来亦戰殺殆盡㸔詳来意全是穏誤敵情潜畜毒惡欲解重圍非是誠實與當府預惻詐和先於郝抃䖏所言並同一當府切念昨以上皇禪位蓋撫􅁁帥臣誤國今即屢彂大兵来援太原府亦是姦臣所造深慮蔽䝉前後敗亡諸路軍兵巧誕奏聞不使上知一貴朝若遇復㝷舊好慮以止圗益已或不從本朝所欲决難休和因何舉此若許貴朝謀便終歳連兵又佀今日願不聽納姦臣乞以至誠脩睦勿虚示甘言包蔵異心非惟貴朝大金利便兩朝各有益國决千萬年一若􅁒准前休和乞依差去使副所賫書内事意施行除書事目外攻下太原續有聞逹事理一當府依准所奉聖㫖委差楊天吉王汭等充問罪使副元限行府比到太原􅁍􅃹囘来洎到太原其人等猶未還界稱早已牒取接伴去訖當府㸔詳應是爲已宻令堅守猶有謀圗復故指人使不早過界緣太原已是割属本朝理當存惜􅁍爲終不從順於九月三日恩怒縱軍攻取晝時便下闔城大小職官軍民並依軍法施行訖外張孝純并男浹二人爲是故違再結懽好爲首柄定府人不令依准交割殘損了太原府路生靈無数其罪並在前人父子合要張孝純在南骨􅁏以此留在軍前唯守􅀱家属乞賜發遣更慮姦臣奏言張孝純是爲國盡節忠臣不可分付儻或聽納終難杜絶渝盟必難休和若是依准發遣今後姦無敢再犯須是事出至誠使鄰國可以信重宋遣和議國信使副書七月日姪大宋皇帝桓謹致書于伯大金皇帝闕下昨日告􅀤知有絹書姦人作僞何所不至若兩國通和帖然無事則無􅂩可乗姦人不利縁此搆造意在離間頃者按治已正典刑諒惟聖朝特加洞照遣王雲去面道其詳王雲呈覆雲等奉本朝皇帝口宣自今春大兵至城下荷大金皇帝許再結懽盟皇子郎君成此恩惠社稷􅂯安生民休息但本朝大臣有懐姦之人致信義有􅉻今盡行竄逐專遣使三畨陳謝有下項事令雲等告求皇子郎君三鎮有本朝太宗皇帝行宫祖先陵寝在内及諸州民情愚迷顧戀若行討伐百萬生靈性命可憫欲以稅租折爲銀絹三十萬代割三鎮通舊来歳幣銀絹五十萬每年共計八十萬又犒賞金銀初承示及大数當時大臣不契勘的實爲報㝷以庫蔵初有及宗廟器物又搜索民間只得已納之数已荷皇子郎君矜察量減金銀表段及許以珠玉寳器等充折大臣又不曽開具所折之数後来取於外郡亦以目前姦臣用事費耗略盡今罄府庫應副犒軍之用恐必不能如数實出窘匱若不披露又恐食言晚夕念慮惟皇子郎􅀂仁明裁恕减免其歸朝官昨已指揮􅀤遣亦縁姦臣奉行稽滯今令所在隨逺近津遣前去自大聖皇帝通好結盟中間本朝姦臣誤國致煩用兵来城下荷皇子郎君傳大金皇帝宣命許酌中講和今増歳幣銀絹代割三鎮减免犒軍物数則恩深厚珠玉幣帛不足以昭致謝之意兼此日皇子郎君曽舉言下項禮数今惟大金皇帝開境數萬里撫有諸國欲以皇帝車輅衮冕等物爲謝及令使人附宰臣等表奉册寳増上尊號仍令三鎮之人遇大金皇帝生辰齋僧十萬人祝延聖壽已上物儀候得皇子郎君􅁢許増歳幣代割三鎮及减免犒軍物數書即專遣使賫詣大金皇帝闕下右謹具呈伏望皇子郎君體亮本朝皇帝遣使三畨告求和議免割三鎮等事特賜垂􅁢大軍早囘恕貸真定等處生靈之命乞令雲等先囘奏伏候令㫖靖康元年九月日和議國信副使武翼大夫馬識逺呈覆和議國信使太中大夫試禮部尚書王雲宋􅂯遣使乞免割三鎮増歳幣書靖康元年七月日大宋皇帝致書大金國相元帥比因專使嘗已布書具載悃誠想加通亮但以三鎮之民懐土顧戀以死堅守雖令不􅀙遂致宿師引日已乆重惟兵民各爲其主困于暴露深可憫傷是用欲以三鎮歳租充歳幣既不失通和之議抑亦爲長乆之圗諒惟仁明必能矜察已遣使大金皇帝及皇子􅀰君今􅂯命單車復陳本末願加聰亮有少禮物具諸别幅秋暑尚煩更希保䕶白左副元帥囘書天㑹四年九月十六日大金骨盧你移賫勃極烈左副元帥致書于大宋皇帝闕下謹按来書已别遣使大金皇帝者􅀼見大朝凡有事繫于聞上者臣子之分不得輙自施行但不知貴朝體例如何然其赴闕人使具申奏取􅀱指揮盖不敢擅為接引外三鎮堅守事粗知子細今来􅁍稱三鎮之民懐土顧戀以死固守雖令不從誠意安在若􅁒以稅充歳幣肯於􅀙初議約交割以立嚴誓嚴誓才立今又别議想其用意徒然以僞計苟望歸復縦不克遂須幣土民觀其大原誤於前謀堅壁不降盡遭屠戮此之事節猶未理辨况先准已降聖㫖遣使問罪去訖所望諸事並依已去書意分白垂報仍自今後似此無信事理幸無遣使虚勞徃復律正極凉佇膺多福今因太常少卿陳之詳等回專奉陳謝以聞宋復遣使告免割三鎮書靖康元年七月日大宋皇帝致書大金國相元帥間常遣使咸得及疆往布斯誠諒惟深察情義旣接和好斯通初兩軍元帥許割地而盟聞大金皇帝有酌中之語因知令德信是寳鄰旣而太原生民嬰城固守雖遣大臣特詔戀土終深遂致攻圍之師不免暴露於野守臣求救既以忠孝爲言􅀅士請行欲展急難之義雖非元約乃亦常情事湏改圗可令永乆願以賦租之入習以歳幣之常還守舊疆何違信誓盡除疑梗幸不置於胸中雖有短長兾亦忘於度外如其聞可􅀅見平寕愽易交通不乏四方之貨耕耘自若遂安兩境之民可保千年定如一日上符天道下順人心􅀼計髙情實同至願有少禮物具如別幅今差秘書少監李若水別幅金箱玉透犀帶一條玉酒器五件瑠璃器一十五件瑪瑙器一十五件玳􅈘器一十五件珊瑚七枝内二枝沉香五十両右謹專獻上國相元帥請檢留白回南宋書天㑹四年十月二十日大金骨魯你移賫勃極烈左副元帥致書于大宋皇帝闕下㑹驗今年正月十五日誓書三鎮比至立了疆界屯兵已前于内若有變亂處所當朝自管應當擒制交送者今承来書守臣求救既以忠孝爲言􅀅士請行欲展急難之議則上所立嚴誓大宋皇帝自爲渝變而王雲等至皇子右副元帥軍前所承事目􅁛奉本朝皇帝口宣本朝大臣有懐姦之人致信義有虧由此而言則罪歸於臣下也豈共事之中異端若此之多因未知所言孰是可取又来書云願以税租之入増爲歳幣之常者且以三鎮之地土人民旣割爲我有其所出租稅必竟何歸此雖不敏亦望粗暁况聪明者乎又王雲事目今罄竭府庫應副犒軍之用恐不能如数實出窘匱以此詳味特謂􅁦府唯貪犒賚之用且官兵所以舉者蓋行弔伐之義也尚所見如彼是知貴朝之不知罪已而惑之深也此中事理早遣人使入國問罪日月淹乆猶不囘程幸望髙懷從其􅁦幅微寒屇􅀱善保多福今因秘書少監李􅀂水等回專奉書承謝宋宣撫判官書九月十五日朝議大夫充徽閣待制樞宻院都承㫖河東路宣撫判官折彦質謹遣修武􅀰呉革脩武郎李梲致書大金元帥國相閤下彦質聞和乆而不能信則必戰戰乆而不息則必復和自簡册所載多矣不特今也自頃兵連而不解三軍暴骨已歷三時此亦上穹悔禍兩國結好息民之時也㳟惟主上皇帝㳟儉愛人出於天性視民如傷無此疆彼界之異二􅁁搆兵非其本心凡近日􅀅相大臣弗克欽承與夫謀國不􅆇爲天下生事者皆已黜之逺方永不復用彦質亦新命来典兵戎之􅀉陛辭之日仰承聖㫖深念生靈蹈兹塗炭至勞寤寐惻怛之訓丁寕切至皇天后土實鍳臨之比遣信使三軰王雲等躬詣大金皇帝闕下遣楊節度使及燕雲中軍前且道永結歡盟之好計其道理當巳有逹乎國都者又㑹闕下遣楊節度使至威勝軍前邊吏以聞此固以契主上皇帝聖心之所憫矣已聞臨遣官僚徃迓信使又􅅚􅁁吏日竢動息其誠意端慤亦可見矣彦質以不材謬當斯任切料天地􅀑神已有休息生靈之意故兩國皇帝各形至誠惻怛之心棄􅂢細故永保大和斯民大㑹可勝言哉彦質與閣下俱在疆塲儻各能體國願戒守兵之官按兵不動勿相侵􅅰以竢盟誓之必成和好永結則北方軍民必免􅄡鏑之禍流離之苦其受閣下隂徳大賜豈有窮已伏想仁明必能垂聽洞然而不疑也秋氣已凉伏兾善護寝餗以介福􅂂謹奉状布執事不宣宋謝過書靖康元年九月二十八日大宋皇帝致書大金國相元帥近者李􅀂水去想巳伏謁麾下奉書以道其略遣使以陳其詳諒惟英明特加用察昔在潜邸講學惟勤其於政事一不與聞忽䝉内禪驟覧萬機適當多事之搶攘未嘗諳練不免大臣之獻納悉以聽從無何姦邪輙生詿誤逮言章之交撃方悔悞於前非隨加竄流使瀕於死然亦晚矣追之何及惟􅀦相元帥器度宏逺智略沈雄他􅀖之人莫不欽重囘易荐至情義藹然感憮之私言不能旣或聞統衆入至真定嘗遣請和之使往詣闕庭當􅂪􅀙欲之仁各安疆埸幸􅀵兵而静謐必俟命於斯須頃被初恩更祈終惠克符願望豈勝感銘别録本朝和議使鄧紹宻回日皇子􅀰君令舘伴蕭實導意欲得白花蛇除巳附一合送皇子郎君外恐國相元帥亦欲得之以一合附送酒五十瓶果子四合茶一合風藥一合白花蛇一合右請檢留白宋宣撫司牒大宋宣撫使司牒大金國軍前契勘日近准朝㫖已與大金國講和約束諸道不令進兵及於九月中旬大金國所遣和使赴闕去訖近又據河北路開報􅁛所有大金國人兵昨曽在真定府等處日近並各未聞抽囬詳此兩朝信約固以聖明兼不住承准朝􅈲惟務約束不得生事日近㨿汾州平陽府等處申報各有大金國人馬抄畧致人户驚􅅰不安深恐縁此有害和議須至移牒者牒專差人賫牒前去請詳此速行約束彼處人馬務在戢歛各守信約無致抄略驚􅅰致有害兩國請和大議謹牒靖康元年十月三日牒朝議大夫充徽猷閤待制樞宻院都承㫖河北河東宣撫判官拆資政殿學士銀青光禄大夫河北河東路安副使劉太尉鎮洮軍節度使同知樞宻院河北河東路宣撫使种都部署司囘牒大金山西兵馬都部署司牒宋宣撫司准来文云云須議囘文契勘㑹近奉元帥府露布左副元帥報今月十五日占鎮真定府先􅄡軍都統申汾州不伏招誘今月八日攻下當司想其真定必不願歸蓋以大軍攻下一同汾州况近日元帥府已遣使徃貴國問罪雖知前去至今尚未囘来是致大軍未聞抽囘今承来牒既與議和應是貴國自以渝變前盟為罪􅄈割地土請和交過本府遂致開門引納重兵撫馴了當則其餘應合本府占守州軍縣鎮寨関􅁥亦宜逐旋交割接納王師益恊所請請議和得息生靈不然則止有傷朝廷合撫人民亦恐貴國不􅀗安便自兹愈深事須囘牒大宋國宣撫司到請照驗施行天㑹四年十月日牒宋宣撫判官書此書不荅以其僣越無禮不足與論故也十月十日朝議大夫充徽猷閣待制樞宻院都承㫖河北河東路宣撫司官折彦質謹遣脩武郎劉寳致書于大金元帥國相閤下彦質聞古者兵交使在其間此言小忿不廢大信也今兩國搆難逾三時矣而信使載馳禮聘交修則知王者舉事信義爲本非若㝷常貪土地矜殺伐之流可比方也故日者輙以尺牘具言本朝丁寕懇惻之㫖􅀼意上天悔禍欲令兩朝皇帝􅂢細故保大和其指甚明僕仁人也旣乏蘇秦犀首之辨口以反移從約又無燕卿齊庻之誠心以感動物􅂪徒以區區之志闒􅃈之論側聽逾旬無所發明懐不能已復進強瞽夫好生者帝王之大德也體􅀦者人臣之至分也故上有不忍之仁則下行愛民之政上有不貪之惠則下盡無求之節况於居輔相弼諧之任當疆塲爪牙之􅀉不肆欲以窮取惟内恕而及物此固賢逹明智挺立古今之表者故閣下胸中素定而兩地之人所望于閣下者也僕於平昔竊欽高義幸得溝綏靖之職居顧盻之地望旌旗而係心聞金鼓而增􅂔今信使入朝話言方洽惟須逺圗以荅天意幕府所以日夜驚勵切戒吏帖焉自戢義不當以又使北向而􅀜弓者也今游􅀐駸駸時獵於近郊細民無辜或困於劫執彷佯乎雞肋之􅀗而忽􅆌乎丘山之重􅀼仰閣下之謀猷義不出此意者偏禆未逹兩朝之大計也伏惟閣下以髙世之才居特尊之位舒􅆭歸其嚬􅀏安危係於静作號令所留草木􅋏然亦何惜隼使一箭之令使兩地生靈得以泰然歌詠閣下之功徳無窮之報施者僕雖不才願附羊陸之義惟閣下裁之不宣彦質􅂯拜宋復遣使謝請和使書係楊天吉等問罪回書靖康元年十月日大宋皇帝致書于大金國相元帥皇子􅀰君累常遣使相􅁇奉書今已淹時必開鍳意雖難盡言亦頗周儻爲繹思必加孚察大抵誰人無過貴自知旣克改於前非當徐觀其後蹈昔在東宫之日但歷覧於群書逮登寶位之初乃乍臨於庻政姑聽徔於宰輔不億度其姦欺難掩臺評㝷加憲責静言既往雖悔何追今者恵書意皆切理但三府乃祖宗之地况本土有陵之廟當務安寕乃經驚􅄖興言及此爲緒無􅂓雖殫累百之詞更致􅂯三之懇是髙明之徳易知愛孝之情當愠而和式見色容之量旣取而與尤爲特逹之恩厚有被䝉終期報􅁛初冬尚寒更希保護大宋陳謝請和使朝請郎試尚書吏部侍郎武功縣開國子食邑五百户賜紫金魚袋王及之等别録青絲綾五十疋紅錦五十疋鹿胎五十疋合錦五十疋藥一合龍腦二百兩荔枝一千顆生薑五十斤乳塘獅子一百顆棖子五十對邠州蒲桃五十斤小龍團茶一十斤大龍團茶一十斤夸子正焙茶一十斤右謹專獻上國相元帥伏惟令慈俯賜容納謹具状申聞謹状囘荅書外事件一諭及上皇自省前非傳付今上應有誤國姦臣並令貶竄勘㑹議和文字别有貶竄此亦誠如来諭盖縁初膺傳國姦邪未見刑誅之事難以遽加然亦不乆漸逐不令在内今則或竄或誅旣已乆矣後以不明􅁇用呉敏李剛呉敏則爲少宰李剛則知樞宻皆居要地親執政柄不知元乃蔡京蔡攸之黨隂相交結欲報蔡氏之㤙希兾復用其所妄作一體蔡氏其所􅁛宻奉聖㫖皆其專輙所爲承信使面出帛書半印見之悚然豈不慚􅀒此呉敏李綱相恊爲之初不加察爲所詿誤昨因言章交攻因先遣李綱在外爲宣撫使雖是總兵其實不令在朝然呉敏猶爲少宰中外相應爲姦不已自古􅀅臣􅄣兵不從中制故得自閫以外􅀅軍制之所以李綱在外擅自發兵若諭誤國之罪可擢二人之髪今則呉敏李綱皆以􅇡逐遐裔一見諭願不聽納姦臣至誠脩睦此乃善言見誨徳意甚美豈勝感服大抵天道昭然咫尺可畏况爲人主臨御萬民一言一語何可不思旣許講和願觀其後一天下之情逺近皆一暌間則疑生和㑹則疑釋兩朝搆兵初因暌間雖有使人去来書辭徃返然言不盡意未免生疑惟在聰明深加孚察一承差信使人未至本朝聞先遣二人持牒威勝軍界威勝軍小處不敢便申朝廷先申宣撫司是時宣撫李綱身在懐州見牒有問罪之名知罪在已畏懼朝廷必治其罪於是巧説遷延不以聞逹其後威勝軍奏到即便時發遣接伴在河陽等􅀱多日不聞来耗朝廷再三催促方知軍前信使入界古者兵交使在其間若非李綱挟情豈有稽留之理一彂遣張孝純家属垂情講好蓋亦憐無罪之民爲首就誅冝可緩也已􅀌之旅使悲號而載路冝慈惠之動懐彼微􅀋何足以除况威名已著于逺聰明幸察㫖意無犯一亡遼人有未發遣契勘亡遼人在此逺近有之其有官人皆是額外􅄈並不令管勾職事無補州縣徒費禄廪自欲􅀤遣非所占吝向者發遣正在􅅰攘之際㓂盗縦横􅂗路艱澁多遭攘奪亦被殘害􅃱老㓜失所深切憐憫一等生靈更無彼此只候通和既定兩境帖然即資給逐人安穏發遣元帥府書以黄河爲界大金骨盧你移賫勃極烈左副元帥致書于大宋皇帝闕下近日㳟依宣㫖遣使問罪来意雖以委任不當爲辭然不肯服罪致領重兵河北河東兩路齊進所經州縣軍府服者撫之拒者攻之今月十六日已到澤州界不徃前進及所遣先􅄡今月十四日已過黃河不施船栰不由渡口直涉洪水諒以洞悉載惟大宋屢變盟言若不以黄河爲界終不能乆故今議定河北河東兩路先行収撫其中或有来自河外者不選甚處人民並許放囘請差近上官貟前来並合一例存撫然念抛郷之人亦議定自河外見在兩路未下州府官貟兵人並許放囘請差近上官員前来交割引出俾見家小仍服罪訖一面先具凢所聽命不違國書囘示如或不見依從稍爲􅁶延􅀅恐别招悔咎律正凝寒善祈多福今差保静軍節度使楊天吉昭德軍節度使王汭孛堇撒离母前去奉書陳逹不宣李若水状大宋河東大金軍前告和副使徽猷閣學士朝奉郎隴西縣開國男食邑三百户賜紫金魚袋李􅀂水准勑􅄪差充河東大金軍前告和副使與告和使知樞宻院事馮獬同行今月十五日起程賫奉本國皇帝交割三鎮國書暁諭三鎮勑榜及詔路􅁢廸張􅀖昌依元約施行文字􅀼恐遲􅆡若水巳兼程先来差使臣王深尹宣蔡松及丘吉吕青前去軍前報信伏望令慈特賜照㑹施行靖康元年十一月日大宋河東大金軍前告和􅂙議武翼大夫武功縣開國男食邑三百户王履状大宋河東大金軍前告和副使徽猷閣學士朝訓郎隴西院開國男食邑三百户李􅀂水馮獬状大宋告和河東大金軍前國信使中大夫知樞宻院事安西縣開國子食邑四百户賜紫金魚袋馮獬右獬祗承朝命㳟造行臺輙犯威顔兾㝷信誓赦既往之不咎許惟新之是圗二境兵戈庻有息肩之漸兩朝懽好無握手之期冐昩而来匍匐以請獬年當衰邁位沗樞機得罪先朝㡬死凶邪之手受知今聖誤叨􅀅相之權常懐欲報之心逐備告和之􅃥趨瞻在邇喜懼交深謹具状申大金國相元帥伏候令㫖靖康元年十一月日大宋告和河東大金軍前國信使中大夫知樞宻院事安西縣開國子食邑四百户賜紫金魚袋馮獬状宋主書告和願割三鎮靖康元年十一月日大宋皇帝致書大金國相元帥專馳使介逺布悃誠今春大軍俯臨郊甸㝷以上皇傳位之意引過請和承大金皇帝子元帥奉伯大金皇帝酌中之命特脩舊好㝷報知大金國相元帥並令班師信義之重比堅金石於是宗廟再安生民頼慶乃割三鎮以謝徳惠旣而諸州民情愚執群臣議論二三往復告求致淹時月葢縁寡昧失不詳思誓約之盟豈敢輒易果煩大軍来詰兹事中外震動不遑寕居禮旣有􅉻追悔何及􅂈而能改請踐斯言其三鎮之地今並依正月所立誓書交割施行惟兾兩路大軍早囘使趙氏二百年社稷永保億萬生靈全其性命仁恩之大山海難喻自此傾城萬世不易上天實臨百祚在列何敢背違自取殃禍今遣知樞宻院事馮獬徽猷閣學士李若水充告和使副緬惟英哲必惟矜􅀙寒律方嚴倍加珎嗇白一今来交割三鎮並依今年正月誓書已詔路􅁢廸依應施行其交地官就差滕茂實一交割三鎮慮人民堅守已出勑榜告諭開門其師臣守令以下官吏兵民及其家属財物并客旅道僧隨行物色凢係内地人依今奉貴朝暁諭彂囘更煩詳諭所委官貟如欵施行一交割三鎮諭令開門若甲兵稍近即人心疑懼莫敢便出須煩令㫖移兵近北稍逺止令貴朝官貟好語説諭即人方安心兼若擁併而出顛沛於路無不受斃幸不慛促令其􅀵拾如約而歸􅀅来發遣北地官民敢不如是一北地官民已委隨處提刑責知令佐隨逺近次第盡数􅀤遣仍給盤􅆞差人防護至界交割一犒軍犒設兩軍金銀初大軍到城下庫藏所積旣以罄竭遂取宗廟􅀕器及宫中器物又搜索民間雖􅁫釧之􅀋亦巳鉟銷至如宰相及百官所繋金帶並括取不遺然止得昨来已送之数後来取於逺方州軍亦是日前耗費盡今盡㡳搜索止有金二萬五千兩銀三十萬兩見續次發遣自知微細不足犒設諒惟特加矜察貸免所欠不勝慙怍靖康元年十一月二十二日大宋皇帝致書大金國相元帥昨自太上皇航海遣使請求幽燕特承大聖皇帝異恩委割燕雲兩路猶爲不足手詔平山張覺招納叛亡由此遂致興師今春河北路皇子郎君兵馬先至城下太上皇自省前非㝷行禪禮遣執政以下屢告爲有􅂯造之恩割以三鎮酬謝又􅂪國相元帥雖已撫定威勝􅂭徳汾澤髙平等處爲念大義已定秋毫不犯亦便班師止以太原爲界續承使人蕭仲㳟趙倫等至報諭恩義被姦臣邀功復便聽從依前附使間諜大金功臣及舉國動兵以援太原詔新割州府堅守不􅀙及承問罪不勝惶恐今􅂪恵書兼来使保静軍節度使楊天吉昭徳軍節度使王汭孛豈撒离母䟽問過惡皆有事實每進一語愧仄愈増今日之咎自知甚明今准割黄河爲界貴國兩朝安便所有蔡京身亡王黼童貫已誅馬擴不知所在呉敏涪州安置李綱䕫州安置張孝純先知太平府詹度湖南安置陳遘見知中山又係在逺及不知去處便當根逐一依来命今遣同知樞宻院事聶昌賫送詔命令黃河東北路州府軍縣人民悉歸大金仍依来示一一專聽従命不敢依前有違以立信書今乞早爲班師以安社稷至願至懇白今具下項蔡京責授節度副使昌化軍安置已死童貫責授節度副使吉陽軍安置已誅王黼責授節度副使衛州安置巳誅李綱責授節度副使䕫州安置呉敏責授節度副使涪州安置馬擴昨任真定州路亷訪使今不知存亡詹度河南安置陳遘見在中山張孝純家属聞在徐州或南京河北河東兩路州府軍縣人民河東聶昌前去交割河北耿南仲交割弔伐録上弔伐録下聶昌説諭河東士民昌啓守土之臣自合遵奉朝命令守則守令棄則棄今旣有􅃙書令割與大金何必區區堅守即今若堅守則必招大兵攻打殘破應河南官員軍人百姓商旅旣不得南還而土人又不免屠戮之禍何可遂復業耶况於京城危迫如此方藉交割以退師儻若稽緩豈不誤國大事今交割兩路河北則差耿門下河東則親賫詔書朝廷危迫之意可知矣昨者備坐聖㫖約和通以次出城靣議旣不略至城外審驗是非諭問端的輙下矢石引兵出戰殆非體認朝廷危迫之意昨晚又遣三軰賫勑書徃又復無報不知公等意欲何爲今交割大帥亦不以城中拒守爲怪但欲疾速交割以了國家大事開門之日秋毫一無所犯放官兵啇旅南歸皇天后土實鍳臨之幸早爲之所無疑慮若稍遲大兵一至悔無及矣昌舊名山六月間賜今名恐公等未知故以奉聞古者交兵使在其間盖欲通彼巳之情也昨晩親詣城下遣使臣賫劄子奉聞輙下矢石又􅂯遣三介賫􅃙書去亦不見還豈非所傷乎他國遣人尚不可如此况本朝皇帝遣一樞宻親行而所差去皆朝廷之人不知輒固拒何也請深思之無貽禍宋主與河北河東勑􅃙官吏軍民等頃者有渝盟約致大金興師朕初嗣位許割三鎮以酬前恩偶縁姦臣違誤三府不割又閒大金功臣再致興師使河北河東之民父子兄弟暴骨原野夙夜以思罪在朕躬念欲息生靈􅄡鏑之禍使斯民復見太平莫若割地以求和講兩國之好是用黄河見今流行以河北河東兩路郡邑之民属之大金朕爲民父母豈忍爲此盖不得已雖居大金苟樂其生猶吾民也其勿懐顧戀之意應黃河見今流行以北州府並仰開門歸于大金其州府官員兵人即依軍前来書許令放囘南地速依令􅃙勿復生疑故兹示諭想宜知悉冬寒汝等各比好否遣書指不及多勑付諸州軍下項一河東路岢嵐州隰州保德軍憲州火山府忻州遼州太原府汾州懐州寜化州平陽府石州平定州絳州威勝軍澤州􅂭德府代州一河北路濬州衛州相州磁州洺州邢州趙州真定府中山府永寕軍深州析州北平軍河間府莫州安肅軍順安軍廣信軍雄州保定軍信安軍保州覇州樞宻院告諭兩路指揮樞宻院勘㑹昨以大遼失政興師弔伐有大宋遣使航海請割幽燕元係五代䧟于契丹朝廷方務善鄰才􅀗幽燕即割全地歸復界至此乃朝廷有大造於宋也不料大啟貪心潜謀不􅁤結搆平山禍及宰輔招納民户接引叛亡然朝廷尚存大體􅃙戒􅁁臣惟索人口之外一無理辨亦可謂包容之深也而彼人猶不悔悟飾詞隱蔽譎語百端及云本朝幅貟萬里民居散漫無䖏根㝷又於疆場多方作過去冬宣委元帥府興兵討罪兩路並進有皇子右副元帥先到汴城舊主奔逃􅀼行襌位盖亦自咎也新人嗣立哀泣告和遂成所請惟割三鎮以贖其罪即時班師何期誓墨未乾盟言巳變宻勑居民嬰城堅守續遣大軍㓂援河東雖每遭覆敗尚不知改過再奉宣㫖重行弔伐先以黃河爲界除兩路前次攻絳州府軍縣州先遣先􅄡軍今月十四日平涉洪波昔所未聞非夫􅀗罪自天豈有如此之異盖亦自作之孽故也仍遣人使説諭此意及帥府今月二十七日駐泊永安軍宋方致書云深悔前非聽命不違别差門下侍郎耿南仲同知樞宻院聶昌前去交割黄河以内州府人民並歸朝廷再念彼民以其易主寕無顧戀之心然乆在薄俗早不􅂓生爾亦共知况今並許各居舊郷一無遷徙朝廷亦俟元帥府措置了日厚與存恤應自前日煩苛科斂重役諸般巧細糴買折變香礬塩茶之􅀋凡爾疾苦候隨處所申到於民有害並與蠲除或有饒利亦與興舉亦見太平之日后讐之異當使知之合先告諭須至㫖揮河北路濬州衛州相州磁州洛州邢州趙州真定州中山府永寕軍深州祈州北平軍河間府莫州安肅軍順安軍廣信軍雄州保定軍信安軍保州覇州永静軍兾州㤙州青州河東路岢嵐軍隰州保徳軍憲州火山府祈州遼州太原府汾州懐州寜化軍平陽府石州平定州絳州威勝軍澤州􅂭徳府代州嵐州慈州河陽府河中府右下逐處可照驗就便及指揮所轄去處粉壁暁示管内官僚僧道耆夀軍人百姓比至相次別行措置規畫以来並仰向化爲業勿謂早不歸降別生疑懼仍比至正官到任須得自相告諭各務安堵兼河内州府人民應自来驚移自河南者見於宋國追索遣囘復業若隨處有逃散户口亦仰逐旋招集着業今隨處旣歸本朝冝同風俗亦仰削去項髪短巾左衽敢有違犯即是猶懐舊國當正典刑不得錯失付逐䖏准此天㑹四年十一月二十九日元帥府與宋書兵近都城天㑹四年閏十一月三日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下近楊天吉等囘特沐華音准割黄河東北路州府軍縣人民悉歸大金仍依来示一一專聽従命者當府照㑹訖深仞美意見差官同知樞宻院事聶昌分路交割去訖今勘㑹有數州在河内而来書不入交割之數所索官貟及家属多有漏落係使人理㑹不盡来書亦不見分明又不言後約以故兩路重兵巳近都城期在定一今差保静軍節度使司農少卿楊貞幹孛堇撒离母專往計議所有事宜並巳丁寕口諭前去幸望依従以副従命之言初陽在律善􅂂多祺專奉書陳逹不宣宋書乞免攻城靖康元年閏十一月日大宋皇帝致書于大金國相元帥比者旌斾逺来跋涉勞止嘗通音問未徹聽聞念和議之巳成且使華之先辱􅂯馳微物用表私􅂨幸遂免於攻城仍早還於歸􅀐以示兩朝之信克成萬世之懽郊野沍寒倍希保愛白又靖康元年閏十一月日大宋皇帝致書大金國相元帥比者累因專使布問想皆呈徹逺来特承書示備悉勤誠伏自今春國相元帥由懐州􅀵兵還北敦結和好其於眷厚極用感藏継因闇於聽任遂生嫌􅂩雖自咎悔巳無所追是以王汭方行即令馮獬李􅀂水等如諭交割三鎮及楊天吉撒离母與汭􅂯来承議畫河亦便遣同知樞宻院事聶昌即日就道依諭前去所以每從来意誠欲休息戰闘全保生靈不謂旌斾當此􅂭冬逺至城下重勤跋涉深所不皇載念仁人之心必能周全少加衿察以終前惠􅀵還兵馬不使攻城宗社􅀗寕民庻安堵其爲恩念何以比諭感幸之深言不能叙初寒在律倍兾保調白與宋主書天㑹四年閏十一月十三日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下頃者專使人仰期親㑹今辱書音雖云備悉而使人却􅁛大宋皇帝有懐疑惑者其所云躬親出城豈有他意但以前後所言一無誠信遂有是議以驗禀從今旣疑惑肯忍必也果若聽命不違據見去人使所諭事冝並依從更有事冝仍遣親信堪議論官同何㮚等不過此月十五日出城貴慿約喻比至結絶以来别遣上皇越王皇子親弟爲質今再差保静軍節度使蕭慶司農少卿楊貞幹孛堇撒离母等專去計議式當寒律善保多祺白取干戾人劄子童貫有子師楊師禮等蔡京蔡攸王黼李綱李彌大劉韐王安中馬擴詹度陳遘呉敏徐䖏仁折彦實折可求吕仲張孝純王秉巳上干戾人數滕茂實范直方李嗣本蔡靖髙世由巳上本身或有兄弟在本朝取家属圓聚趙良嗣并衆房伯叔弟兄元係北人折可存係歸降逃走又右班殿直張觀東頭供奉官楊忠敏自身張謙張兾特領長行軍二十餘人八月内走係忠順軍宋主遣士説往議靖康元年閏十一月日大宋皇帝致書大金國相元帥比者再承来使備見勤誠特免㑹盟尤佩厚意國相元帥遂引重兵方此沍寒衝冐勤勩頓師之乆不急攻城出於寛仁良用感戢所諭欲令親信往議事宜遣皇伯士説大臣馮獬前去載念惠好之厚更望曲全終始冬序方深倍惟調衛白士説等充報謝使書靖康元年十一月二十一日大宋皇帝致書大金國相元帥近者專使之還已有謝懇逺勤旌􅀐乆駐郊坰方此凝寒匽薄匪易内深慙灼良所不皇至於臨城攻撃頗緩尤仭来意出於寛仁極於懷荷載惟通和之乆徳業已深更兾始終便爲解圍永固懽好今差皇伯士􅀃樞宻馮獬充報謝使副祈寒在律倍兾保調白囘宋主書係差皇叔祖漢東郡王仲温同知樞宻院曹輔囘書天㑹四年閏十一月二十二日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下介使復来音書荐至詳味􅂯三徒深披閲而来使云一面攻城遣使有懐疑惑又云報謝通和乞好解圍者且今之所舉盖縁渝約雖有聽命之言未有聽命之實况以議定畫河特謂信湏差官同去交割而彼人反謀捉拏此之無信甚於去春遂議出質割城􅀤送官負聽命遷都表信方許通和人使旣囘一無依􅀙以故曽議進撃然念宗社不忍立墜且陳器備􅂓示攻城之􅀔本俟貴朝必圗悛悔而自謝和其安在必欲保全宗社永固懽和􅂚若並從巳諭表信有實則所謂解圍肯延時刻一諾之言争忍反覆如或執迷决無聽􅀙敢謂安危之理灼然驗於臨時􅂭寒犯律倍多祺白宋主差李仔充請命使文字係二十五日破差李仔充往大金軍前請命景王祀充使謝克家副使李仔副使係改差與宋主書要近上官貟議事天㑹四年閏十一月二十六日大金骨盧你移賫勃極烈左副元帥皇子右副元帥致書于大宋皇帝闕下累遣使人備陳誠懇縁以執迷未盡定一且朝廷全付燕雲盖務善隣而貴朝不爲厭迀遂昭背徳結構逆賊招納叛亡此釁􅂩之所以生也去春王師到城哀鳴請和願畫三鎮計許和好又圗不􅁤宻令堅守遣兵救援此釁􅂩之所以深也洎再舉問罪猶執謀計不肯聽命遂致事􅀔及此尚慮京人驚駭昨日遣李若水以下使臣入城以示慰諭今承遣到景王一行洞悉悛悟然聽命事大專俟更遣執政何㮚并近上堪與議事共同請命無以猶迷禍及平人專奉書陳逹不宣白宋主求哀書靖康元年閏十一月二十六日大宋皇帝致書皇子元帥乆􅀩恩惠深用感銘不過尤尚煩責数比者大兵屡至城下危然􅀌壘攻撃何難及巳登臨猶存全愛方圗請命更辱使音特俾安心仍無後慮感極垂涕夫復何言謹遣濟王栩中書侍郎陳過庭求哀懇告切兾収兵天雪沍寒敢祈保嗇不宣白宋求􅂯造靖康元年閏十一月二十六日大宋皇致書于大國相元帥軍前李若水等到特惠書誨及傳面諭指意備悉寛仁感刻難弭巳依寵諭遣右僕射何㮚濟王栩中書侍郎陳過庭前去請命更望􅂯造保安宗社愛全生靈不勝恐懼哀祝之至雪候沍寒倍祈珍嗇不宣白宋求哀請命書靖康元年閏十一月二十七日大宋皇帝致書大金國相元帥大金皇子元帥比者遣何㮚等奉書想已呈澈危廹之懇必􅀩矜憫言念和好之重出於薄徳聽従弗明以致召釁逺煩旌􅀐深所不皇然念来師徒旣登城堞何㮚濟王相等又来囘歸城内人情惶􅅰異常撫諭不定深憂自致生事􅁍使不能奉承徳意敢望特加存全早賜指揮少駐兵馬以安人心所有欲約事目一一謹即聽􅀙便當㰱血著盟傳之萬世其為大恩何以此謹􅂯遣使御史中丞秦檜徽猷閣學士朝奉郎李若水武翼大夫王履求哀請命祈寒應􅀱兾倍保調不宣白元帥與宋書要上皇出質天㑹四年閏十一月二十七日大金骨盧你移賫勃極烈左副元帥皇子右副元帥􅃱書于大宋皇帝闕下弊章旣報美問復臻雖承懇告之言未副質親之素􅂯叙悃悰更煩聽覧且重兵才至屡望㑹盟因謂疑惑乃􅀙髙意惟索上皇巳下爲質而巳亦不依應遂至兵怒以至攻撃而一無他辭但云􅀵兵其理安在况事􅀔及此冝􅀙初議早兾上皇與皇子出質别差近上官貟交割已畫定州府軍縣及北望開撫定以来更遣逐府州長官血属執質仍使前項逐官親戚每州各一名同交割官前去説諭俾知納土又一面速送所索官員并家属緬惟照亮曲仞懇誠專奉書陳逹不宣白宋主乞上皇不出書靖康元年閏十一月二十八日趙桓謹致書大金國相元帥皇子元帥適何㮚等還伏領書示及已䝉約軍兵未令下城􅂯造之恩何以論報且􅂪恩許免親􅁩然欲上皇皇子出郊今城已破生死之命属在貴朝又焉敢拒但父子之間心所不忍如何躬一作往軍前求哀請命如􅂪曲賜矜念更爲望行􅁢從豈勝至幸如其不然自惟非德一作薄難勝大寳若􅂪更立本宗但一作俾全性命存留宗廟保護生靈區區一身受賜已厚豈勝哀祈急迫懇切之至冬序嚴倍加珎嗇不宣白宋主欲親詣軍前書靖康元年閏十一月二十九日趙桓謹致書于大金國相元帥孫傅等歸傳来㫖欲得上皇出郊切以父子之間有難言者今欲親詣軍前祈哀致謝一作請謹先遣秦檜馳報不知當於甚日甚處㑹見如䝉賜諭即當依􅀙冬序凝寒倍兾珎嗇不宣謹白送蔡駙馬書靖康元年閏十一月三十日趙桓謹致書于大金國相元帥皇子元帥近􅂪恵書具見美意不勝感激所需姦臣親属謹令如命但以前此誤國盡竄嶺外獨京之子鞗見以除名勒停縁係駙馬都尉當時不曽逺竄今令樞宻都承㫖王徤押送軍前餘人以方在圍城中追究未得更俟續次根尋發遣不敢少有失信凝寒在候倍兾珎嗇不宣謹白宋主降表臣桓言伏以今月二十五日大兵登城出郊謝罪者長駈萬里逺勤問罪之師全芘一宗仰載􅂭寛之徳感深念咎俯極危􅂨臣誠惶誠懼頓首頓首猥以􅆌躬奉承大統懵不更事濟以學非昧於知人動成過舉重煩元帥来攻陋􅀖三里之城巳失藩維之守九廟之祀當成煨燼之餘不圗深仁曲假殘息兹盖伏遇伯大金皇帝乾坤之德甚愽日月之照無私不怒之威旣追踪於湯武好生之徳且􅓻美於唐虞弗念一夫之辜特全萬人之命宇宙載肅宗社􅀗安文􅁤旣同永託保存之惠雲天在望徒深郷往之誠無任瞻天望聖激切屏營之至謹奉表􅁛謝以聞臣桓誠惶誠懼頓首頓首謹言天㑹四年十二月日宋告諭合交割州府官吏指揮中書侍郎近者大金元帥統軍親臨責以失信京師備禦曽不踰月遽爾失守廼􅂪元帥仁恩保全更不縦兵下城止欲敦篤舊好復申前言交自河以北地界皇帝車駕出城面㑹上表􅁛臣宗社􅂯造惟候逐䖏州郡撫定了當方欲斂軍仍要逐䖏官員血属質于軍前才候交割了當便即放還其不在此間者亦必根刷去訖更要自日用兵及誤國凢干戾官員或有死亡仍取家属支散除竄在逺地差人取去外駙馬都尉蔡鞗尚不能愛惜巳行交割訖今據合割州逐一差官各賫詔書委曲告諭惟本處官吏軍民􅀍命之日冝即開門迎受一一遵禀所有本土人民便得安業􅀗免兵革之患其河南官貟軍民􅀉居客旅者各許歸還則血属俱寕公私無害在於今日愛君愛國明見事變速令約束乃爲忠義且前此州郡所以未服盖欲區區堅守以効臣節今者京城既破即與前日事體不同且以京師地大人衆城池阻穏若金湯尚不能保在爾一郡豈可拒抗儻或不従此言一旦城壁失守則不免盡遭屠戮之禍雖悔何追至如走出定湏追索仰仞皇帝須是交割必不隱諱復招巳往之悔即與干戾誤國人等無異今謹宣布誠悃之意􅂯三播告惟本處官吏軍民互相勸諭上以安國家宗社下以保父母妻子無或執迷自取殘戮故兹暁喻各宜體認又准勅若係河外有係別路所管州府軍縣不入今来交割之数者亦仰一就交割本所全徃河北交割所有河東路今差􅂙議官徽猷閣待制張宇􅀤遣前去交割亦須照驗遵依施行宋主告􅀵城上軍文字先􅂪恩許如親到軍前即収還城上軍兵今来既巳出郊更望特賜約束縁見今城内民驚疑慮出城後或生他變不免􅂯露悃愊切兾矜􅀙以副始終保全之意宋主降表係令改定臣桓言背恩致討逺煩汗馬之勞請命求哀敢廢牽羊之禮仰祈蠲貸俯切凌兢臣桓誠惶誠懼頓首頓首􅀼以契丹為隣爰搆百年之好大金闢國更圗萬世之懽航使旌絶海嶠之遥求故地割燕雲之境太祖大聖皇帝特垂大造許復舊疆未閱歳時巳渝信誓方􅀗板圖於折木􅃍連隂賊於平山結搆大臣邀囘户口雖違恩義尚貸罪愆但追索其人民猶夸大其土地致煩帥府逺抵都畿上皇引咎以播􅁶微臣因時而受禪懼􅀌城之失守割三府以請和屢致哀鳴亟􅂪矜許官軍􅅻退信誓又渝宻諭土人堅守不下分遣兵􅀅救援爲名復搆結於使人見包藏之異意遂勞再伐並興問罪之師又議畫河實作疑兵之計果難迯於英察卒自取於交攻尚復嬰城豈非拒命怒極􅀅士齊登三里之城禍延祖宗􅀅􅈥七廟之祀巳蠲銜璧之舉更叨授館之恩自知􅀗罪之深敢有求生之理伏惟皇帝陛下誕膺駿命紹履鴻圗不殺之神旣追蹤於湯武好生之徳終􅓻美於唐虞所望惠顧大聖肇造之恩庻以保全弊宋不絶之序雖死無幸受賜亦多道理且脩莫致􅈼天之請精誠所格徒深就日之恩謹與叔燕王俁越王偲弟鄆王楷景王杞祈王模莘王植徐王棣沂王㮙和王棫及宰相百僚舉國士民僧道􅂄夀軍人奉表出郊望闕待罪以聞臣桓誠惶誠懼頓首頓首謹言天㑹四年十二月日大宋皇帝臣趙桓上表行府告諭兩路撫慰㫖揮行府勘㑹朝廷昨以大遼失政害及生民興兵伐罪􅀵併􅀅還大宋遣使航海願復舊来漢地係五代所䧟朝廷方務善隣才克燕雲即畫全地此朝廷始有造於宋不料天方肇亂一作禍自爲戎首結搆逆賊謀害宰臣招納叛亡邀囘民户朝廷不以爲咎惟索户口猶不悛悟乃云本朝幅貟萬里民居散漫難加根究無計可得輒以鳩集兇黨剽刼􅁁民侵掠畜產使不􅀗安終然不悟朝廷雖欲惻隐莫由􅀗已乃命行府興師問罪去春兵抵汴京上皇方知深悔亟行禪位嗣主求哀願畫三鎮復脩舊好無何誓墨未乾盟言巳變宻令堅守遣兵救援隂搆使人濳圖禍亂遂奉宣㫖重伸弔伐雖許畫河亦不以實閏十一月初二日大兵㑹於汴都猶不伏罪准備攻具填堞壕道巳踰十餘日當月二十四日進撃攻日城拔三十日國主出降今月初二降服上表望闕􅁛臣以正正朔令依元議差官前去説諭交割河北河東州府軍縣尚慮所在以早不歸欵爲懼或飾僞辭有緩撫定􅂯念自河之内天啓洪塹巨限疆場昨来大兵所至其有迎軍納土詢省撫定其拒命者或有按以軍法或有示以寛貸皆臨時􅀙宜措置想必共知今河北河東兩路􅅻􅀱交割官員致彼説諭即仰逐旋燒毁樓櫓具状納土開門以待行府别差官員就去存恤應有前日重難徭役科歛諸般巧細糴買變折香礬茶塩之􅀋凢爾疾苦並爲蠲除或有利亦與興舉今除土人外元係河南客居官員兵人商旅僧道欲願去留並從自意敢有執迷稍勞官軍臨日必無容恕合行告諭須議指揮右下逐䖏可各照驗就便及轉行所轄去䖏粉壁暁示各􅃹士民􅂄老僧道軍人百姓知委不得有違付逐䖏准此天㑹四年十二月十一日宋主謝書十二月日大宋皇帝桓謹致書于大金􅀦相元帥累日授舘禮意勤厚亦旣覯止問勞稠重􅂯造之恩何以圗報經夕匽薄之餘台體􅄖􅁉謹遣使人承問興寝不宣宋主賀行府元日書天㑹五年正月一日大宋皇帝桓謹致書于大金國相元帥一􅂔逮通三陽交泰惟五兵之旣戢與萬物以皆春茂對休辰具膺純蝦更蘄保毓母慰願言不宣謹白宋言許面議書天㑹五年正月日大宋皇帝桓謹致書于大金國相元帥大金皇子元帥專承使㫖持示書辭慰懌之情無以為喻金銀巳令嚴切根括接續供納所有上徽號禮数冠冕車輅圗籍印板􅀋謹以来日躬徃面議先此布叙幸賜照亮不宣謹白廢國取降詔􅃙趙桓省所上降表汝與叔燕王俁越王偲巳下宗族及宰臣百僚舉國士民僧道􅂄夀軍人于十二月二日出郊望闕􅁛臣待罪事具悉背義則天地不容其孰與助敗盟則人神共怒非朕得私肇自先廟開圗乃父求好我以誠待彼以詐欺浮海之使甚勤請地之辭尤遜折木板圗第求入手平山僞詔曽不愧心罔天罰以自干忽載書而固犯肆予纂紹猶至􅆂容迄悛惡以無聞方謀師而致討猶聞汝承得位朕望改圗如何復循父佶之覆車靡戒彼遼之禍鍳雖去歳爲盟于城下兾今日墮我于畫中賂河外之三城旣而不與搆軍前之二使本以間爲惟假臣權不贖父罪自孽難逭我伐再張􅀅臣激怒二之心戰士増敵愾之勇息軍犯五不韙之罪䘮亦冝乎晋帥有三無報之心倍猶未也以是濟河航葦汴如毛人競覆昏天莫悔過肯背城而借一果聞舉族以出降旣爲待罪之人自有易姓之事所有措置條件並巳宣諭元帥府施行故兹詔示想宜知悉行府下前宋宰執舉一人元帥府近以宋主降表申奏今囘降聖㫖劄子先皇帝有大造于宋而宋人悖德故去年有問罪之師乃因嗣子遣使軍前哀鳴祈請遂許自新旣而不改前跡變渝迷執是致􅂯討猶敢抗師洎官兵力擊京城摧破方申待罪之禮况追㝷載書有違斯約子孫不紹社稷傾危父子敗盟其實如一今旣伏罪宜従誓約宋之舊封頗亦廣袤旣爲我有理宜混一然念所舉止在弔伐本非貪土冝别擇賢人爲蕃屏以王兹土其汴京人民願隨主􅁶居者聽右所降聖㫖在前今請到宋宰執文武百官泊公主之属出京仍勾集在京僧道􅂄壽軍人百姓遵依聖㫖共議薦舉堪爲人主者壹人不限名位高卑所貴道德􅂭懋有大勲業者舊素爲衆推服閑於治民者雖乏衆善有一於此亦合舉薦聖㫖備禮册命趙氏宗人不預此議應宋之百司並事新君其國候得姓名隨册建號所都之地臨日共議天㑹五年二月日孫傅以下告立趙氏状文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等右傅等准元帥府􅂯遣翰林承㫖呉开前来指揮選立賢人傅􅀼以本國前日􅀅相多是上皇時用事誤國之人自嗣君即位以来所任宰相亦􅁇以罪竄􅀅相率皆叛亡之餘其他臣寮􅀋皆碌碌無聞此元帥府備知豈敢蔽賢不以上聞若舉於草澤之間亦非聞望素著人心必不歸向孰肯推戴兼趙氏祖宗德澤在人至深至厚若别立他姓即城中立致變亂非所以􅁛皇帝及元帥府愛惜生靈之意若自元帥府特賜選立趙氏一人不唯恩徳有歸城中以及方外即便安帖或天命改卜曆数有歸即非本國臣民所敢預議乞自元帥府推擇賢人永爲藩屏傅等不勝痛切隕越惶懼之至謹具状申國相元帥皇子元帥伏候台㫖天㑹五年二月八日文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等状中大夫同知樞宻院事孫傅等右傅等准元帥府遣翰林承㫖呉开来問皇太子起發事縁自本國主往軍前議事止是皇太子􅁥國鎮撫今来若便起發出門城中軍民必至變亂兼以具擇立事申禀元帥府􅀱定議指揮到日起􅀤次謹具申元帥府謹状天㑹五年二月八日中大夫同知樞宻院事孫傅等状帥府􅂯下舉人據文武百寮軍民僧道􅂄老中大夫孫樞宻等状申事巳洞悉右元帥府􅀼謂朝廷所以必􅆸趙氏者豈徒然哉盖以不守盟誓不務聽命爲罪之極也非天命改卜豈有陸梁如此之甚也皇上猶以寛度釋其罪􅀒別立賢人而已真所謂伐罪弔民之大義也聖諭丁寜而輙言及趙氏雖不忘舊其違命之罪亦巳深矣以後不宜更復如此又状申前日􅀅相多是罷敗罪亡之餘其他臣寮􅀋皆碌碌無聞若舉於草澤之中孰肯推戴者夫運数旣有其衰亦必有􅁇興者若言敗亡之世必無可旣則三王之後迄至于今安有君臣之道人倫之序何不詳道理之深也再請㳟依巳降聖㫖早舉堪爲人主者一人當依巳去劄子施行如或必欲元帥府推擇縁㑹驗在軍皆係河北漢兒若舉一人即與混一無異實違巳降聖㫖欲推擇南人其見在軍南官亦樞宻院之所共知也未審果有可舉者否若果有則請具姓名見示亦與依應惟不許何㮚李若水預於此議如或京内及外俱難自舉仍請諸官各叙名銜連速具􅃹依元帥所舉推戴状申天㑹五年二月日孫傅等状乞復立廢主文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等今月六日􅕀時准元帥府公文一道備到大金皇帝聖㫖指揮事傅等聞􅒛震越義當即死然念世被本朝恩德至深至厚嗣君親政􅅻及朞年㳟儉􅁨勤無所不至若遽􅂪廢絶實非臣子所敢聞知輙復忍死須􅁷冐陳悲痛激切之辭仰干台聽伏望垂天地再造之恩兾終始保全之賜傅等誓當􅂢軀碎首圗報萬方謹具畫一下項一太上皇巳下不敢有違令㫖見巳起發赴軍前同伸懇告之誠乞垂衿憫一嗣君自即位以来脩德勤政並無􅃜失惟失信事上累譴訶蓋縁親政之初偶爲謀臣所誤􅁇以重竄兼檢㑹上皇昨違大遼信誓亦係童貫李良嗣王黼等妄起事端並行處斬了當以此顯見嗣君悔悞前失非有他心伏望台慈特賜矜察一嗣君自在東宫即有譽德著聞中外比旣即位臣民歸仰今感戴保全恩德已厚若䝉終惠未加􅆸絶尚可以歳脩臣事之儀如抛降金銀表叚之数雖目下未能敷足􅀅来下外路取索分歳貢納實爲大金永乆無窮之利若一旦􅆸棄遂同匹夫縦有報恩之心何縁自效一伏詳来㫖令別選賢人以王兹土許汴京人民隨主􅁶居具見慈仁存䘏備至􅀼惟臣民愛戴罔有二心兼據今中外異姓實未有堪充選舉者倉卒册立四方必不服從縁此兵連禍結卒無休息之期恐非所以上嗣元帥愛惜生靈之本意一今日之事生之殺之予之奪之全在元帥雖大金皇帝詔書有􅆸立之意然􅀅在軍君命有所不受則閫外之事元帥固可專行如前項所陳事理明白更望台慈特霽威怒終賜保全一汴京城内兩經根括取索公私各巳罄竭顯見􅀅来難以立國乞候班師之後退守偏方以備藩屏如􅂪大恩特許嗣君已􅆸復立所有􅁛呼位號一聽指揮右件如前謹具申國相元帥皇子元帥伏望特加矜憫早賜􅁢從伏􅀱台㫖天㑹五年二月七日文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等状孫傅等状乞立趙氏文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等右傅等伏覩皇帝詔書冝別擇賢人立爲藩屏許令士庻共議以此見皇帝恩被生靈之意聖徳甚厚然傅等􅀼見國主自䖏東宫㳟儉著聞若欲選擇賢人必無出其右者兼本朝自太祖皇帝以来累世並無失德惟太上皇聽信姦臣及國主年㓜國相元帥皇子元帥察傅等前状許其自新號稱藩屏復立社稷容其􅁶避以責後効􅂯念趙氏祖宗德澤在民未冺或未􅁢􅀙前懇亦望特賜哀憫許於國主子弟中擇一賢者立之或不欲立上皇諸子則乞於神宗皇帝之子選擇建立使長得北面永爲藩屏非惟不㓕趙氏之祚亦使一國生靈􅂪被恩德永有攸歸傅等不勝激切懇禱之至謹具状申國相元帥皇子元帥伏惟台㫖天㑹五年二月十日文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等状孫傅等乞立趙氏文武百寮軍民僧道􅂄老中大夫同知樞宻院事孫傅等今月十九日准元帥府劄子節文􅂯請㳟依巳降聖㫖早舉堪爲人主者一人如或京内及外俱難自舉仍請諸官各叙名銜速具􅃹依元帥府所舉推戴状申右傅等竊詳本國趙氏祖宗德澤深厚在人日乆累於前状瀝懇哀告今来渝盟失信旣止是上皇與前主其子及支屬並不干預尚兾恩造更賜詳擇庻得中外帖服不至生事若不容傅等死請必欲選擇異姓自中及外委無其人兼實難於自舉伏乞元帥府選擇敢不一聽台命傅等無任哀痛惶懼殞越之至謹具状申國相元帥皇子元帥伏候台㫖天㑹五年二月十日文武百寮僧道􅂄老中大夫同知樞宻院事孫傅等状孫傅状乞立趙氏右傅等除巳與百寮具状申大金元帥府外尚有不盡之意不敢自隱今更忍死泣血上干台聽伏以前主皇帝違犯盟約旣巳屈服而舎之存亡􅁇絶唯在元帥不然則有監國皇太子自前主㳟命出郊以来鎮撫軍民上下帖然或許就立以􅀙人望若不容傅伸臣子之情則望矜憫念趙氏祖宗並無失德内外親賢皆可擇立若必擇立異姓天下之人必不服􅀙四方英雄必至雲􅅰百姓􅂗炭卒未得安傅自知此言罪在不赦然念有宋自祖宗以来徳澤在人於今九世天下之人雖匹夫匹婦未忍忘之况傅世食君禄方主辱臣死之時上爲祖宗下爲生靈苟有可言不敢逃死伏望台慈更賜矜察傅無任哀懇痛切惶懼隕越之至謹具申元帥府謹状天㑹五年二月十日中大夫同知樞宻院事孫傅等状呉承㫖囘賫到文武百寮軍民僧道􅂄老孫樞宻等状二道備巳洞悉右勘㑹朝廷所以㓕宋者盖趙氏之罪深也况詔㫖叮嚀務在恤民今来堅執迷惑累百祈請復立趙氏甚不應理若謂廢舊立新果難服從縁趙氏太祖孰與推戴自立尚可何况遵依聖詔擇賢共立孰謂不可兼早有文字惟貴道徳不限名位高卑本欲利民今諸官軍民僧道􅂄老乞行府選擇行府于在京官寮未堪可否但想在京目下爲首􅃹勾者必是可舉所以行府欲立本官請在京文武百官軍民僧道􅂄老照騐此意若所指在京目下爲首􅃹勾官員可以共立早具本官名銜状申如亦未可即依巳去文字湏得共薦一人限不過今月十一日状申如亦未可趙氏支属不過今日發遣出城如或此度不見薦舉及不彂遣必當别有悔吝無得有違天㑹五年二月十一日軍民􅂄老等状乞立趙氏汴京軍僧民道􅂄老郭鐸等右鐸等伏聞二元帥公文備坐大金皇帝聖㫖指揮欲令選賢人以王兹土鐸等聞命震驚罔知所指竊惟元帥擁弔民伐罪之師行應天順人之道旣破京城斂兵不下全活在城生靈雖湯武仁義之兵未易過今上自䖏春宫至即帝位㳟儉脩徳中外恱懷止縁踐位之初未熟政事輔弼非人有失大信致􅀗罪於大金皇帝也然今上雖失大信其於天下萬姓略無􅂈失士民歸嚮乆矣若遽見廢絶别立異姓不惟異姓中不見有徳之人誠恐庻民皇皇無所統一姦雄僣􅀼殺戮無辜如此則非所以上副大金皇帝及元帥愛惜生靈之意也伏望元帥垂天地再造之恩全始終生成之賜復立今上以王兹土脩享貢以報洪恩今上感戴之誠何時而忘也如元帥府必欲以失信廢之即今太子長立自當承嗣如更不欲立之乞於親王中選擇賢者以承嗣位庻使太祖太宗二百年基業不絶人心嚮慕實天下蒼生之幸也今若别立異姓設或倉卒之間選擇非人蹈前車巳覆之轍不免再軫大金皇帝聖慮而民傷墜於􅂗炭也鐸等情動于中義不得辭仰冐威嚴無任叩頭泣血俯伏望命之至謹賫状詣善利門投獻伏望元帥府俯垂鍳察謹状靖康二年二月日汴京軍民僧道􅂄老郭鐸等状復下汴舉人今月初十日右副元帥親赴左副元帥麾下共議京人告請復立趙氏事至晚到本營方有善利門下軍員送到汴京軍民僧道􅂄老郭鐸等告乞復立趙氏事文状并孫樞宻等今月初七日八日九日三次状五道録白縁爲此事巳經共議差官入京湏得別薦外善利門下人貟以輙受文状嚴加懲戒訖切慮京人猶以投状爲辭敢别推注滯住今請在京諸官孫樞宻等照㑹速依呉承㫖學士等賫去文字日限施行不得住滯天㑹五年二月日張叔夜状乞立趙氏簽書樞宻院事張叔夜契勘累具申乞存趙氏之後今奉令㫖如無可推戴令具申元帥府􅃹依元帥府推戴状今来欲乞檢㑹累申從元帥府於嗣子或軍前近属内擇立一人所貴恩歸元帥府永爲藩服而趙氏宗廟尚得血食右謹具申元帥府伏候台㫖天㑹五年二月日簽書樞宻院事張叔夜状乞命張􅀖昌治國状文武百寮僧道􅂄老軍民同知樞宻院事孫傅等准元帥府牒湏淂共薦一人限今月十一日状申者契勘自古受命之主必上膺圖籙下有勲徳在民或權强近臣或英豪特起有大材畧因而覇有天下方爲人所樂推今来本國臣寮如孫傅等召自外方被用日淺率皆駑下迷誤趙氏以至亡國人皆懷怨方且俯伏謹俟誅夷若或付之土地俾爲藩屏必爲百姓忿疾旋致變亂上􅀒選擇之意然今奉元帥之念備到詔㫖嚴切舉國惶恐非敢違拒實以在内官寮委無其人伏望二元帥台慈體念乞於軍前選命張􅀖昌以治國事如軍前别有道徳隆懋爲天命之所歸者賜選本國臣民敢不推戴者右謹具申元帥府伏􅀱台㫖天㑹五年二月十一日文武百寮軍民僧道􅂄老同知樞宻院事孫傅等状朝散郎試御史中丞致仕秦檜准元帥府􅈲揮如別有異見具状申者右檜􅀼以自古建國立王非為率衆庻以奉一夫盖欲代天致理使生靈有所依歸不墜􅂗炭也契勘張􅀖昌在上皇時執政日乆伐燕敗盟之計皆所預知今若册立恐元帥府大兵觧􅃊之後姦雄􅀼彂禍及無辜􅀅不􅁛元帥弔民伐罪之意若䝉元帥推天地之心以生靈爲念於趙氏中推擇其不預前日背盟之議者俾爲藩臣則姦雄無因而起元帥好生之徳通於天地檜雖草芥亦欲生成之数無任待罪隕越激切懇求之至謹具状聞伏候台㫖天㑹五年二月十四日朝㪚郎試御史中丞致仕秦檜状元帥府要秦檜懲斷據前宋文武百寮軍民僧道􅂄老状乞選命張􅀖昌以治國事行府己申奏朝廷乞立為皇帝仍賜册文不日降到册文見得事體輕重更索鐫造合先取紅羅一十叚紅絹一十疋玉簡一匣金箔貫索應用事数全并用册寶匣床舁應干合用物件並全請在京官寮疾早准備應副外入京月日續有文字次所有迎接儀仗亦請依例准備等接仍此至行禮以来應有所行事務依舊􅃹勾又勘㑹先去劄子如別有異見别具状申只不許引惹趙氏今據前中丞秦檜状尚言乞立趙氏特係違令合要本官懲㫁速請彂前来天㑹五年二月十四日議􅁶都状在京官寮吏部尚書王時雍等右時雍等今月二十日呉幵莫儔自軍前傳奉元帥令㫖集議􅁶都可往是何去處伏覩前来詔書汴京人民許隨主遷都事大未曽迎接新主非臣民所敢輕易今舉國生靈巳荷大恩自合一聽令㫖豈敢自擇今㳟承􅃊命衆議所􅁶去處如􅀭州江寜府乞賜詳酌與新主依前来台㫖臨日共議施行謹具申元帥府伏候台令天㑹五年二月日在京官寮吏部尚書王時雍等状册大楚皇帝文維天㑹五年歳次丁未二月辛酉朔二十一日辛巳皇帝若曰先皇帝啟造區夏務安元元肆朕纂承不敢荒怠夙夜兢兢思與萬國同格于治粤惟有宋實廼通隣貢歳幣以交歡馳星軺而搆好期于萬世永得無窮盖我有大造于宋也不圗變誓渝盟以怨報德􅁛端搆亂反義爲􅄷譎詐成俗貪婪不巳加以肆行􅁋虐不恤黎元號令施張紀綱弛紊况所退者非其罪所進者非其功賄賂公行豺狼塞路天厭其德民不􅂓生尚又姑務責人㒺知省巳父旣無道于前子復無㫁于後以故徴師命􅀅伐罪弔民幸頼天髙聽卑神幽燭細旌旄一舉都邑立摧且眷命攸賜謂之大寶苟曆数改卜未或偷安故因黜􅆸以昭玄鍳今者國旣乏主民冝混同然念厥􅀄誠非貪土遂命帥府與衆推賢僉曰太宰張􅀖昌天毓踈通神咨睿哲䖏位著忠良之譽居家聞孝友之名實天命之有歸乃人情之所徯擇其賢者非子而誰是用遣使特進尚書左僕射同知樞宻院事監修國史上柱國南陽郡開國公食邑二千户食實封二百户韓資政副使榮禄大夫行尚書禮部侍郎提􅀧大理寺䕶軍譙縣開國侯食邑一千户食實封一百户曹􅀃持節備禮以璽紱册命爾爲皇帝以理斯民國號大楚都邑金陵自黄河已外除西夏新界疆場仍舊世輔王室永作藩臣貢禮時修爾勿疲於述職問音歳致我無緩於誠心於􅃧天生烝民不能自立故立君以臨之君不能獨理故􅀣官以教之乃民非后不治后非賢不守其于有位可不慎與予懋乃徳嘉乃丕績日慎一日雖休勿休爾往欽哉其聽朕命天㑹五年三月七日押册金紫光禄大夫左散􅀐常侍知御史中丞上護軍彭城縣開國公食邑一千户食實封一百户劉恩讀册樞宻院吏房承㫖中散大夫守衛卿上輕車都尉清河縣開國伯食邑七伯户賜紫金魚袋張愿㳟押寳中大夫行中書舎人上輕車都尉太原縣開國伯食邑七百户賜紫金魚袋王企中讀寳樞宻院户房主事銀青榮禄大夫檢校工部尚書行太常少卿兼侍御史輕車都尉隴西縣開國子食邑五百戸李忠翊孛堇忽刺虎充傳宣東西上閣門使韓企先充禮直官又有各人從並樞宻院差賜勑玉册册匣册牀行馬一對金印大楚皇帝之寶寳匣寶牀行馬一對紅羅窄襖子平面玉御帶純金龍口束子錦箱全銀褐中單烏紗僕頭衣匣衣牀行馬全楚主與行府書欲親謝天㑹五年三月日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥今月七日伏奉皇帝聖㫖特降樞臣俯加封册退循庸陋之資何以對揚休命前此固常死避終不􅀗辭載惟選授之初盡出薦揚之力尋因還使附致感悰願亟拜於光儀庻少伸於謝禮未聞台令殊震危􅂨遂致􅀙官是敷勤懇重􅂪諄諭仰識眷存然而淹目未前撫躬無措恐浸成於稽緩實深積於兢惶伏望恩慈早容趋赴􅀱承報示徑伏軍門拳拳之誠併留面叙不宣謹白賀南楚書天㑹五年三月十三日骨盧你移賫勃極烈左副元帥皇子右副元帥謹致書于大楚皇帝閤下向承明詔擇立賢人爰及士庻之謀巳諒聰英之聽且聞天闕優降册書禮命㳟行群情胥恱未遑伸於􅂟祝不圖辱於華緘幸容先導微悰繼陪髙論今差榮禄大夫兵部尚書護國軍廣陵縣開國公髙􅂟裔彰聖軍節度使金紫榮禄大夫檢校太保兼侍御史上􅀐都尉隴西縣開國侯李士􅁶充􅂟賀使副有少禮物具諸别幅專奉書陳賀不宣謹白楚主謝遣使書天㑹五年三月日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥􅀖昌猥以菲材誤膺聖擇但俯臨于甸方庻瞻仰於尭雲對􅀭璽紱之華激切肺肝之感懋惟選建實自薦􅀭願趨謝以陳誠辱賜書而賛善情文惠厚副以儀物之多恩義並隆煩乎衮冕之貴静言荷戴詎可名言重念授册以還甫迨彌旬之乆粤従念尚阻造前祈深察於羇悰庻早親於名範其如懇叩􅂚究敷陳敏兾英聪俯垂昭鍳今因榮禄大夫兵部尚書護軍廣陵縣開國公髙慶矞等專奉書陳謝不宣謹白囘南楚書天㑹五年三月十四日大金骨盧你移賫勃極烈左副元帥皇子右副元帥謹致書於大楚皇帝閤下比遣使下􅂓申􅂟禮辱緘封之􅁇至亦悃幅之彌深其於感藏未易敷述所云之事佇期翌日仰奉光儀專奉書陳逹不宣謹白楚復致書天㑹五年三月十五日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥比縁慶問㝷具謝緘備載請命之誠實懼凟尊之咎重䝉矜容特賜􅁢俞即祗伏於軍門方佇瞻於台表其如吹澤􅂚罄欽誠謹奉書復聞不宣謹白行府與楚書天㑹五年三月二十三日大金骨盧你移賫勃極烈左副元帥皇子右副元帥謹致書于大楚皇帝闕下近辱華音備詳雅意以左丞馮獬􅃹軍郎仲洵皆素著于忠儉欲俾還于職務􅀼以上件官􅀅要之定議係于北􅁶既来命之克勤何弊府之敢吝簽書樞宻院事曹輔禮部侍郎譚世勣中書舎人孫覿給事中沈晦閤門宣賛舎人李仔朝散郎汪藻閤門祗候趙瑰給事中黄夏卿宣賛舎人趙詵右文殿修撰宋彦通觀察使邢端彦􅀅作少􅁥蘇餘慶少府少􅁥徐天民少府􅁥丞許汪崔亨復包師道羅公彦宋忠劉思齊郝敏任良臣武㳟孝李􅄾并人從家眷等或􅀙行廢帝或因事軍門今並遣還庻俾分任外自来所取金帛皆係犒賞軍兵之所急用雖不能足數亦且期大半今楚􅀦肇造本固則安慮因徴括之急重困斯民亦議權止又有夏國并別事冝今差保静軍節度使蕭慶觀察使李口諭所云前去計議仰惟髙亮幸察悃愊專奉陳逹不宣白行府告諭亡宋諸路立楚文字元帥府勘㑹往者遼國運衰是生昏德先彂釁端自爲戎首朝廷爰舉義師奉天伐罪不期宋人浮海計議􅀱併遼國願割燕雲歳納金縑自依舊例先皇啼以有容爲德嘉其来意置以不疑即時􅁢許爾後全燕才下割之如約其爲恩徳不爲不多于是要以天地質諸神明遂立誓文盗賊迯人無令停止亦不得宻切間諜誘􅅰􅁁民傳于子孫守而勿失旣而宸輿北返宰執東行不意宋人貪婪無厭稔其姦􅁖忽忘前施之義潜包幸亂之謀遽凟誓約結搆兇頑使圗不􅁤據京爲叛賊殺大臣邀囘户口啖以官秩宻令納土仍示手書竊行撫諭遂使京畿之地鞠爲㓂場洎天兵臨境魁首奔亡而又接引輙相保蔽更易姓名授之官爵及至催索傳以僞首旣殺無辜又貸有罪不仁不恥於此可知朝廷方務含容不形其惡但誡邊臣户口之外一無理辨此所以必欲乆通和好之故也尚飾僞辭終爲諱招納叛亡及􅅰民户使􅁁賊出没作過所有歳貢又多愆期背義亡恩莫此之甚朝廷亦不咎之依前催索亦不聽從反云本朝幅員萬里民居散漫雖欲根究難指有無况事已往請別計議據彼迷辭意渉誇謾至于本境行彂文字輙敢指斥朝廷言多侮謗雖累次移文俟其改過終不悔悞罔有悛心矧又夏臺實我藩輔忱誠旣獻土民是賜而宋人忽聚無名之師輙行侵􅅰之事因其告援遂降朝廷移文解和俾復疆土仍以強辭不爲依應反云夏人納欵曲有陳請大金方務恩撫初附之國且料不無曲意姑行順從夏人以爲周至自今不煩干預自當以道理所在且朝廷方隆恩造下浹群􅀖宋夏兩國各􅂪其賜所與之地裁之所主肯致私曲以爲周至豈其詭詐侮慢昩于道理不爲禀従如此之甚斯則非止侵凌夏國實関不懼朝廷加以肆行苛虐不恤黎元號令滋彰紀綱弛紊􅁋詞遍野虚器盈庭所退者非其罪所進者非其功賄賂公行豺狼塞路多端巧細聚歛無度役使百倍比屋一空天厭其德民不􅂓生尚又姑務責人罔知省巳遂奉聖詔伐罪弔民亦許夏國相應進討趙主才聞近舉逺奔淮甸嗣子􅁇立聲言内禪引以父咎哀泣求和願以三鎮復㝷舊好特爲矜愍遂其所請􅂯修盟誓一同父約無何誓墨未乾盟言巳變官軍才退援衆􅁇集宻勑􅁁臣兾令堅守父雖無道情有可矜悔過而去其位才復背盟理無可恕覆車而不改轍以故􅂯奉􅃊命重伸弔伐去冬諸路兵馬才到城下累遣使人尚兾悛改皆蔽而不通至閏月二十五日城破二十九日少主出降上表待罪㝷具申奏奉聖㫖先帝有大造于宋而宋人悖德故去年有問罪之舉乃因嗣子遣使軍前哀鳴祈請遂許自新旣而不改前跡變渝愈速是致􅂯討猶敢抗師洎官兵力撃京城摧破方申待罪之禮况追㝷載書有違斯約子孫不紹社稷傾覆父子敗盟其實如一今既服罪冝從誓約宋之舊封頗亦廣袤既爲我有理冝混一然念所舉止在弔伐本非貪土冝别擇賢人立爲藩屏以王兹土趙氏宗人不預此議應宋之百司並事新君者其宋之道君少帝妃后已下並巳北遷及委前宋文武百官軍民僧道書老中大夫同知樞宻院事孫傅等状􅀼本國前日􅀅相多是上皇時用事誤國之人自嗣君即位巳来所任宰相亦􅁇以罪罷􅀅帥率皆敗亡之餘其他臣僚􅀋皆碌碌無聞此元帥府之所備知豈敢蔽賢若舉于草澤之間亦非聞望素著人心必不歸向孰肯推戴兼祖宗徳澤在人至深至厚若別立他姓恐生變亂非所以􅁛皇帝爱惜生靈之意若自元帥特選立趙氏一人不惟恩徳有歸城中及方外即便安帖或天命改卜曆数有歸即非本國臣民所敢預議乞自元帥府推擇賢人永爲藩屏傅等不勝痛切隕越之至㝷以趙氏父子不守信誓爲罪之深所以必􅆸趙氏之意往復􅂯三乃云在京必無其人乞于軍前選立太宰張相公治􅀦事者行府㑹驗本官乃去年同康王出質者即許㝷舊好之後少主􅀼􅀤精兵夜犯禁營寨官兵接戰即時破㓕以其敗盟遂圍京城􅀅臨進攻本官哀泣沉首曰某身爲宰執出質軍前不意犯于不虞罪當萬死然少主蒞事日淺盖縁姦臣所誤且乞緩其攻撃因遣使詰之少主趍迎使人泣而謝罪及至和成洎從軍北行以北州縣或有不降每欲進擊必自哀求往往有可愍意及重兵􅂯舉又乞遣使理㑹雖威之􅄡刄不之避也欲引南進而曰豈有大臣躬親出質不能戢兵以致交惡而同敵人忍觀其伐主也我頭可㫁我身不可去城破之日驛召而至語及􅆸國之際號泣躃踴涕泗交流告乞􅂯造旣見不容或以腦觸柱或以首投地㡬至自絶乃知忠孝剛毅出于其倫忽聞共戴果謂此人則得其人也然恐難奪其志洎在京百官差到翰林學士承㫖呉开翰林學士莫儔賫状勸請切聞建􅀖設都必立君長制國御俗湏頼仁賢㳟以大金皇帝道奉三無化包九有不以混一中外爲巳私忿專用全活生靈爲國大恩明下詔音曲詢群議矜従諸夏俾建列藩共推宗公以治國事勘㑹雖不許存立趙氏旣奉詔諭擇立賢人以王兹土則于國于民爲幸亦巳深矣不可告立趙氏伏惟太宰相公名髙今古學通天人位冠􅃁司身兼衆羙碩德偉望早羽儀於百工嘉謀赤心每勤勞於王事敢望以蒼生爲􅁨而不以小行自飾以机政爲慮而不以固避自謙上體大金擇立存撫之恩下副國人推戴爲主之念及別有状申行府文武僧道􅂄老軍民共請太宰張相公以治國事别有勸請文字􅀼惟别有辭譲伏望元帥府更賜敦諭本官早從輿望㝷請知樞宻院事漢軍都統劉侍中等同詣具道其由勃然奮怒曰國雖􅀅破在臣子之分豈容聞此事由以先自防傋不􅀗自絶然而閉目掩耳背立偃蹇終不爲聽但罵文武官寮曰以諸公畏於兵威置我賊亂之罪寕甘死於此不可活於彼以取後世􅆲奪之名也然行府以軍國務重不可乆曠㝷録申奏今降到寳册備禮以璽紱册命爲皇帝以授斯民國號大楚都于金陵自黄河以外除西夏新界疆埸仍舊世輔王室永依藩臣其間志氣屹然不動雖多方勉諭以事在巳然雖死無濟何如就册用拯生靈猶不下飲食累日㡬至㓕性遂擁迫入城乃有在京官寮僧道􅂄老軍民共集勸請直至今月七日方受册命合行告諭須議㫖揮京畿路京西路南路北路京東路東路西路陜西路鄜延路環慶路秦鳯路熈河路京兆府河北東路淮南東路西路右下逐處各可照驗應宋之舊臣或作藩鎮並事新君軍國之務事無大小一切聽其䖏分敢有違誤或妄􅁛舊恩輙有動衆以􅅰軍民不􅀗安業者即是叛命之人夫趙氏累世之君也猶以失道假手于我今大楚皇帝推戴儻有拒命雖有愛惜生靈勸懲之義當在必行則玉石俱焚豈能無之冝在所暁悉此意一切並聽節制以副聖㫖撫綏安寕之意仍仰就便指揮暁告所轄合于去䖏知委具依准施行状申天㑹五年三月二十六日與楚計㑹陕西地書天㑹五年三月二十七日大金骨盧你移賫勃極烈左副元帥皇子元帥謹致書于大楚皇帝闕下勘㑹承准朝廷降到大楚皇帝册文自黄河以外除西夏新界疆埸仍舊并當府所奉宣命楚夏封界就便従長分畫施行者今議定東自麟府路陽溝東㡳黄河西岸西歷暖泉鄜延路米脂谷米脂寨大谷米谷開元堡臨夏寨聖塔谷威戎城萬安川殄羗寨盧闍川杏子堡鵓鴿谷萬全寨木塲谷累勝寨環慶路威邊寨麥川堡定邊軍賀家原阿原堡木􅋎堡九星原通歸堡定戎堡卧山寨䑓興平城巢寨谷序鷄嶺秦市川委布谷口涇原路威川寨賀羅川賀羅口板井口通関堡蕭関古蕭関秋川堡緩戎堡鍬钁川口中路堡鍬钁川堡西安州山前堡水泉定戎寨亂山子北谷川秦鳯路通懐堡打乗川征乗川征原堡古㑹州自北直至㡳黄河依見今流行分熈河路盡西􅁁以限楚夏之封所有地界如或指定地名城堡䖏所内有出入懸邈者相度地􅀔各容接連兩相􅀙便分畫布此悃悰兾爲孚察專奉書陳逹不宣謹白楚囘書天㑹五年三月日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥比遣使指申諭夏疆巳附􅃱於悃誠復勤書於誨㳟聞宣命俾分畫之􅀙長兹奉令慈指地名而開示東自麟府路陽溝東底黄河西岸西歷暖泉鄜延路米脂谷米脂寨大谷米谷開光堡臨夏寨聖塔谷威戎城萬安川殄羗寨盧関川杏子堡鵓鴿谷萬泉寨木塲口累勝寨環􅂟路威􅁁寨麥川堡定􅁁軍賀家原阿原堡木􅋎堡九星原通歸堡定戎堡臥山䑓興平城巢寨谷序鷄嶺秦市川委布川涇原路威川寨賀羅川賀羅口板井口通関堡蕭関古蕭関秋川堡緩戎堡鍬钁川口中路堡鍬钁川堡西安州山前堡水泉定戎寨亂山子北谷川秦鳯路通懐堡打乗川征乗川征原堡古㑹州自北直至抵黄河見今流行分熈河路盡西􅁁以限楚夏之封其間懸邈各許相度便冝以至接連兩相従便巳具遵於定議當即接於伻圗其或未安尚容􅂯禀仰祈英鍳洞照微􅂨謹奉書復不宣謹白與楚减免銀絹錢書天㑹五年三月二十九日骨盧你移賫勃極烈左副元帥皇子右副元帥謹致書于大楚皇帝闕下㑹驗宋時除依遼國舊例歳輸銀絹五十萬兩疋外别錢納一百萬貫物以代燕地所出今若依例輸納且念地旣分割民有凋弊特免錢一百萬貫减放銀絹二十萬疋每年共議納三十萬疋銀絹各半其数亦依舊例交割布此悃悰兾爲亮察專奉陳逹不宣謹白楚謝减銀絹錢書天㑹五年四月日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥重勤書誨祗荷矜慈惟前朝之所輸准定数而有舊俯念地土割裂之後方當人民凋弊之餘曲賜寛矜悉從蠲免特免錢一百萬貫外减放銀絹二十萬兩疋每年共議納三十萬疋兩銀絹各半其数一依舊例交納所􅂪指諭悉已遵承其於感戴之心難盡敷陳之素仰惟聪哲深亮悃誠謹奉書陳復不宣謹白楚囘書天㑹五年四月日大楚皇帝􅀖昌謹致書于國相元帥皇子元帥祗領華緘且欽􅂭指城破不取已歸全度之仁軍賞姑停載荷哀矜之賜以至蠲免歳納之数悉繫始終恩顧之私惟頂踵之所䝉雖膚髪而可割所有三十萬兩疋􅅻􅀱措置就緒請依令㫖排辨伏祈英亮垂鍳卑悰謹奉書陳復不宣謹白元帥右􅁥軍與楚書天㑹五年七月日元帥府右監軍謹致書于大楚皇帝闕下昨者宋人不幸趙氏敗盟由此出師至於國都乃􅆸宋而造楚本以示懲勸于後来者也班師之日定約具存貴心腹以相知凡事爲而必逹距今累月聞無一音􅃡想其間不知何似所約陕西之地巳属夏國之疆頃被彼人請分兹土伏兾早爲割􅀗用副悃誠暌違去此旣遥動静於兹未悉囬復之際次第相聞啇􅂔方清願膺繁戬今差朝散大夫少府少􅁥飛􅀐尉縣開國男食邑三百户賜紫金魚袋牛慶昌六宅使銀青榮禄大夫檢校太子賓客兼殿中侍御史雲􅀐尉樂詵專奉書陳逹不宣謹白康王與帥府通問今月十九日准黄河南岸遣過兵士丁俊馬立等二人賫到􅁛大宋皇帝奉使國相元帥通問所諜封當府照到来牒上題寫大宋二字㝷與都統所同共商量爲國號不同不敢収留巳囬牒􅁍於元差来人處賫囬及巳具申禀元帥府施行􅀱奉到指揮别行牒去訖今録白通問所元来公文粘連在前湏至申覆者右謹如前伏乞元帥府照驗施行天㑹五年七月二十六日康王書建炎元年六月日大宋皇帝致書大金國相元帥帳前盖聞天屬所繫遇患相􅀵隣國之交行道爲福輙披哀懇用徹聰聞顧大義之當然冝髙懐之洞照痛念本國逺通貴朝原其浮海之初各有誓山之志事有可恨謀因不􅆇一變懽盟重罹禍故興言及此雖悔何追昨爲􅀅命之行深兾接辭之幸取道偶異有懐弗宣逮提入衛之師承命􅂯和之詔初謂登陴而不下荷徳何言終聞舉族以階行措躬無地便欲自投於死所莫能終拂於輿情􅁇體非心抆泪盈握巳思投告無所乃惟愽逹必照㡬㣲理有天常不多尚人者盖識消息盈虚之数天無私覆非大亡道者皆有扶持安全之心諒國相元帥持擴大度深矜至􅂨資二帝之南􅁶擇六宫而偕従無留宗族併返官聮上承天地好生之心俯慰黎元願息之意儻施恩之出此宜圗報之何如四海流聞必服柔而慕徳上穹降鍳亦眷祐以垂休兹惟治國之逺圗不特冲人之私幸炎蒸在􅀱調䕶惟宜有二帝諸后問安表牋併望指揮即令通逹許人進見以慰夐瞻慕之心有少禮物具如别幅謹白囘康王書天㑹五年十月四日元帥右􅁥軍右都監同致書于前宋康王閣下日以亡宋累違誓約故前年有城下之盟洎成之後不務遵奉反圗不􅁤雖使悔之終無悛改故今年有㓕國之舉汴人旣與執迷理共夷戮而登城不下擇之賢人蓋以罪有所歸肯多上人而違全安之心乎至於告諭諸路不許復思趙氏亦使後世爲人上者恡于盟信不敢放縱以爲深戒豈是巳甚􅁘今閤下身旣脫網亦合守分輙竊入汴邑僣稱亡號遣使詣府一無遜辭反求父兄宗親官聨而隂遣軍兵頻来戰閗詳味其意全無追悔父兄之誤特有以力抗拒之心况朝廷所立大楚皇帝不言所在之䖏帥府議定割與夏國陕西諸路之地有無巳未依􅀙難議􅁢聽今因人使囘專奉書陳逹不宣白伐康王暁告諸路文字元帥府勘㑹昨爲宋人不守恩義反圗不􅁤故天㑹三年初有問罪之辭趙佶以前非罪巳棄位奔迯嗣子桓幸釁􅁛君哀鳴請命割其府復講舊歡旣而誓墨未乾叛音荐至王師才退賊衆仍集故天㑹四年復興亡宋之師汴城旣克趙氏遂􅁶原其士民附于昏德各冝誅戮以狥強迷然朝廷以爲罪旣有歸愚民何咎乃立太宰張􅀖昌爲大楚皇帝以主斯民此亦朝廷有大造于宋也不期蒼穹降禍汴邑更端推戴趙構妄􅁛興復阻絶津路敢肆窮兵遂使武士死於􅄡刄填于溝壑居民苦于流離無有􅂓生猶有數犯疆塲搔􅅰􅁁民且趙構雖係亡宋之餘是亦匹夫非衆人共迷無由自立此無知之構飾巧端惑亂人心亦惑於巧説以致如此是知罪亦係于輿人故仰承嚴令重申大伐統領重兵諸路齊進趙佶嘗誇本朝幅貟萬里居民散漫葢以朝廷裂全燕益其國縦常勝増其力此其所以恃頼巳甚貪求無厭反圖不􅁤之由也全燕常勝皆復歸化外并晉之地古謂雄藩趙魏之民昔􅁛冨庻全此之際尚不能禦悉爲我有况又関西隴右亦云驍鋭别有圗謀之計趙氏之所恃者汴洛殘民而已其餘不可言也以我雄師何往不􅀗期在必克指日定亂此非威脅人所共知若趙構暁悉此意親詣轅門悔罪聽命則使與父兄圎聚復立大楚而已如張氏已遭鴆毒則別擇賢人使斯民有主而已秋毫肯犯若或仍敢恣強終無悛悟即許所在士民僧道齊心擒送以靖國難若亦不慎去就稍拒官軍者不即擒送及不住􅅰亂新􅁁即是以迷固迷與亂同道自取􅂗炭罪冝不宥累年征討定無蘇息今暁告示須議㫖揮右下應係亡宋諸路州府軍縣官僚僧道􅂄老軍人百姓可各照㑹審擇長計無招後悔付逐處准此天㑹五年十二月二十三日差劉豫節制諸路總管安撫暁告諸䖏文字趙氏自結義本朝屡爲誓約重犯罪愆故於天㑹三年興兵問罪父佶旣走子嗣哀鳴求好復立嚴誓要諸天地質諸神明其于委細一如父約豈謂官軍才退子戾佶前故於天㑹四年復舉師旅廢㓕趙氏汴人旣附昏徳復抗官軍亦冝按以軍令原其罪本已有所歸並􅂪寛宥重念斯民本朝旣不貪土又不可乆以無主仍委亡宋臣僚選舉道德隆懋堪爲人主者咸薦張氏綽有人望克兹重任立爲大楚皇帝􅁇主其民朝廷推亡固存之義不謂不深不期趙氏遺孽竄在彼逺潜謀不􅁤輒行廢立故自天㑹五年又舉大兵擒捕興復所有趙氏本末罪状已具暁諭今縁逆賊迯在江浙比􅀱上秋􅂯舉暫就凉陘勘㑹南民乆習澆訛雖丁寕説諭尚方違背况亡宋諸路前後攻降撫定除陕西行府別有措置外京東京西淮南等路并河北州府不少比至擒􅀗趙構别立新主以来若不依行府已奉便冝行事宣㫖選擇幹事官貟主領亦慮相次又被僞賊暗􅀼連合妄起事端枉遭禍敗須議指揮右下知濟南府劉豫可知東平軍府事京東東西淮南等路安撫使兼諸路馬歩軍都總管大名開德府濮愽濱棣滄徳州亦在節制凢諸事體且循宋舊例其徭役賦歛㑹驗宋時特係煩酷速宜就長規計務使民便至於獄訟亦要寛簡刑罰臨事制冝勿拘常法其有未經納欵州府軍縣仰差人具􅀃禍福利害招􅂝歸業免於前来􅂯舉枉遭驚懼其間若有勞効一心歸順公務幹辦者無問士庻並依宋時例格摏擬合補資級就便出給公㩀􅀱立新君别給正行付身所有安撫使職分合得請俸并本司合用司吏公使人力若依京東西路安撫司已設置人数分例或有今来事體比舊重大約量􅄈置更於民間疾苦特行减損亦自従冝畫定行府更慮諸路府猶有執迷不従或輙叛亂巳留重兵分屯衝要䖏所仍摘留元帥左􅁥軍分司在此從冝措置施行若有如三事理本司力難克制仰計㑹申覆左􅁥軍取􅀱指揮若諸州縣職員内見有闕或不任職事至於計運勸農等事須至設官即許便行差填替換旋報監軍照驗不得有違慢易并下􅀭真楚泗泰沂海徐濱棣滄徳慱淄青恩清等州襲慶東平開德大名等府雎陽髙郵天長等軍可照驗並聽安撫使司節制不得有違付逐處准此天㑹六年二月日天㑹四年冬元帥伐宋師次髙平縣先遣烏陵思謀天使入汴致書至五年二月六日􅆸宋少主桓爲庻人實録宋中書舎人孫覿撰天㑹四年十一月十六日大金骨盧你移賫勃極烈左副元帥自太原進兵次澤州十七日次髙平先遣使烏陵思謀致書宋少主以興師問罪之意欲割河爲界俾分遣大臣詔諭河東北兩路兵民交割仍先具凡所聽命不違國書還執烏陵思謀即日馳馬上道十九日渡河河上守卒無一人在者聞天軍至悉散去矣所過居民藉藉有語往往瞋目相視間関数百里二十日次汴都忽遇南軍数百􅀐圍之数重城門閉不得入日巳夕詔開順天門館於都亭驛越一日入見崇政殿跪致書具申諭書意并欲干戾人蔡京童貫王黼李剛呉敏陳通詹度馬擴張孝純家属等九人執赴軍前宋主即日報書引咎自責祈請備至遣門下侍􅀰耿南仲同知樞宻院事聶昌持詔分畫兩河四十四州軍詔意大抵謂爲人父母豈忍爲此盖不復巳苟全汝生皆吾民也勿懐顧望抵晚陛辭復令􅀐吏数百護送出関宿瓊林􅁐軍士相聚詬罵通夕不敢寐遲明遂行約二十五日次河陽遇元帥遂引兵而南河流淺涸不用舡筏䇿􅀐而渡閏十一月二日駐都之青城三日復遣烏陵思謀同借保静軍節度使蕭􅂟借司農少卿楊貞幹致書欲畫河内州郡并前次使人所索官吏漏落之数如蔡攸徐處仁王安中李彌大劉韐折彦實折可求吕仲王禀及趙良嗣蔡靖髙世由范直方􅅬茂實李嗣本家属并約少主出城㑹盟以示大信烏陵思謀等持書扣城城上皆持滿相向遂駐射又䇿馬前使二日復投矢石見拒薄暮傳詔􅁇止都亭驛七日入見崇政殿八日得㫖詣都堂與三省長官何㮚等集議􅀗報書第言始割三鎮即遣馮獬李若水如約復議畫河又遣耿南仲聶昌分詣而㑹盟不從九日陞辭出安上門復命十四日又遣烏陵思謀等致書云使還少主以㑹盟爲疑可遣右僕射何㮚赴軍前計議而以上皇皇弟越王太子爲質翌日烏陵思謀病卧館中不能朝詔中使挟太醫馳視十七日得旨乗肩輿入對不拜詔内侍給扶奏事畢免辭謝以皇伯保順軍節度使開府儀同三司安康郡王士􅀃同馮獬計議留何㮚不遣詔烏陵思謀乗臥輿還報旣還止帳中元帥遣数毉臨視黎日輿疾詣帥復命以歸二十四日疾有瘳二十五日大軍自南壁登城元帥傳令不得輙下城縦掠二十七日宋少主遣宰相何㮚中書侍􅀰陳􅂈庭皇弟濟王栩請命二十九日又遣皇叔燕王侃越王偲皇弟鄆王楷景王􅂎濟王栩祁王模莘王植徐王棣沂王㮙和王栻信王榛凢一十一人請命於元帥而不淂見苐遣皇弟四人還諭少主令速出郊三十日昧爽少主素隊出南薰門大臣侍􅀙親王等從者四百人烏陵思謀傳元帥㫖迎勞少主畢遂舘伴少主于青城宰執泣十二月二日少主降服上表􅁛臣待罪表云長驅萬里逺勤問罪之師全庇一宗仰戴􅂭寛之德感恩念咎俯極危􅂨臣猥以􅆌躬奉承天統懵不更事濟以學非昧於知人動成􅂈舉重煩元帥逺止陋􅀖三里之城巳失藩維之守九廟之祀㡬成煨燼之餘不圖深仁曲假殘息兹葢伏遇伯大金皇帝乾坤之施甚慱日月之照無私不怒之威旣追蹤於湯武好生之德且􅓻美於唐虞弗念一夫之辜特全萬人之命宇廟載肅宗廟復安文􅁤旣同永託保全之惠雲天在望徒深向往之誠臣謹奉表稱謝以聞表入復令易服􅁛謝爲待罪云焚香賛拜禮畢見二帥於端城殿酒三行烏陵思謀復陪少主入城次南薫門城中官吏軍士父老持香花迎於門内者填塞道路呼萬歳聲徹数里悲涕交下少主泣涕不止少主還内舘烏陵思謀於都堂始括馬㡬萬疋又出内帑一千萬縑犒軍金銀表叚不能副所須詔開封府尹自府庫洎臣寮戚里夫姓之家悉皆蒐取而所得不及百之一少主自是不御殿惟坐祥曦小殿見使人等五年正月九日元帥以書約少主議事十日烏陵思謀復館伴少主於青城親王位西廡下始取冠冕法服上所尊號玉册大駕法駕鹵簿五輅副輅九􅂦八寳國子􅁥書板三舘秘閤四部書太常禮物大成樂舞明堂大内圗以至乗輿服御珎玩之物翰林醫官教坊樂工官人内侍各以百十数少主日遣使数軰降親札督責有司輦致軍前二月六日出大金皇帝所降詔􅆸宋少主素服望闕受詔大臣親王侍從皆􅀙禮畢還舘讀詔云既爲待罪之人自有易姓之事廢帝抒恩良乆易衣撒榻乃坐諸王在傍流涕嗚咽元帥即遣左丞馮獬樞宻曹輔入侍廢帝大臣何㮚以下悉散􅀙軍中薄晚元帥傳諭廢帝親筆召太上皇太上皇后妃嬪皇􅁎以下悉詣軍前翌日太上皇太上皇后鄭氏出城元帥復令烏陵思謀出迎且辨姦詐即引入與􅆸帝同膳廢帝詣上皇相持號慟上皇獨毅然不改容曰天之所廢吾其如天何未㡬諸王嬪御以下畢至親王二十八人帝􅁎一十五人皇太子一人諸王男女一十六人元帥日遣使問上皇二后廢啼起居供饋甚厚凡所湏用悉取無禁遣馮獬曹輔出館遼主􅁘律延禧降表臣􅁘律延禧言今月十八日西南西北兩路都統府差蕭愈等賫到文字該准奉詔㫖招諭者伏念臣祖宗開先順天人而建業子孫傳嗣預功徳以守成家有大遼權持正統拓土周数萬里享國餘二百年􅀙古以来未之或有迨臣纂紹即巳妄爲恃太平旣乆之時􅈥累代常行之法寖行侮易先忤交和輙無名以行兵望有㨗而張􅀔曲直旣顯勝􅀒自分雖黷武之􅂯三曽敗績之非一往馳信使永講前懽特䝉天地之恩許結弟兄之睦臣更爲眩惑弗克遵依以是􅂯引戈矛重㝷釁􅂩民神共怒智力俱窮寳命旣歸神噐難守宗廟傾覆甘承去國之羞骨􅁏見俘獨作迯生之虜非天時之未識縁巳罪之尤深宣諭幸聞宸恩得浃臣自知咎惡猶積兢惶伏念皇帝陛下念上世之舊懽恕愚臣之前過許奉先人之祀留爲亡國之餘則百姓荷再造之恩一族感聚居之義謹與見在従官望闕俟罪遼主謝免罪表臣延禧言四月八日賫到詔書一道特免臣罪及撫諭仍與西南西北兩路都統勃極烈同朝見者豈不自知合被罪盈之責􅀅何以報特􅀩望外之恩欣幸越常兢惶失次伏惟皇帝陛下仁洽萬物道配二儀猶推不忍之心靡追旣往之咎温頒天語秩振徳音俾底安全特寛罪戾非一身甚幸免武湯問罪之威抑舉荷唐虞好生之徳今專俟都統孛極赴闕同行次降封遼主爲海濵王詔勑可大遼皇帝延禧定矣廢興之数雖謂任天迹其榮辱之来無非􅁚徳從古巳降其事皆然以爾長惡謂之不君積釁至於亡國比讒逆直侮聖矜能烝滛見亂於人倫驕佚不移於性本銅山属弄臣之軰金穴藏外戚之家對之終日無話言行之當代唯亂政􅁋刑以逞視妻子如􅉘狼典禮不修輕人臣如犬馬旋聞中外大紊紀綱朋邪與忠正無分􅄖倡共后妃雜處室如懸磬猶能峻宇雕墻人之流離不輟從禽逐獸􅀖之杌隉民曰怨咨方當降罰之時更稔怒隣之意蕩揺我􅁁鄙招納我叛亡爰自先朝以脩武事我師直而順動彼􅀔屈以自摧曽于奔背之間輙有和成之請即為恩義許結弟兄更張美矣之辭矯示友于之孽旣自作禍􅀙此深骨􅁏見俘宗祧失守疇昔大􅀔已謝徒銜去國之悲于今後事何為莫有逃天之計自知窮蹙方以歸投然嘉来意之甚勤其柰罪條之具在旣爲天之廢棄又爲民之仇讐加之斧􅃏則豈謂無名投諸魍魉則誰云不忍事難與恕朕固合爲載念取亂覆昏属兵武有成􅁇續絶興廢是國家非常之恩勉降新封止除舊號可封爲海濱王其供帳安置並如典例嗚呼朕循故事無專巳以妄爲爾有前非冝撫躬而内省祗服厥命以保乃身故兹詔示想冝知悉遼主謝封海濱王表臣延禧言今月七日伏䝉聖慈特賜詔書一道降封臣爲海濵王者罪當不免誠天下之公言恩反有加見聖人之全度事来望外喜見􅁨中伏念臣粤自祖宗肇有社稷山河固國開数萬里之提封功徳浃民享二百年之福禄迨臣􅁇統之後昧於守成之難矜恃太平作爲多罪先絶隣好輙造釁端遂出無名之師果爲有德者勝未更十載併失五都左右以之離心中外以之解體漸及窘迫旋至播􅁶命寳已歸神噐安在朝夕莫保骨肉見離伶俜一身凄苦萬状昔兵連怨結㡬年忤先帝之心今􅀔盡力窮何計迯吾君之手伏承皇帝陛下具依遺㫖明諭聖言許臣不死之恩恕臣旣往之咎故當道聽是即歸怀今則先廟告成中宸賜見凌兢失魄慚汗何顏即加斧􅃏之誅止爲當罪如投魑魅之處非不甘心豈謂􅃍易刑章曲從禮典所幸得全性命敢希天上之恩何期不伍公矦更賜日中之號此蓋皇帝陛下大明偏照至徳兼容取亂侮亡仗殷周之義􅁇絶興㓕推唐虞之仁以致此身得承先祀儻九廟之靈不昧潜亦知恩况百口之属更生何忘報徳郭藥師拜降表天㑹四年正月相時而動動止固未之有常順天者存存亡寕可以不察事属巳定人難執迷伏惟皇帝陛下祗奉先猷紹􅂭正統皇天所以假手而誅亂生民所以延頸而徯􅂫臣等素提一旅之師旋属百六之運自秦晋之􅂢伐洎文后之擅權政教皆失其紀綱㤙威不行於咫尺十家欲叛者八九一日􅀅死者􅂯三在亡遼無可事之君顧大金有難歸之路故率萬兵而附漢然嘗三載以撫燕宋主載嘉秦官是予念感一飱之惠尚思殞七尺之軀故窮捍禦之勞庻圗報荅之効戰卒旣寡餘力何施矧知上帝之是依敢思因獸之猶闘豈一身之是惜念百姓之無辜頃者東徂雖曽雷震之敢犯今焉北面尚期天地之有容臣等謹以全燕文武官吏􅀅校并馬歩甲兵十萬及係官斛粟錢帛諸物等謹陳表上進以聞賀宋畫河請和表天㑹五年正月知樞宻事劉彦宗上表我伐用張果􅀗師中之吉罪人斯得旋為道左之降凡預見聞孰不呼舉􅀼惟有宋昔謂殊隣姑馳一介而来請講兩朝之好推誠一待背徳不㳟乃父隂結於平山旣渝海上之約厥子不割我三鎮又愆城下之盟殆惡貫之旣盈蹈覆車而不戒聖筭先定天兵載􅀭以蟻蟲蚊蚋之屯􅀾貙虎熊羆之士且天助者順人助者信既弗履行雖城非不高池非不深詎能固守彼衆狼狽而失據我軍奮躍以登陴夷門之火始燃汴河之水皆沸臣主無􅂢軀之所社稷有累卵之危問使絡繹之求哀諸弟涕淚而拜叩申致畫河之請敢迯削地之誅且能修臣子之極㳟惟所命令是用存朝廷之大體不即㓕亡巳昭討叛之形又著服柔之義金鼓一動威德兩全此蓋皇帝陛下旋乾轉坤開日闢月逍遥㳺息而廣土以定拱揖指顧而大事聿成巍巍武功髙冠百王之上煌煌國歩獨尊六合之間臣叨處􅂦司出提兵柄逢千年之㑹徒共快於斯時奉萬年之觴恨阻陪於列辟皇弟諳板勃極烈果等賀俘宋主表天㑹五年正月伏覩破汴俘􅀗宋主者釁生隣國冝我伐之用張佑自皇天果罪人之斯得照臨之下抃舞攸同切以天棄宋􅀖運終趙氏爲隣数載取怒兩朝佶則背先帝之恩􅃍渝海上之約桓則􅀒吾皇之義又違城下之盟惟父子之罪同條故神人之心共棄既爲吾愾心訖誅士王旅嘽嘽往專求於首惡虎臣矯矯思亟奏於膚公羽檄旁飛神旗南指郡縣既下城壁俱摧全軍徑濟於黄河王􅂔潜消於赤縣堅甲利兵固資義勝髙城深壘其如徳何自知天網以難迯俱詣軍門而請罪望闕䖍􅈼天之請在郊展銜壁之儀願上板圗乞爲臣属􅀗諸殷紂武王自誓於商郊紲彼秦嬰髙祖親營於㶚上未如聖代專委師臣去年􅀗遼國之君遥聞㨗報今日俘汴都之主坐聽降音不出户庭克平海宇此蓋皇帝陛下神謀獨運廟筭無遺甫踰載稔之間􅁇有非常之事告成先廟振不墜之英風傳報諸侯聳無之疆􅀔六合之内罔不服千古以来未之有如臣等叨備宰司􅀗承聖略媿無禆賛徒幸遭逢元㑹在辰式集四方之賀愚誠歸美敢􅀭萬壽之休左副元帥宗翰右副元帥宗望賀俘宋主表臣等奉詔伐宋屢克城邑繼至汴京閏月二十五日克汴三十日宋主趙桓出城今月二日率其諸王百官國人僧道望闕稽首跪上降表者稔惡弗悛自難迯於天網得道多助孰敢抗於王師惟宋永八世之承平恃百年之儲積内有甲兵之備外無􅁁境之虞以其隔大海之遥未嘗通先朝之問太祖大聖皇帝誕膺歷数肇造􅀖家彼乃宻修浮海之勤懇致復燕之請輙慿一介遂割兩京曽未立於歳時巳􅃍忘於恩造動摇我封部招納我叛亡皇帝陛下以生靈爲心擴乾坤之量但令理辨曲示含容迄無意於改圖方以師而問罪佶則倉皇而遜位桓惟哀泣以求存議割三府之疆請復兩朝之好豈意我師甫退信誓又渝兹益重於前愆累􅄪煩於天討蓋慿成筭以㡳全功遂令􅁇世之君俱為亡國之虜威靈遐暢文􅁤大同臣等出分閫外之憂坐􅀗師中之吉躬齊五伐不勞仗􅃏於商郊仰祝萬年願効奉觴於漢殿降封昏德公詔天㑹六年八月太宗皇帝實録内録到制詔佶曰王者有國當親仁而善隣神明在天可忘惠而背義以爾頃爲宋主請好先皇始通海上之盟求復山前之壌因嘉懇切曽示􅁢俞雖未夹撃以助成終以一言而賜地星霜未變釁􅂩巳生恃邪佞爲腹心納叛亡爲牙爪招平山之逆黨害我大臣違先帝之誓言愆諸歳幣更邀囘其户口惟巧尚于詭辭禍􅀙此開孽因自作人神以之激怒天地以之不容獨㫁旣行諸道並進往馳戎旅􅀵萬里以無遺直抵京畿豈一城之可守旋聞巢穴俱致崩分大􅀔旣以云忘舉族因而見􅀗悲銜去國計莫逃天雖云忍致其刑章無奈巳盈於罪貫更欲與赦其如理何載念與其底怒以加誅或傷至化􅂚若好生之􅁖殺别示􅄖恩及降新封用遵舊制可封爲昏徳公其供給安置並如典禮嗚呼事蓋稽於往古曽不妄爲過惟在于爾躬切冝循省祗服朕命可保諸身降封昏德侯詔制詔桓曰視頽網以弗張維何以舉循覆轍而靡改載或爾輸惟乃父之不君忘我朝之大造嚮因傳位必兾改圗且無悔禍之心翻稔欺天之􅁖作爲多罪矜恃姦謀背城下之戴恩不割三鎮搆軍前之二使潜􅀤尺書自孽難逃我伐􅂯舉兵士奮威而南指􅀅臣激怒以前驅壁壘俱摧郡縣継下視井惟存乎茅絰渡河無假於葦航豈不知徒嬰城守果爲我􅀗出詣軍前㝷􅃙帥臣使趋朝陛罪誠無赦當與正於刑名德貴有容特􅄖加於恩禮用循故事俯降新封可封爲昏德侯其供給安置並如典禮嗚呼積釁自於汝躬其誰可恕降罰本乎天意豈朕妄爲冝省前非敬服厥命昏德公表天㑹七年八月臣佶伏奉宣命召臣女六人賜内族爲婦具表􅁛謝伏􅂪聖恩賜􅃙書奨諭者仰勤睿眷曲念􅀌蹤察流寓之可憐俾宗藩之可託伏念臣棲遲一已黽勉四􅁶顧齒髪以俱衰指川途而正邈􅀗居内地罔間流言得攀若木之枝少慰桑榆之景此盖伏遇皇帝陛下擴二儀之量孚九有之私用獨夫所守於偷安辨衆情免涉於疑似臣敢不誓堅晩節力報深恩儻伏臈稍至於蕭條頼葭莩必濟乎窘乏尚祈鴻造俯鍳丹􅂨臣無任瞻天望聖激切屏營之至又謝表昏德公重昏侯經􅂈詔遣使館之賜以幣帛酒食仍許其諸女相見昏德公上表謝天恩下逮巳失秋􅂔之寒父子相歡頓覺春光之暖􅃍沐絲綸之厚仍􅂪縑縳之頒感涕何言驚惶無地􅀼以臣家属萬指流寓三年每憂餬口之難忽有聨親之喜方虞季子之幣誰憐范叔之寒旣冐寵榮愈加驚悸此蓋皇帝陛下唐仁及物舜孝臨人故此㝠頑曲􅂪保衛天階咫尺無縁一望於清光短艇飄颻自此囘瞻於魏闕重昏侯謝表暫留内殿忽奉王言特許手足之相歡更被縑絪之厚賜喜驚疊至恩㫖非常伏念臣禀性冥頑賦資忠實􅀒丘山之罪天意曲全聨􅀲􅁑之親聖恩􅂭大方念無衣之卒歳遽欣挟纊之如春此蓋伏遇皇帝陛下内恕及下勞謙損巳雖天地有無私之覆載而父母有至誠之愛憐念報徳之何時懐此心而未巳昏徳公表臣佶言伏􅂪宣命差官舘伴臣赴鶻里改路安置於今月二日到彼居住者曲照煩言止従近徙仍㪟姻好尚賜深憐大造難酬撫躬知幸􅀼念臣家属萬指流寓連年自惟譴咎之深常務省循之効神明可質詎敢及於非圗天地無私遂得安於愚分驚濤千里顛躓百端幸復保於桑榆僅免􅁙於魚鱉此蓋伏遇皇帝陛下垂丘山之厚徳擴日月之大明非風波而可移亦浸潤而不受囘瞻􅁚闕拜沃澤以馳心仰戴龍光感􅀌情而出涕册大齊皇帝文皇帝􅀂曰朕聞公於御物不以天下爲巳私職在牧民乃知王者爲通器威罰旣以殄罪位號冝乎授能乃者有遼運属顛危数窮否塞􅀗罪上帝流毒下民太祖武元皇帝仗黄􅃏而拯黔黎秉白旄而誓師旅妖氛旣掃區宇式寕爰有宋人来􅀙海道願輸歳幣祈復漢疆太祖方務善隣即從来議豈意天方肇亂自啟釁階隂結叛臣賊虐宰輔招集姦匿􅅰亂􅁁陲肆朕纂承仰承先帝姑存大體式示􅆂容乃復蔽慝遁逃夸大疆域肆其貪狼起其紛争􅅰吾外属之藩隣取其受賜之疆土因彼告援遂與解和終莫聽從巧爲辭拒爰命􅀅帥敦諭盟言許以自新終然莫改偏師傅汴首罪奔淮嗣子哀鳴請復歡好地畫三鎮誓卜萬年凡有質要悉同父約既而官軍未退夜集衆以犯營誓墨􅅻乾宻傳檄而堅壁私結人使隂搆事端以致􅂯遣師徒詰兹敗􅀋又起畫河之議復成緩戰之謀旣昧明神乃昭玄鍳京城摧破􅂦祚淪亡無併爾疆以示不貪之徳止􅁶其主用張伐罪之心乃建新封俾守舊服庻能爲國當共息民不料懦儒難勝重任妄爲退讓反䧟誅鋤如構者宋國罪餘趙氏遺孽家乏孝友國乏忠勤銜命出和巳作潜身之計提師入衛反為護巳之資忍視父兄甘為俘虜事雖難濟人豈無情方在殷􅁨樂􅁛僣號心之幸禍于此可知乃遣重兵連年討捕比聞逺竄越在島夷重念斯民亂於無主乆罹􅂗炭未􅀗昭􅂫不委仁賢孰能保定咨爾中奉大夫京東西淮南等路安撫使兼諸路馬歩軍都總管東平府事節制大名開徳等府濮慱濱棣徳滄等州劉豫夙擅直言之譽素懐濟世之才居于亂􅀖生不偶世百里雖智亦奚補于虞亡三仁至高或願從於周仕當姦賊􅅰攘之際愚氓去就之間舉郡来王奮然獨㫁逮乎歷試厥勲克成夫委之安撫徳化行任之牧尹獄訟絶付之總戎盗賊悉專之節制郡國清况有定衰撥亂之謀必持拯變扶危之䇿使民無事則槖弓力穡有役則釋耒荷戈罷無名之征寝不急之務徴遺逸舉孝亷振紀綱修制度省刑罰而去煩酷􅀤倉廪而息螽螟神人以和上下忻應比下明詔詢考輿情列郡同辭一心仰戴冝即始歸之地以昭建業之元是用遣使某官髙慶裔副官韓昉備禮以璽紱寳册命爾爲皇帝國號大齊都大名府世修子禮永貢䖍誠錫爾封疆並􅀙楚舊更相安集自相攸居爾其上體天心下􅀙人欲忠以藩王室信以保􅀖圻惟天難諶惟命靡常常厥徳保厥位爾其勉哉無忽朕命劉蜀王進封曹王制制曰􅃊寶册以薦鴻名既俯􅀙於縦欲布㤙書以敷惠澤宜大渙於群生眷予異姓之王夙有同寅之德肆頒明命孚告治朝蜀王劉豫敦大而直方髙明而寛厚早居南服以直言強諌聞於時頃在東州以智畧英資長於衆八年享國一節事君審運㑹之有終識􅆸興之大義視去位如脫屣以還朝爲登仙向之富國彊兵何覇王之足道今也樂天知命豈得䘮而能移爰因慶賞之行益示褒榮之異胙以陶丘之壌昌其井絡之封於戯列土以建矦􅀖誓巳堅於帶礪盡忠以藩帝室心冝炳若丹青茂對龍光永綏福禄可進封曹王食邑一萬户食實封一千户令有司擇日備禮册命主者施行曹王劉豫謝表禮成大册澤霈普天特例進其封階不遐遺於舊物望闕拜命闔門感恩臣豫誠歡誠忭頓首頓首伏念臣昔仕本朝粗歷要官昧方枘圎鑿之理竭徙薪曲突之忠項氏􅀅亡以范増而不用周家旣勝以箕子而来歸試用微能援升大位辭不􅀗巳報當若何承積年殘毁有餘凡百事艱難極甚辟㓂賊以置朝市披荆􅁄而創耕桑應機投􅂩以傾挫敵讐損巳便人以招集散徙忘寝忘食必躬必親陪廣業以惟勤庻大造之不玷俄知􅆸罷之議愈盡措畫之心要先時成績於斯􅀖覬後日受知於上國至同混一之義不待􅂯三之言即隨使人徃受宣命素所祗備復何遲疑八年辛苦以經營兩手歡欣而分付帝號若釋重􅀒王爵尤感鴻㤙自得清閑而北来未嘗徘􅆦而南望乆安僻地忽被改封洎捧讀於訓辭􅀂㳟聽於睿語温其如玉暖然如春星斗輝輝䴡窈然之天道典謨渾渾顯大哉之王言徽軫爨下之焦桐青黄溝中之㫁木光生懸磬之室榮張設羅之門此葢伏遇皇帝陛下徳奉三無仁鈞九有敬識百辟之享獨觀萬化之原有功而必見知無棄而常善教遂令窮悴得頼襃嘉臣敢不守静􅃱虚安時處順何以効㳙埃之報惟不爲名器之羞弔伐録下終
