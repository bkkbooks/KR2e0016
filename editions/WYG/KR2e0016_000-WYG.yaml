body:
  text: 固倫尼伊拉齊貝勒原書作骨盧你移賚勃極烈誤改見卷一色哷羙原書作撒离母誤改見卷一貝勒原書作孛堇誤改見卷一欽定四庫全書大金弔伐録卷四冊大楚皇帝文維天㑹五年嵗次丁未二月辛酉朔二十一日辛巳皇帝若曰先皇帝肇造區夏務安元元肆朕纂承不敢荒怠夙夜兢兢思與萬國同格于治粤惟有宋實乃通隣貢嵗幣以交歡馳星軺而講好期于萬世永保無窮盖我有大造于宋也不圖變誓渝盟以怨報徳稱端搆亂反義為仇譎詐成俗貪婪不已加以肆行淫虐不恤黎元號令滋彰紀綱弛紊况所退者非其罪所進者非其功賄賂公行豺狼塞路天厭其徳民不聊生尚又姑務責人罔知省已父既無道于前子復無斷于後以故徴師命將伐罪弔民幸頼天髙聽卑神幽燭細旌旄一舉都邑立摧且眷命攸屬謂之大寳茍厯數改卜未或偷安故因黜廢以昭聰鑒今者國既乏主民宜混同然念厥初本非貪土遂命帥府與衆推賢僉曰太宰張邦昌天毓疏通神資睿哲處位著忠良之譽居家聞孝友之名實天命之有歸乃人情之所徯擇其賢者非子而誰是用遣使特進尚書左僕射同知樞宻院事監修國史上柱國南陽郡開國公食邑二千户食實封二百户韓資政副使榮禄大夫行尚書禮部侍郎提㸃大理寺䕶軍譙縣開國侯食邑一千户食實封一百户曹說持節備禮以璽綬冊命爾為皇帝以理斯民國號大楚都于金陵自黄河以外除西夏新界疆場仍舊世輔王室永作藩臣貢禮時修爾勿疲于述職問音嵗致我無緩于披誠於戲天生蒸民不能自治故立君以臨之君不能獨理故樹官以教之乃知民非后不治后非賢不守其于有位可不慎與予􅅷乃徳嘉乃丕績日慎一日雖休勿休徃欽哉其聽朕命天㑹五年三月七日押冊金紫光禄大夫左散騎常侍知御史中丞上䕶軍彭城縣開國公食邑一千户食實封一百户劉恩讀冊樞宻院吏房承㫖中散大夫守衞尉寺卿上輕車都尉清河縣開國伯食邑七百户賜紫金魚袋張愿恭押寳中大夫行中書舍人上輕車都尉太原縣開國伯食邑七百户賜紫金魚袋王企中奉寳樞宻院户房主事銀青榮禄大夫檢校工部尚書行太常少卿兼侍御史輕車都尉隴西縣開國子食邑五百户李忠翊貝勒呼喇呼充傳宣東西上閤門使韓企先充禮直官又有各人人從並樞宻院差賜物玉冊冊匣冊牀行馬一對金印大楚皇帝之寳寳匣寳牀行馬一對紅羅窄襖子平靣玉御帶純金龍口束子錦箱全銀褐中單烏紗幞頭衣匣衣牀行馬全楚主與行府書欲親謝天㑹五年三月日大楚皇帝邦昌謹致書于國相元師皇子元帥今月七日伏奉皇帝聖㫖特降樞臣俯加封冊退循庸陋之資何以對揚休命前此固常死避終不獲辭載惟選授之初盡出薦揚之力尋因還使附致感悰願亟拜于光儀庶少伸于謝禮未聞台今殊震危𠂻遂遣從官是敷勤懇重蒙諄諭仰識眷存然而淹日未前撫躬無措恐浸成于稽緩實深積于兢惶伏望聖慈早容趨赴候承報示徑伏軍門拳拳之誠並留靣叙不宣謹白賀南楚書天㑹五年三月十三日固倫尼伊拉齊貝勒左副元帥皇子右副元帥謹致書于大楚皇帝闕下向承明詔擇立賢人爰及士庶之謀已諒聰英之徳具聞天闕優降冊書禮命恭行群情胥悅未遑伸于慶祝不圖辱于華緘幸容先𨗳微悰繼陪髙論今差榮禄大夫兵部尚書䕶軍廣陵縣開國公髙慶裔彰武軍節度使金紫榮禄大夫檢校太保兼侍御史上騎都尉隴西縣開國侯李士遷充慶賀使副有少禮物具諸别幅專奉書陳賀不宣謹白按三朝北盟㑹編載此書後尚有别幅衣着一百二十叚馬四匹一十二字楚主謝遣使書天㑹五年三月日大楚皇帝邦昌謹致書于國相元帥皇子元帥邦昌猥以菲材誤膺聖擇但俯臨于禹甸方瞻仰于堯雲對敭璽紱之華激切肺肝之感懋惟選建實自薦論願趨謝以陳誠辱賜書而賛善情文兼厚副以儀物之多恩義並隆煥乎衮冕之貴靜言荷戴詎可名言重念授冊以還甫逮彌旬之久粤從請命尚阻造前祈深察于羇悰庶早親于名範其如懇切曷究敷陳仰冀英聰俯垂昭鑒今因榮禄大夫兵部尚書䕶軍廣陵縣開國公髙慶裔等回專奉書陳謝不宣謹白回南楚書天㑹五年三月十四日大金固倫尼伊拉齊貝勒左副元帥皇子右副元帥謹致書于大楚皇帝闕下比遣使人聊申慶禮辱緘封之繼至亦悃愊之彌深其于感藏未易敷述所云之事佇期翌日仰奉光儀專奉書陳達不宣謹白楚復致書天㑹五年三月十五日大楚皇帝邦昌謹致書于國相元帥皇子元帥比縁慶問尋具謝緘載矢請命之誠實懼瀆尊之咎重䝉矜容特賜俞允即祗伏于軍門方佇瞻于台表其如吹澤曷罄欽誠謹奉書復聞不宣謹白行府與楚書天㑹五年三月二十三日大金固倫尼伊拉齊貝勒左副元帥皇子右副元帥謹致書于大楚皇帝闕下近辱華音備詳雅意以左丞馮澥管軍郭仲荀皆素著於忠勤欲俾還于職務竊以上件官將要之定議係干北遷既來命之克勤何敝府之敢吝簽書樞宻院事曹輔禮部侍郎譚世勣中書舍人孫覿給事中沈晦閤門宣賛舍人李仔朝散郎汪藻閤門祗候趙瑰給事中黄夏卿宣賛舍人趙詵右文殿修撰宋彦通觀察使邢端彦將作少監蘇餘慶少府少監徐天民少府監丞許汪崔亨復包師道羅公彦宋忠劉思齊郝敏任良臣武恭孝李琦并人從家眷等或從行廢帝或因事軍門今並遣還庶俾分任外自來所取金帛皆係犒賞軍兵之所急用雖不能足數亦且期大半今楚國肈造本固則安慮因徴括之急重困斯民亦議權止又有夏國并别事宜今差保静軍節度使蕭慶觀察使李原闕名口諭所云前去計議仰惟髙明幸察悃愊專奉書陳逹不宣白行府告諭亡宋諸路立楚文字元帥府勘㑹徃者遼國運衰是生昏徳先發釁端自為戎首朝廷爰舉義師奉天伐罪不期宋人浮海計議候并遼國願割雲燕嵗納金縑自依舊例先皇帝以有容為徳嘉其來意置以不疑即時允許爾後全燕纔下割之如約其謂恩徳不為不多于是要以天地質諸神明遂立誓文盗賊逃人無令停止亦不得宻切間諜誘擾邊民傳于子孫守而勿失既而宸輿北返宰執東行不意宋人貪婪無厭稔其姦惡忽忘前施之義潜包幸亂之謀遽瀆誓約結搆兇頑使圖不軌據京為叛賊殺大臣邀回户口啖以官職宻令納土仍示手書竊行撫諭遂使京畿之地鞠為冦場洎天兵臨境魁首奔亡而又接引輙相保蔽更易姓名授之官爵及至追索𫝊以偽首既殺無辜又貸有罪不仁不恥于此可知朝廷方務含容不形其惡但誡邊臣户口之外一無理辨此所以必欲久通和好之故也彼尚飾以偽辭終為隱諱招納叛亡反擾民户使邊賊出没作過所有嵗幣又多愆期背徳忘恩莫此之甚朝廷亦不咎之依前催索亦不聽從反云本朝幅員萬里民居散漫雖欲根究難指有無况事皆已徃請别計議據彼迷辭意涉誇謾至于本境行發文字輙敢指斥朝廷言多侮謗雖累次移文俟其改過終不悔悟罔有悛心矧又夏臺實我藩輔忱誠既獻土民是賜而宋人忽聚無名之師輙行侵擾之事因其告援遂降朝㫖移文解和俾復疆土仍以狂辭不為依應反云夏人納欵曲有陳請大金方務恩撫初附之國且料不無曲意姑行順從夏人已為周至自今不煩干預自當以道理所在且朝廷方隆恩造下浹羣邦宋夏兩國各䝉其賜所與之地裁之在我肯致曲私以為周至豈期詭詐侮慢昧于道理不為禀從如此之甚斯則非止侵凌夏國實闗不懼朝廷加以肆行苛虐不恤黎元號令滋彰紀綱弛紊淫詞遍野虛器盈庭所退者非其罪所進者非其功賄賂公行豺狼塞路多端巧細聚斂無度役使百倍比屋一空天厭其徳民不聊生尚又姑務責人罔知省已遂奉聖詔伐罪弔民亦許夏國相應進討趙主纔聞近舉逺奔淮甸嗣子繼立聲言内禪引以父咎哀泣求和願割三鎮復尋舊好特為矜愍遂其所請再修盟誓一同父約無何誓墨未乾盟言已變官軍纔退援衆繼集宻𠡠邊臣冀令堅守父雖無道情有可矜悔過而去其位子復背盟理無可恕覆車而不改轍以故再奉嚴命重申弔伐去冬諸路兵馬纔到城下累遣使人尚冀悛改皆蔽而不通至閏月二十五日城破二十九日少主出降上表待罪尋具申奏奉聖㫖先帝有大造于宋而宋人悖徳故去年有問罪之舉廼因嗣子遣使軍前哀鳴祈請遂許自新既而不改前跡變渝愈速是致再討猶敢抗師洎官兵力擊京城摧破方伸待罪之禮况追尋載書有違斯約子孫不紹社稷傾覆父子所盟其實如一今既服罪宜從誓約宋之舊封頗亦廣袤既為我有理宜混一然念所舉止為弔伐本非貪土宜别擇賢人立為藩屏以王兹土趙氏宗人不預此議應宋之百司並事新君者其宋之道君少主后妃已下並以北遷及委前宋文武百官軍民僧道耆老中大夫同知樞宻院事孫𫝊等狀竊以本國日前將相多是上皇時用事誤國之人自嗣君即位以來所任宰相繼以罪竄將帥率皆敗亡之餘其他臣寮𩔖皆碌碌無聞此元帥府之所備知豈敢蔽賢若舉于草澤之間亦非聞望素著人心必不歸向孰肯推戴兼祖宗徳澤在人至深至厚若别立他姓恐生變亂非所以稱皇帝愛惜生靈之意若自元帥府特選立趙氏一人不唯恩徳有歸城中方外即便安貼或天命改卜厯數有歸即非本國臣民所敢預議乞自元帥府推擇賢人永為藩屏𫝊等不勝痛切隕越之至尋以趙氏父子不守信誓為罪之深所以必廢趙氏之意徃復再三乃云在京必無其人乞于軍前選立太宰張相公治國事者行府㑹驗本官乃去年同康王出質者也既許尋舊好之後少主竊發精兵夜犯營寨官兵接戰即時破滅以其敗盟遂圍京城將臨進攻本官哀泣泥首某身為宰執出質軍前不意犯于不虞罪當萬死然少主莅事日淺盖縁姦臣所誤且乞緩其攻擊因遣使詰之少主趨迎使人泣而謝罪乃至和成洎從軍北行河北州縣或有不降每欲進擊必自哀求徃徃有可愍之意及重兵再舉又乞遣使理㑹雖威之以鋒刃不足避也欲引而南進曰豈有大臣躬親出質不能戢兵以致交惡而同敵人忍觀其伐主也我頭可斷我身不可去城破之日驛召而至語及廢國之際號泣擗踊涕泗交流告乞再造既見不容或以腦觸柱或以首投地㡬至自絶乃知忠孝剛毅出于其倫忽聞共戴果謂此人則得其人也然恐難奪其志洎在京百官差到翰林學士承㫖吳幵翰林學士莫儔賫狀勸請切聞建邦設都必立君長制國御俗允賴仁賢恭以大金皇帝道奉三光化包九有不以混一中外為已私念専用全活生靈為國大恩明下詔音曲詢衆議矜從諸夏俾建列藩共推宗公以治國事契勘雖不許存立趙氏既奉詔諭擇立賢人以王兹土則于國于民為幸亦已深矣不可告立趙氏伏惟太宰相公名髙今古學通天人位冠冡司身兼衆美碩徳偉望蚤羽儀於百工嘉謀赤心每勤勞於三事敢望以蒼生為憂而不以細行自飭以機政為慮而不以固避自嫌上體大金擇立存撫之恩下副國人推戴為主之念及别有狀申行府文武百官僧道耆老軍民共請太宰張相公以治國事别有勸請文字竊恐猶有辭讓伏望元帥府更賜敦諭本官早從輿望尋請知樞宻院事漢軍都統制劉侍中等同詣具道其由勃然奮怒曰國雖將破在臣子之分豈容聞此事由以先有防備不獲自絶然而閉目掩耳背立偃蹇終不為聽但罵文武官僚曰以諸公畏于兵威置我賊亂之罪寧甘死于此不可活于彼以取後世簒奪之名也然行府以軍國務重不可久曠尋録申奏今降到寳冊持節備禮以璽綬冊命為皇帝以授斯民國號大楚都于金陵自黄河以外除西夏新界疆場仍舊世輔王室永作藩臣其間志氣屹然不動雖多方勉諭以事在已然雖死無濟何如就冊用拯生靈猶不下飲食累日㡬至滅性遂擁廹入城廼有在京官僚僧道耆老軍民共集勸請直至今月七日方受冊命合行告諭須議指揮京畿路京西路南路北路京東路東路西路陜西路鄜延路環慶路秦鳯路熙河路京兆府河北東路淮南東路西路右下逐處各可照騐應宋之舊臣或作藩鎮並事新君軍國之務事無大小一切聽其處分敢有違悞或妄稱恩舊輙有動衆以擾軍民不獲安業者即是叛命之人夫趙氏累世之君也猶以失道假手于我今大楚皇帝推戴儻有拒命雖有愛惜生靈勸懲之義當在必行則玉石俱焚豈能無之宜所在曉悉此意一切並聼節制以副聖㫖撫綏安寧之意仍仰就便指揮曉告所轄合干去處知悉具依准施行狀申天㑹五年三月二十六日與楚計㑹陜西地書天㑹五年三月二十七日大金固倫尼伊拉齊貝勒左副元帥皇子右副元帥謹致書于大楚皇帝闕下勘㑹承准朝廷降到大楚皇帝冊文自黄河以外除西夏新界疆埸仍舊并當府所奉宣命楚夏封界就便從長分畫施行者今議定東自麟府路洛陽溝東底黄河西岸西厯暖泉堡鄜延路米脂谷大谷米谷開光堡臨夏城聖塔谷威戎城萬安川殄羌寨杏子堡鵓鴿谷萬全寨木場口累勝寨環慶路威邊寨麥川堡定邊軍賀家原阿原堡木𤓰堡九星原通歸堡定戎堡卧山臺興平城巢寨谷曙鷄嶺秦市川委布谷口涇原路威川寨賀羅川賀羅口板井口通闗堡古蕭闗秋山堡綏戎堡鍬钁川口中路堡西安州山前堡水泉堡定戎寨亂山子北谷川秦鳯路通懷堡打乘川征原堡古㑹州自北直抵黄河依見今流行分熙河路盡西邊以限楚夏之封所有界至如或指定地名城堡處所内有出入懸邈者相度地勢各容接連兩相從便分畫布此悃悰冀為孚察專奉書陳達不宣謹白楚回書按此書標目原本脱去今補入天㑹五年三月日大楚皇帝邦昌謹致書于國相元帥皇子元帥比遣使指申諭夏疆已附致于悃誠復勤書于誨示恭聞宣命俾分畫之從長兹奉令慈指地名而開示東自麟府路洛陽溝東底黄河西岸西厯暖泉堡鄜延路米脂谷大谷米谷開光堡臨夏城聖塔谷威戎城萬安川殄羌寨杏子堡鵓鴿谷萬全寨木場口累勝寨環慶路威邊寨麥川堡定邊軍賀家原阿原堡木𤓰堡九星原通歸堡定戎堡卧山臺興平城巢寨谷曙鷄嶺秦市川委布谷口涇原路威川寨賀羅川賀羅口板井口通闗堡古蕭闗秋山堡綏戎堡鍬钁川口中路堡西安州山前堡水泉堡定戎寨亂山子北谷川秦鳯路通懷堡打乘川征原堡古㑹州自北直抵黄河依見今流行分熙河路盡西邊以限楚夏之封其間懸邈各許相度以至接連兩相從便已具遵于定議當即接于伻圗其或未安尚容再禀仰祈英鑒洞照微𠂻謹奉書復不宣白與楚減免銀絹錢書天㑹五年三月二十九日固倫尼伊拉齊貝勒左副元帥皇子右副元帥謹致書于大楚皇帝闕下㑹騐宋時除依遼國舊例嵗輸銀絹五十萬兩匹外别納錢一百萬貫初以代燕地所出今若依例輸納且念地既分割民有凋敝特免錢一百萬貫减放銀絹二十萬兩匹每年只議納三十萬兩匹銀絹各半其數亦依舊例交割布此悃悰冀為照察專奉書陳達不宣謹白楚謝减銀絹錢書天㑹五年四月日大楚皇帝邦昌謹致書于國相元帥皇子元帥重勤書誨祇荷令慈惟前朝之所輸准定數而有例俯念地土割裂之後方當人民凋敝之餘曲賜寛矜悉從蠲免除特免錢一百萬貫外减放銀絹二十萬兩匹每年只議納三十萬兩匹銀絹各半其數一依舊例交割所䝉指諭悉已遵承其于感戴之心難盡敷陳之素仰惟聦哲深諒悃誠謹奉書陳復不宣謹白楚回書天㑹五年四月日大楚皇帝邦昌謹致書于國相元帥皇子元帥祗領華緘具欽隆指城破不取已歸全度之仁軍賞姑停載荷哀矜之賜以至蠲免嵗納之數悉繫始終恩顧之私惟頂踵之所䝉雖膚髮而可割所有三十萬兩匹纔候措置就緒請依令㫖排辦伏祈英亮垂鑒卑悰謹奉書陳復不宣謹白元帥右監軍與楚書天㑹五年七月日元帥府右監軍謹致書于大楚皇帝闕下昨者宋人不幸趙氏敗盟由此出師至于國都廼廢宋而造楚本以示懲勸于後來者也班師之日定約具存貴心腹以相知凡事為而必達距今累月曾無一音緬想其間不知何似所約陜西之地以屬夏國之疆頃被彼人請分兹土伏冀蚤為割畫用副悃誠睽違去此既遥動靜于兹未悉回復之際次第相聞商氣方清願膺繁戬今差朝散大夫少府少監飛騎尉原闕二字縣開國男食邑三百户賜紫金魚袋牛慶昌六宅使銀青榮禄大夫檢校太子賔客兼殿中侍御史雲騎尉樂詵専奉書陳達不宣謹白康王與帥府通問按此係金守邉人録白康王書申帥府文字標目似誤今月十九日准黄河南岸遣過兵士丁俊馬立等二人賫到稱大宋皇帝奉使國相元帥通問所牒封當府照到來牒上題寫大宋二字尋與都統所同共商量為國號不同不敢收留已回牒却于元差來人處賫回及已具申禀元帥府施行候奉到指揮别行牒去訖今録白通問所元來公文粘連在前須至申覆者右謹如前伏乞元帥府照騐施行天㑹五年七月二十六日康王書建炎元年六月日大宋皇帝致書大金國相元帥帳前盖聞天屬所繫遇患相收隣國之交行道為福輒披哀懇用徹聦聞顧大義之當然宜髙懷之洞照痛念本國逺通貴朝原其浮海之初各有誓山之志事有可恨謀因不臧一變歡盟重罹禍故興言及此雖悔何追昨為將命之行深冀接辭之幸取道偶異有懷弗宣逮提入衞之師承奉再和之詔初謂登陴而不下荷徳何言終聞舉族以偕行措躬無地便欲自投于死所莫能終拂於輿情繼體非心􅋞淚盈握雖懐宗廟社稷之重敢忘父子兄弟之親早夜以思投告無所乃惟博達必照㡬微理有天常不多上人者盖識消息盈虛之數天無私覆非大亡道者皆有扶持安全之心諒國相元帥特擴大度深矜至衷資二帝之南還擇六宫而偕從無留宗族并返官聯上承天地好生之心俯慰黎元願息之意儻施恩之出此宜圖報之何如四海流聞必服柔而慕徳上穹降鑒亦眷祐以垂休兹惟治國之逺圖不特冲人之私幸炎蒸在候調䕶惟宜所有二帝諸后問安表箋并望指揮即令通達許人進見以慰瞻慕之心有少禮物具如别幅謹白回康王書天㑹五年十月四日元帥右監軍右都監同致書于前宋康王閣下且以亡宋累違誓約故前年有城下之盟洎成之後不務遵奉反圖不軌雖使悔之終無悛改故今年有滅國之舉汴人既與執迷理應共戮而登城不下擇立賢人盖以罪有所歸肯多上人而違安全之心乎至于告諭諸路不許復思趙氏亦使後世為人上者恡于盟信不敢放縱以為深戒豈是已甚耶今閣下身既脱網亦合守分輒敢竊入汴邑僣稱王號遣使詣府一無遜辭反求父兄宗親官聯而隂遣軍兵頻來戰鬬詳味其意全無追悔父兄之誤特有以力抗拒之心况朝廷所立大楚皇帝不言所在之處帥府議定割與夏國陜西諸路之地有無己未依從難議允聼今因人使回専奉書陳達不宣白伐康王曉告諸路文字元帥府勘㑹昨為宋人不守恩義反圖不軌故天㑹三年初有問罪之辭趙佶以前非罪已棄位奔逃嗣子桓幸釁稱君哀鳴請命割其三府復講舊歡既而誓墨未乾叛音荐至王師纔退賊衆仍集故天㑹四年復興亡宋之師汴城既克趙氏遂遷原其士民附于昏徳各宜誅戮以徇狂迷然朝廷以謂罪既有歸愚民何咎乃立太宰張邦昌為大楚皇帝以主斯民此亦朝廷大有造于宋也不期穹蒼降禍汴邑更端推戴趙構妄稱興復阻絶津路敢肆窮兵遂使武士死于鋒刃填于溝壑居民苦于流離無有聊生猶自數犯疆埸騷擾邊民且趙構雖係亡宋之餘是亦匹夫非衆人共迷無由自立此無知之構飾巧端以肇亂人心亦惑于巧說以致于此是知罪亦係于輿人故復承嚴令重申大伐統領重兵諸路齊進趙佶嘗誇本朝幅貟萬里居民散漫盖以朝廷裂全燕益其國縱常勝增其力此其所以恃頼已甚貪求無厭反圖不軌之由也全燕常勝皆復歸化外并晉之地古謂雄藩趙魏之民舊稱富庶全此之際尚不能禦悉為我有况又闗西隴右亦云驍鋭别有圖謀之計趙氏之所恃者汴洛殘民而已其餘不可言也以我雄師何往不獲期在必克指日定亂此非威脅人所共知若趙構曉悉此意親詣轅門悔罪聼命則使與父兄圓聚復立大楚而已如張氏已遭鴆毒則别擇賢人使斯民有主而已秋毫無犯若或仍敢恣狂終無悛悟即許所在士民僧道齊心擒送以靖國難若亦不慎去就稍拒官軍不即擒送及不住擾亂新邊即是以迷固迷與亂同道自取塗炭罪宜不宥累年征討定無蘇息今特曉告須議指揮右下應係亡宋諸路州府軍縣官僚僧道耆夀軍人百姓可各照㑹審擇長計無招後悔付逐處准此天㑹五年十二月二十三日差劉豫節制諸路總管安撫曉告諸處文字趙氏自結義本朝屢違誓約重犯罪愆故于天㑹三年興兵問罪父佶既走子嗣哀鳴求好復立嚴誓要諸天地質諸神明其于委細一如父約豈謂官軍纔退子戾甚前故于天㑹四年復舉師旅廢滅趙氏汴人既附昏徳復抗官軍亦宜按以軍令原其罪本有所歸並䝉寛宥重念斯民本朝既不貪土又不可以久無主仍委亡宋臣僚選舉道徳隆懋堪為人主者咸薦張氏綽有人望克兹重任立為大楚皇帝繼主其民朝廷推亡固存之義不謂不深不期趙氏遺孽竄在郊逺潜謀不軌輙行廢立故自天㑹五年又舉大兵擒捕興復所有趙氏本末罪状已具曉諭今縁逆賊逃在江浙比候上秋再舉暫就涼陘勘㑹南民久習澆訛雖丁寧說諭尚多違背况亡宋諸路前後攻降撫定除陜西行府别有措置外京東京西淮南等路并河北州府不少比至擒獲趙構别立新主以來若不依行府已奉便宜行事宣㫖選擇幹事官貟主領亦慮相次又被偽賊暗竊連合妄起事端枉遭禍敗須議指揮右下知濟南府劉豫可知東平府事京東京西淮南等路安撫使兼諸路馬步軍都總管大名開徳府濮博濵棣滄徳州亦在節制凡諸事體且循宋舊例其徭役賦歛㑹騐宋時特係煩酷速宜就長規計務從民便至于獄訟亦要寛簡刑罰臨事制宜勿拘常法其有未經納欵州府軍縣仰差人具說禍福利害招擕歸業免于將來再舉枉遭驚懼其間若有勞効一心歸順公務幹辦者無問士庶並依宋時例格樁擬合補資級就便出給公據候立新君别給正行付身所有安撫使職分合得請俸并本司合用司吏公使人力着依京東西路安撫司已設置人數分例或有今來事體比舊重大約量添置更于民間疾苦特行減損亦自從宜畫定行府更慮諸路州府猶有執迷不從或輙叛亂已留重兵分屯衝要處所仍摘留元帥左監軍分司在此從宜措置施行若有如上事理本司力難克制仰計㑹申覆左監軍取候指揮若諸州縣職員内有見闕或不任職事至于計運勸農等事須至設官即許便行差填替換旋報監軍照騐不得有違慢易并下揚真楚泗泰沂海徐濵棣滄徳博淄青恩清等州襲慶東平開徳大名等府睢陽髙郵天長等軍可照騐並聼安撫使司節制不得有違付逐處准此天㑹七年二月日天㑹四年冬元帥伐宋師次髙平先遣烏凌噶思謀天使入汴致書至五年二月六日廢宋少主桓為庶人實録宋中書舍人孫覿撰天㑹四年十一月十六日大金固倫尼伊拉齊貝勒左副元帥自太原進兵次澤州十七日次髙平遣使烏凌噶思謀致書宋少主以興師問罪之意議欲割河為界俾分遣大臣詔諭河東北兩路兵民交割仍先具凡所聽命不違國書還報烏凌噶思謀即馳馬上道十九日渡河河上守卒無一人在者聞天軍至悉散去矣所過居民藉藉有語往往瞋目相視間闗數百里二十日次汴都忽遇南軍數百騎圍之數重城門閉不得入日已夕詔開順天門館于都亭驛越一日入見崇政殿跪致書具申諭書意并欲干戾人蔡京童貫王黼李綱吳敏陳遘詹度馬擴張孝純家屬等九人執赴軍前宋主即日報書引咎自責祈請備至遣門下侍郎耿南仲同知樞宻院事聶昌持詔分畫兩河四十四州軍詔意大抵謂為人父母豈忍為此盖不獲已茍全汝生猶吾民也勿懐顧望抵晚陛辭復令騎吏數百䕶送出闗宿瓊林苑軍士相聚謗罵通夕不敢寐遅明遂行約二十五日次河陽遇元帥遂引兵而南河流淺涸不用船筏䇿騎而渡閏十一月二日駐汴之青城三日復遣烏凌噶思謀同借保靜軍節度使蕭慶借司農少卿楊貞幹致書欲畫河内州郡并前次使人所索官吏漏落之數如蔡攸徐處仁王安中李彌大劉韐折彦質折可求吕仲王禀及趙良嗣蔡靖髙世由范直方滕茂實李嗣本家屬并約少主出城㑹盟以示大信烏凌噶思謀持書扣城城上皆持滿相向遂駐射又䇿馬前諭使㫖復投矢石見拒薄暮𫝊詔繼而止舍都亭驛七日入見崇政殿致書八日得㫖詣都堂與三省長官何㮚等集議報書苐言始割三鎮即遣馮澥李若水如約復議畫河又遣耿南仲聶昌分詣而㑹盟不從九日陛辭出安上門復命十四日又遣烏凌噶思謀致書云使還少主以㑹盟為疑可遣左僕射何㮚赴軍前計議而以上皇皇弟越王太子為質翌日烏凌噶思謀病卧館中不能朝詔中使挾醫馳視十七日得㫖乘肩輿入對不拜詔内侍給扶奏事畢免辭謝以皇伯保順軍節度使開府儀同三司安康郡王仕􅧘同馮澥計議不遣何㮚詔烏凌噶思謀乘卧輿還報既還止帳中元帥飭遣數醫臨視黎明力疾詣帥府復命以歸二十四日疾有瘳二十五日大軍自南壁登城元帥𫝊令不得輙下城縱掠二十七日宋少主遣宰相何㮚中書侍郎陳過庭皇弟濟王栩請命二十九日又遣皇叔燕王俁越王偲皇弟鄆王楷景王杞濟王栩祁王模莘王植徐王棣沂王㮙和王栻信王榛凡一十一人請命于元帥而不得見第遣皇弟四人還諭少主令速出郊三十日昧爽少主素隊出南薫門大臣侍從親王從者四百人烏凌噶思謀𫝊元帥㫖迎勞少主畢遂館伴少主于青城宰執泣十二月二日少主降服上表稱臣待罪表云長驅萬里逺勤問罪之師全庇一宗仰戴隆寛之徳感深念咎俯極危𠂻臣猥以𦕈躬奉承天統懵不更事濟以學非昧于知人動成過舉重煩元師逺止陋邦三里之城已失藩維之守九廟之祀幾成煨燼之餘不圖深仁曲假殘息兹盖伏遇伯大金皇帝乾坤之徳甚溥日月之照無私不怒之威既追蹤于湯武好生之徳且儷羙于唐虞弗念一夫之辜特全萬人之命宇宙載肅宗廟復安文軌既同永託保全之惠雲天在望徒深向往之誠臣謹奉表稱謝以聞表入復令易服稱謝為待罪云焚香賛拜禮畢見元帥于端成殿酒三行烏凌噶思謀陪少主入城次南薰門城中官吏軍士父老持香花迎于門内者填塞道路呼萬嵗聲徹數里悲涕交下少主泣涕不止少主還内館烏凌噶思謀于都堂始括馬幾萬匹又出内帑千萬縑犒軍惟金銀表叚不能副所須詔開封府尹自府庫洎臣僚戚里大姓之家悉皆捜取而所得不及百之一少主自是不御殿惟坐祥曦小殿見使人等五年正月九日元帥以書約少主議事使烏凌噶思謀復館伴少主于青城親王位西廡下始取冠冕法服上所尊號玉冊大駕法駕鹵簿五輅副輅九鼎八寳國子監書板三館秘閣四部書太常禮物大成樂舞明堂大内圖以至乘輿服御珍玩之物翰林醫官教坊樂工宫人内侍各以百十數少主日遣使數軰降親札督責有司輦致軍前二月六日出大金皇帝所降詔廢宋少主素服望闕伏拜受詔大臣親王侍從皆從禮畢還館讀詔云既為待罪之人自有易姓之事廢帝抒思良久易衣撤榻乃坐諸王在傍流涕嗚咽元帥即遣左丞馮澥樞宻曹輔入侍廢帝大臣何㮚以下悉散從軍中簿晚元帥𫝊諭廢帝親筆召太上皇太上皇后妃嬪帝姬以下悉詣軍前翌日太上皇太上皇后鄭氏出城元帥使烏凌噶思謀出迎且辨姦詐即引入與廢帝同館廢帝詣上皇相持號慟上皇獨毅然不改容曰天之所廢吾其如天何未㡬諸王嬪御以下畢至親王二十八人帝姬一十五人皇太子一人諸王男女一十六人元帥日遣使問上皇二后廢帝起居供饋甚厚凡所須用悉取無禁遣馮澥曹輔出館遼主耶律延禧降表臣耶律延禧言今月十八日西南北兩路都統府差蕭愈等賫到文字准奉詔㫖招諭者伏念臣祖宗開先順天人而建業子孫𫝊嗣賴功徳以守成奄有大遼持權正統拓土周數萬里享國踰二百年從古以來未之或有迨臣纂紹即已妄為恃太平既久之時隳累代常行之法寖行侮易先忤交和輙無名以舉兵望有㨗以張勢曲直既顯勝負自分雖黷武之再三曾敗績之非一往馳信使永講前懽特䝉天地之恩許結弟兄之睦臣更為眩惑弗克遵依以是再引戈矛重尋釁隙民神共怒智力俱窮寳命既歸神器難守宗廟傾覆甘承去國之羞骨肉既俘獨作逃生之虜非天時之未識縁已罪之尤深宣諭幸聞宸恩得浹臣自知咎惡猶積兢惶伏望皇帝陛下念上世之舊懽恕愚臣之前過許奉先人之祀留為亡國之餘則百生荷再造之恩一族感聚居之義謹與見在從官望闕竢罪遼主謝免罪表臣延禧言四月八日賫到詔書一道特免臣罪及撫諭仍與西南西北兩路都統貝勒等同朝見者豈不自知合被罪盈之責將何以報特䝉望外之恩欣幸越常兢惶失次伏惟皇帝陛下仁洽萬物道配二儀猶推不忍之心靡追既徃之咎温頒天語秩振徳音俾底安全特寛罪戾非一身幸免武湯問罪之威抑舉族均荷唐虞好生之徳今專俟都統貝勒等赴闕同行次降封遼主為海濵王詔勅下大遼皇帝延禧定矣廢興之數雖謂任天迹其榮辱之來無非象徳從古已降其事皆然以爾長惡謂之不君積釁至于亡國比䜛迕直侮聖矜能烝淫見亂于人倫驕佚不移于本性銅山屬弄臣之軰金穴蔵外戚之家對之終日無話言行之當代唯亂政淫刑以逞視妻子如豺狼典禮不修輕人臣如犬馬旋聞中外大紊紀綱朋邪與忠正無分優倡共后妃雜處室如懸磬猶能峻宇雕墻人之流離不輟從禽逐獸邦之杌陧民曰怨咨方當降罰之時更稔怒隣之意蕩摇我邊鄙招納我叛亡爰自先朝以修武事我師直而順動彼勢屈以自摧曾于犇北之間輙有和成之請即為恩義許結弟兄更張美矣之辭矯示友于之字孽既自作禍從此深骨肉見俘宗祧失守疇昔大勢已謝枉䘖去國之悲于今後事何為莫有逃天之計自知窮蹙方以歸投然嘉來意之甚勤其奈罪條之具在既為天之廢棄又為民之仇讐加之斧鉞則豈為無名投諸魑魅則誰云不忍事難與恕朕固合為載念取亂覆昏屬兵武有成之績繼絶興廢是國家非常之恩勉降新封止除舊號可封為海濵王其供帳安置並如典例嗚呼朕循故事無専已以妄為爾有前非宜撫躬而内省祗服厥命以保乃身故兹詔示想宜知悉遼主謝封海濵王表臣延禧言今月七日伏䝉聖慈特賜詔書一道降封臣為海濵王者罪當不免誠天下之公言恩反有加見聖人之全度事來望外喜見憂中伏念臣粤自祖宗肇有社稷山河固國開數萬里之提封功徳浹民享二百年之福禄迨臣繼統之後昧于守成之難矜恃太平作為多罪先絶隣好輙造釁端遂出無名之師果為有徳者勝未更十載并失五都左右以之離心中外以之解體漸及窘廹旋至播遷大寳已歸神器安在朝夕莫保骨肉見離伶俜一身凄苦萬狀昔兵連怨結㡬年忤先帝之心今勢盡力窮何計逃吾君之手伏承皇帝陛下具依遺㫖明諭聖言許臣不死之恩恕臣既往之咎故當遵聼是即歸懐今則先廟告成中宸賜見凌兢失魄慚汗何顔即加斧鉞之誅正為當罪如投魑魅之處非不甘心豈謂遽易刑章曲從禮典所幸得全性命敢希天上之恩何期不伍公侯更賜日中之號此盖皇帝陛下大明偏照至徳兼容取亂侮亡仗殷周之義繼絶興滅推唐虞之仁以致此身得承先祀儻九廟之靈不昧亦知感恩况百口之屬更生何忘報徳郭藥師拜降表天㑹四年正月相時而動動止固未之有常順天者存存亡寧可以不察事屬已定人難執迷伏惟皇帝陛下祗奉先猷紹隆正統皇天所以假手而誅亂生民所以延頸而徯蘇臣等素提一旅之師旋屬百六之運自秦晉之捐代洎文后之擅權政教皆失其紀綱恩威不行于咫尺十家欲叛者八九一日將死者再三在亡遼無可事之君顧大金有難歸之路故率萬兵而附漢然嘗三載以撫燕宋主載嘉秦官是子念曾感一飱之惠尚思捐七尺之軀故窮捍禦之勞庶圖報答之効戰卒既寡餘力何施矧知上帝之是依敢思困獸之猶鬬豈一身之是惜念百姓之無辜頃者東征雖曾雷霆之敢犯今焉北靣尚期天地之有容臣等謹以全燕文武官吏將校并馬步甲兵十萬及係官斛粟錢帛諸物等謹陳表上進以聞賀宋畫河請和表天㑹五年正月知樞宻院事劉彦宗上表我伐用張果獲師中之吉罪人斯得旋為道左之降凡預見聞孰不呼舉竊惟有宋昔謂殊隣姑馳一介而來請講兩朝之好推誠以待背徳不恭乃父隂結于平山既渝海上之約厥子不割我三鎮又愆城下之盟殆惡貫之既盈蹈覆車而不戒聖筭先定天兵載揚以蟻蟲蚊蚋之屯戰貙虎熊羆之士且天助者順人助者信既弗履行雖城非不髙池非不深詎能固守彼衆狼狽而失據我軍奮躍以登陴夷門之火始然汴河之水皆沸臣主無捐軀之所社稷有累卵之危問使絡繹以求哀諸弟涕洟而拜叩申致畫河之請敢逃削地之誅且能修臣子之極恭惟所命令是用存朝廷之大體不即滅亡已昭討叛之刑又著服柔之義金皷一動威徳兩全此盖皇帝陛下旋乾轉坤開日闢月逍遥㳺息而廣土以定拱揖指顧而大事聿成巍巍武功髙冠百王之上煌煌國步獨尊六合之間臣叨處鼎司出提兵柄逢千年之㑹徒共快于斯時奉萬夀之觴恨阻陪于列辟皇弟阿木班貝勒杲等賀俘宋主表天㑹五年正月伏覩破汴俘獲宋主者釁生隣國宜我伐之用張佑自皇天果罪人之斯得照臨之下抃舞攸同切以天棄宋邦運終趙氏為隣數載取怒兩朝佶則背先帝之恩遽渝海上之約桓則負吾皇之義又違城下之盟惟父子之罪同條故神人之心共棄既為所愾必訖於亡王旅嘽嘽往専求于首惡虎臣矯矯思亟奏于膚功羽檄旁飛神旗南指郡縣繼下城壁俱摧全軍徑濟于黄河王氣潜消于赤縣堅甲利兵固資義勝髙城深壘其如徳何自知天網以難逃俱詣軍門而請罪望闕䖍籲天之請在郊展銜璧之儀願上版圖乞為臣屬獲諸殷紂武王自􅊎于商郊紲彼秦嬰髙祖親營于㶚上未如聖代専委帥臣去年獲遼國之君遥聞㨗報今日俘汴都之主坐聼降音不出户庭克平海宇此盖皇帝陛下神謀獨運廟筭無遺甫踰再稔之間繼有非常之事告成先廟振不墜之英風𫝊報諸侯聳無敵之强勢六合之内罔不服千古以來未之有如臣等叨備宰司獲承聖畧媿無禆贊徒幸遭逢元㑹在辰式集四方之賀愚誠歸美敢揚萬夀之休左副元帥宗翰右副元帥宗望賀俘宋主表臣等奉詔伐宋屢克城邑繼至汴京閏月二十五日克汴三十日宋主趙桓出城今月二日率其諸王百官國人僧道望闕稽首跪上降表者稔惡弗悛自難逃于天網得道多助孰敢抗于王師惟宋當八世之昇平恃百年之儲積内有甲兵之備外無邊境之虞以其隔大海之遥未嘗通先朝之問太祖大聖皇帝誕膺厯數肇造家邦彼乃宻修浮海之勤懇致復燕之請輙憑一介遂割兩京曾未厯于嵗時已遽忘于恩造動摇我封部招納我叛亡皇帝陛下以生靈為心擴乾坤之量但令理辨曲示含容迄無意于改圖方興師而問罪佶則倉皇而遜位桓惟哀泣以求存議割三府之疆請復兩朝之好豈意戎師甫退信誓又渝兹益重于前愆累再煩于天討盖憑成筭以底全功遂令繼世之君俱為亡國之虜威靈遐暢文軌大同臣等出分閫外之憂坐獲師中之吉躬齊五伐不勞仗鉞于商郊仰祝萬年願効奉觴于漢殿降封昏徳公詔天㑹六年八月太宗皇帝實録内録到制詔佶曰王者有國當親仁而善隣神明在天可忘惠而背義以爾頃為宋主請好先皇始通海上之盟求復山前之壤因嘉懇切曾示允俞雖未夾擊以助成終以一言而割賜星霜未變釁隙已生恃邪佞為腹心納叛亡為牙爪招平山之逆黨害我大臣違先帝之􅊎言愆諸嵗幣更邀回其户口惟巧尚于詭辭禍從此開孽因自作人神以之激怒天地以之不容獨斷既行諸道並進往馳戎旅收萬里以無遺直抵京畿豈一城之可守旋聞巢穴俱致分崩大勢既以云亡舉族因而見獲悲銜去國計莫逃天雖云忍致其刑章無奈已盈于罪貫更欲與赦其如理何載念與其底怒以加誅或傷至化曷若好生而惡殺别示優恩乃降新封用遵舊制可封為昏徳公其供給安置並如典禮嗚呼事盖稽于往古曾不妄為過惟在于爾躬切宜循省祗服厥命可保諸身降封重昏侯詔制詔桓曰視頽綱以弗張維何以舉循覆轍而靡改載或爾輸惟乃父之不君忘我朝之大造嚮因𫝊位冀必改圖且無悔禍之心翻稔欺天之惡作為多罪矜恃姦謀背城下之大恩不割三鎮搆軍前之二使潜發尺書自孽難逃我伐再舉兵士奮威而南指將臣激怒以前驅壁壘俱摧郡縣繼下視井惟存乎茅􅀴渡河無假于葦航豈不自知徒嬰城守果為我獲出詣軍前尋勅帥臣使趨朝陛罪誠無赦當與正于刑名徳貴有容特優加于恩禮用循故事俯降新封可封為重昏侯其供給安置並如典禮嗚呼積釁自于汝躬其誰可恕降罰本乎天意豈朕妄為宜省前非敬服厥命昏徳公表天㑹七年八月臣佶伏奉宣命召臣女六人賜内族為婦具表稱謝伏䝉聖恩賜𠡠書奨諭者仰勤睿眷曲念孤蹤察流寓之可憐俾宗藩之有託伏念臣棲遅一已黽勉四遷顧齒髮以俱衰指川途而正邈獲居内地㒺間流言得攀若木之枝少慰桑榆之景此盖伏遇皇帝陛下擴二儀之量孚萬有之私憫獨夫祈守于偷安辨衆情免渉于疑似臣敢不􅊎堅晚節力報深仁儻伏臈稍至于蕭條頼葭莩必濟乎窘乏尚祈鴻造俯鑒丹𠂻臣無任瞻天望聖激切屏營之至又謝表昏徳公重昏侯經過詔遣使館之賜以幣帛酒食仍許其諸女相見昏徳公上表謝天恩下逮已失秋氣之寒父子相歡頓覺春光之暖遽沐絲綸之厚仍䝉縑繐之頒感涕何言驚惶無地竊以臣舉家萬指流寓三年每憂糊口之難忽有聯親之喜方虞季子之敝誰憐范叔之寒既冒寵榮愈加驚悸此盖伏遇皇帝陛下唐仁及物舜孝臨人故此㝠頑曲䝉保衞天階咫尺無縁一望于清光短艇飄颻自此回瞻於魏闕重昏侯謝表暫留内殿忽奉王言特許手足之相歡更被縑絪之厚賜喜驚並至恩㫖非常伏念臣禀性㝠頑賦資忠實負邱山之罪天意曲全聯𤓰葛之親聖恩隆大方念無衣之卒嵗遽欣挾纊之如春此盖伏遇皇帝陛下仁恕及下勞謙損已雖天地有無私之覆載而父母有至誠之愛憐念報徳之何時懐此心而未己昏徳公表臣佶言伏䝉宣命差官館伴臣赴和囉噶路安置于今月二日到彼居住者曲照煩言止從近徙仍敦姻好尚賜深憐大造難酬撫躬知幸竊念臣舉家萬指流寓連年自惟譴咎之深常務省循之効神明可質詎敢及于非圖天地無私遂得安于愚分驚濤千里顛躓百端幸復保于桑榆僅免塟于魚龞此盖伏遇皇帝陛下垂邱山之厚徳擴日月之大明非風波而可移亦浸潤而不受回瞻象闕拜渥澤以馳心仰戴龍光感孤情而出涕冊大齊皇帝文皇帝若曰朕聞公于御物不以天下為已私職在牧民廼知王者為通器威罰既以殄罪位號宜乎授能廼者有遼運屬顛危數窮否塞獲罪上帝流毒下民太祖武元皇帝仗黄鉞而拯黔黎秉白旄而􅊎師旅妖氛既掃區宇式寧爰有宋人來從海道願輸嵗幣祈復漢疆太祖方務善隣即從來議豈意天方肇亂自啟釁階隂結叛臣賊虐宰輔招集姦慝擾亂邊陲肆朕纉承仰循先志姑存大體式示涵容廼復蔽匿逋迯夸大疆域肆其貪狠自起紛爭擾吾外屬之藩隣取其受賜之疆土因彼告援遂與解和終莫聼從巧為辭拒爰命將帥敦諭盟言許以自新終然莫改偏師傅汴首罪奔淮嗣子哀鳴請復歡好地畫三鎮誓卜萬年凡有質要悉同父約既而官軍未退夜集衆以犯營誓墨纔乾宻𫝊檄而堅壁私結人使隂搆事端以致再遣師徒詰兹敗約又起畫河之議復成緩戰之謀既昧眀神廼昭聖鑒京城摧破鼎祚淪亡無并爾疆以示不貪之徳止遷其主用彰伐罪之心建楚新封守宋舊服庶能為國當共息民不料懦夫難勝重任妄為退讓友陷誅鋤如構者宋國罪餘趙氏遺孽家乏孝友國乏忠勤衘命出和已作潜身之計提師入衞反為䕶已之資忍視父兄甘為俘虜事雖難濟人豈無情方在殷憂樂稱僣號心之幸禍于此可知廼遣重兵連年討捕比聞逺竄越在島夷重念斯民亂於無主久罹塗炭未獲昭蘇不委仁賢孰能保定咨爾中奉大夫京東西淮南等路安撫使兼諸路馬步軍都緫管知東平府事節制大名開徳等府濮博濵棣徳滄等州劉豫夙擅直言之譽素懐濟世之才居于亂邦生不偶世百里雖智亦奚補于虞亡三仁至髙或願從于周仕當姦賊擾攘之際愚氓去就之間舉郡來王奮然獨斷逮乎厯試厥勲克成夫委之安撫徳化行任之尹牧獄訟理付之總戎盗賊息専之節制郡國清况有定衰撥亂之謀拯變扶危之䇿使民無事則櫜弓力穡有役則釋耒荷戈罷無名之征寢不急之務徴遺逸舉孝亷振紀綱修制度省刑罰而去煩酷發倉廪而息螽螟神人以和上下協應比下明詔詢考輿情列郡同辭一心仰戴宜即始歸之地以昭建業之元是用遣使某官髙慶裔副官韓昉備禮以璽綬寳冊命爾為皇帝國號大齊都大名府世修子禮永貢䖍誠錫爾封疆並從楚舊更須安集自相攸居爾其上體天心下從人欲忠以藩王室信以保邦圻惟天難諶惟命靡常常厥徳保厥位爾其勉哉無忽朕命按三朝北盟㑹編載此冊文起首尚有維天㑹八年嵗次庚戌七月辛丑朔二十七日丁夘二十字劉蜀王進封曹王制制曰嚴寳冊以薦鴻名既俯從于衆欲布恩書以敷惠澤宜大渙于羣生眷予異姓之王夙有同寅之徳肆頒明命孚告治朝蜀王劉豫敦大而直方髙明而寛厚早居南服以直言强諫聞于時頃在東州以智畧英資長于衆八年享國一節事君審運㑹之有終識廢興之惟義視去位如脫屣以還朝為登仙向之富國强兵何覇王之足道今也樂天知命豈得䘮所能移爰因慶賞之行益示褒榮之異胙以陶邱之壤昌其井絡之封於戯列土以建侯邦誓已堅於帶礪盡忠以藩帝室心宜炳若丹青茂對龍光永綏福禄可進封曹王食邑一萬户食實封一千户令有司擇日備禮冊命主者施行曹王劉豫謝表禮成大冊澤霈普天特例進其封階不遐遺于舊物望闕拜命闔門感恩臣豫誠歡誠忭頓首頓首伏念臣昔仕本朝粗厯要官昧方枘圎鑿之理竭徙薪曲突之忠項氏將亡以范增而不用周家既勝以箕子而來歸試用㣲能援升大位辭不獲已報當若何承積年殘毁有餘凡百事艱難特甚辟冦賊以置朝市披荆棘而創耕桑應機投隙以傾挫敵讐損已便人以招集離散忘寢忘食必躬必親培廣業之惟勤庶大造之不玷俄知廢罷之議愈盡措畫之心要先時成績于斯邦覬後日受知于上國至同混一之義不待再三之言即隨使人往受宣命素所措備復何遲疑八年辛苦以經營兩手歡欣而分付帝號若釋重負王爵尤感鴻恩自得清閑而北來未嘗徘徊而南望久安僻地忽被改封洎捧讀于訓辭若恭聼于睿語温其如玉暖然如春星斗輝輝麗窈然之天道典謨渾渾顯大哉之王言徽軫㸑下之焦桐青黄溝中之斷木光生懸磬之室榮張設羅之門此盖伏遇皇帝陛下徳奉三無仁鈞九有敬識百辟之享獨觀萬化之原有功而必見知無棄而常善救遂令窮悴得頼褒嘉臣敢不守靜致虛安時處順何以効涓埃之報惟不為名器之羞大金弔伐録卷四人地名考證呼喇呼原書作忽刺虎誤今改正烏凌噶原書作烏陵誤改見卷一阿木班貝勒原書作諳班勃極烈與金史同並誤今改正和囉噶原書作鶻里改即金史之活羅海並誤今改正固倫尼伊拉齊貝勒原書作骨盧你移賚勃極烈誤改見卷一
