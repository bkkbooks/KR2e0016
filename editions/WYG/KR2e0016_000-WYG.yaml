front:
  text: 敢輕議今舉國生靈已荷大恩自合一聽令㫖豈敢自擇今恭承嚴命衆議所遷去處如揚州江寜府乞賜詳酌與新主依前來台㫖臨日共議施行謹具狀申元帥府伏候台令天㑹五年二月日在京官寮吏部尚書王時雍等狀大金弔伐録卷三人地名考證
